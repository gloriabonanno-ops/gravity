// ── Codici e nomi personalizzati ─────────────────────────
// Codice automatico PA-NNN per tutti; nome custom per impianti notevoli
const IMP_NOMI = {
  'I007': 'Piazza delle Vergogne',
  'I021': 'Politeama',
  'I022': 'Teatro Massimo',
  'I039': 'Piazza Croci',
  'I062': 'Piazza Marina',
  'I065': 'Piazza Giachery',
  'I069': 'Piazza Indipendenza',
  'I086': 'Lungomare Mondello',
};
IMPIANTI.forEach((imp, i) => {
  imp.code = `PA-${String(i + 1).padStart(3, '0')}`;
  if (IMP_NOMI[imp.id]) imp.nome = IMP_NOMI[imp.id];
  // Assegna formato reale per il tipo (deterministico sull'indice)
  const validFmts = TIPO_FORMATI[imp.tipo] || [];
  if (validFmts.length > 0) imp.formato = validFmts[i % validFmts.length];
});

function getSuggestions(query) {
  if (!query || query.trim().length < 2) return [];
  const q = normalizeText(query.trim());
  const buckets = { city: [], province: [], zona: [], street: [] };
  LOCATION_SUGG.forEach(item => {
    const searchIn = normalizeText(item.text + ' ' + item.detail);
    if (!searchIn.includes(q) && !q.split(' ').every(w => searchIn.includes(w))) return;
    const bucket = ['via','corso','viale','piazza','area'].includes(item.type) ? 'street' : item.type;
    if (buckets[bucket] && buckets[bucket].length < 4) buckets[bucket].push(item);
  });
  return [
    { key: 'city',     label: 'Città e Comuni',     items: buckets.city },
    { key: 'province', label: 'Province',            items: buckets.province },
    { key: 'zona',     label: 'Quartieri e Zone',    items: buckets.zona },
    { key: 'street',   label: 'Strade e Aree',       items: buckets.street },
  ].filter(g => g.items.length > 0);
}

function highlightMatch(text, query) {
  if (!query) return React.createElement('span', null, text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}


// ─────────────────────────────────────────────────────────
// RICERCA — helpers normalizzazione e matching per parole
// ─────────────────────────────────────────────────────────
const STOP_WORDS = new Set(['via', 'corso', 'piazza', 'viale', 'largo', 'vicolo', 'lungomare', 'di', 'della', 'delle', 'degli', 'del', 'dei', 'de', 'in', 'a', 'e', 'il', 'la', 'lo', 'le', 'i', 'gli']);

function normalizeText(str) {
  return str
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // rimuove accenti
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')                     // punteggiatura → spazio
    .replace(/\s+/g, ' ')
    .trim();
}

// Restituisce true se ogni parola non-stop di query è contenuta in una parola di text
function matchesSearch(text, query) {
  if (!query) return true;
  const textWords  = normalizeText(text).split(' ');
  const queryWords = normalizeText(query).split(' ').filter(w => w.length > 1 && !STOP_WORDS.has(w));
  if (queryWords.length === 0) return true;
  return queryWords.every(qw => textWords.some(tw => tw.includes(qw)));
}

const MARKER_GREEN     = '#52C41A';
const MARKER_GREEN_SEL = '#389E0D';

const clusterColor = (n) => {
  if (n <= 2)  return { bg: '#D9F7BE', fg: '#135200' };
  if (n <= 5)  return { bg: '#B7EB8F', fg: '#135200' };
  if (n <= 10) return { bg: '#73D13D', fg: '#135200' };
  if (n <= 20) return { bg: '#52C41A', fg: '#fff' };
  if (n <= 50) return { bg: '#389E0D', fg: '#fff' };
  return               { bg: '#237804', fg: '#fff' };
};

const MAP_STYLES = [
  { elementType: 'geometry',            stylers: [{ color: '#f5f5f5' }] },
  { elementType: 'labels.icon',         stylers: [{ visibility: 'off' }] },
  { elementType: 'labels.text.fill',    stylers: [{ color: '#717171' }] },
  { elementType: 'labels.text.stroke',  stylers: [{ color: '#f5f5f5' }] },
  { featureType: 'water',      elementType: 'geometry', stylers: [{ color: '#c8dff0' }] },
  { featureType: 'water',      elementType: 'labels.text.fill', stylers: [{ color: '#9e9e9e' }] },
  { featureType: 'road',       elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
  { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#eeeeee' }] },
  { featureType: 'road.highway',  elementType: 'geometry', stylers: [{ color: '#dadada' }] },
  { featureType: 'road.highway',  elementType: 'geometry.stroke', stylers: [{ color: '#c9c9c9' }] },
  { featureType: 'poi',        stylers: [{ visibility: 'off' }] },
  { featureType: 'transit',    stylers: [{ visibility: 'off' }] },
  { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#555' }] },
];

const makeMarkerIcon = (isHighlighted, isSelected) => ({
  path: google.maps.SymbolPath.CIRCLE,
  scale:        isHighlighted ? 11 : (isSelected ? 9 : 7),
  fillColor:    isSelected ? MARKER_GREEN_SEL : MARKER_GREEN,
  fillOpacity:  0.9,
  strokeColor:  isHighlighted ? '#3E00FB' : '#ffffff',
  strokeWeight: isHighlighted ? 3 : 2,
});

const makeClusterSvg = (count) => {
  const { bg, fg } = clusterColor(count);
  const s = count <= 5 ? 32 : count <= 20 ? 36 : 40;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
    <circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${bg}" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
    <text x="${s/2}" y="${s/2+4.5}" text-anchor="middle" fill="${fg}" font-size="12" font-weight="700" font-family="sans-serif">${count}</text>
  </svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), size: s };
};

function GoogleMap({ impianti, highlightedId, selectedIds, filteredIds, onSelect, flyToTarget }) {
  const containerRef  = useRef(null);
  const mapRef        = useRef(null);
  const clustererRef  = useRef(null);
  const markersRef    = useRef({});   // id → { marker, imp, infoWindow }
  const openInfoRef   = useRef(null); // InfoWindow aperta

  // ── Init mappa + marker ───────────────────────────────
  useEffect(() => {
    if (mapRef.current || !containerRef.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 38.1155, lng: 13.3615 },
      zoom: 13,
      styles: MAP_STYLES,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.LEFT_TOP },
      gestureHandling: 'greedy',
    });

    const allMarkers = impianti.map(imp => {
      const marker = new google.maps.Marker({
        position: { lat: imp.lat, lng: imp.lng },
        icon: makeMarkerIcon(false, false),
      });

      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="padding:6px 2px;font-family:-apple-system,sans-serif">
          <div style="font-size:12px;font-weight:600;color:rgba(0,0,0,0.88);margin-bottom:2px">${imp.indirizzo}</div>
          <div style="font-size:11px;color:rgba(0,0,0,0.45)">${imp.tipo} · ${imp.zona}</div>
        </div>`,
        disableAutoPan: true,
        pixelOffset: new google.maps.Size(0, -4),
      });

      marker.addListener('mouseover', () => {
        if (openInfoRef.current) openInfoRef.current.close();
        infoWindow.open(map, marker);
        openInfoRef.current = infoWindow;
      });
      marker.addListener('mouseout', () => {
        infoWindow.close();
        openInfoRef.current = null;
      });
      marker.addListener('click', () => onSelect(imp.id));

      markersRef.current[imp.id] = { marker, imp, infoWindow };
      return marker;
    });

    // Clusterer con renderer custom
    const clusterer = new markerClusterer.MarkerClusterer({
      map,
      markers: allMarkers,
      renderer: {
        render: ({ count, position }) => {
          const { size: s } = makeClusterSvg(count);
          const { url } = makeClusterSvg(count);
          return new google.maps.Marker({
            position,
            icon: {
              url,
              scaledSize: new google.maps.Size(s, s),
              anchor:     new google.maps.Point(s / 2, s / 2),
            },
            zIndex: 10000 + count,
          });
        },
      },
    });

    mapRef.current   = map;
    clustererRef.current = clusterer;

    return () => { mapRef.current = null; clustererRef.current = null; };
  }, []);

  // ── Aggiorna posizioni marker quando cambiano le coordinate (geocoding) ──
  useEffect(() => {
    if (!mapRef.current || !clustererRef.current) return;
    let changed = false;
    impianti.forEach(imp => {
      const entry = markersRef.current[imp.id];
      if (!entry) return;
      const curr = entry.marker.getPosition();
      if (!curr ||
          Math.abs(curr.lat() - imp.lat) > 0.000005 ||
          Math.abs(curr.lng() - imp.lng) > 0.000005) {
        entry.marker.setPosition({ lat: imp.lat, lng: imp.lng });
        entry.imp = { ...entry.imp, lat: imp.lat, lng: imp.lng };
        changed = true;
      }
    });
    if (changed) clustererRef.current.render();
  }, [impianti]);

  // ── Aggiorna stile e visibilità marker ────────────────
  useEffect(() => {
    if (!clustererRef.current) return;

    const visibleMarkers = [];
    Object.entries(markersRef.current).forEach(([id, { marker }]) => {
      const isHighlighted = id === highlightedId;
      const isSelected    = selectedIds.has(id);
      const inFilter      = !filteredIds || filteredIds.has(id);
      const visible       = inFilter;

      marker.setIcon(makeMarkerIcon(isHighlighted, isSelected));
      marker.setZIndex(isHighlighted ? 9999 : isSelected ? 500 : 1);

      if (visible) visibleMarkers.push(marker);
    });

    clustererRef.current.clearMarkers(true);
    clustererRef.current.addMarkers(visibleMarkers);

    if (highlightedId && markersRef.current[highlightedId]) {
      const { imp } = markersRef.current[highlightedId];
      mapRef.current.panTo({ lat: imp.lat, lng: imp.lng });
      if (mapRef.current.getZoom() < 15) mapRef.current.setZoom(16);
    }
  }, [highlightedId, selectedIds, filteredIds]);

  // ── Fly to zona cercata ───────────────────────────────
  useEffect(() => {
    if (!flyToTarget || !mapRef.current) return;
    mapRef.current.panTo({ lat: flyToTarget.lat, lng: flyToTarget.lng });
    mapRef.current.setZoom(flyToTarget.zoom || 14);
  }, [flyToTarget]);


  return React.createElement('div', { ref: containerRef, id: 'ooh-map' });
}

  // ── Geocoding ─────────────────────────────────────────
  const [geocodedImpianti,  setGeocodedImpianti]  = useState(IMPIANTI);
  const [geocodingProgress, setGeocodingProgress] = useState(null);

  useEffect(() => {
    const CACHE_KEY = 'gravity_geocache_v3';
    let cache = {};
    try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) {}

    const applyCache = (c) => {
      setGeocodedImpianti(IMPIANTI.map(imp =>
        c[imp.id] ? { ...imp, lat: c[imp.id].lat, lng: c[imp.id].lng } : imp
      ));
    };

    const toGeocode = IMPIANTI.filter(imp => !cache[imp.id]);

    if (toGeocode.length === 0) {
      applyCache(cache);
      return;
    }

    setGeocodingProgress({ done: 0, total: toGeocode.length });
    const geocoder = new google.maps.Geocoder();
    let done = 0;
    let cancelled = false;

    const next = (i) => {
      if (cancelled) return;
      if (i >= toGeocode.length) {
        applyCache(cache);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
        setGeocodingProgress(null);
        return;
      }
      const imp = toGeocode[i];
      const palermoBounds = new google.maps.LatLngBounds(
        { lat: 38.055, lng: 13.285 },
        { lat: 38.245, lng: 13.455 }
      );
      geocoder.geocode(
        {
          address: `${imp.indirizzo}, Palermo`,
          componentRestrictions: { country: 'IT', locality: 'Palermo' },
          bounds: palermoBounds,
        },
        (results, status) => {
          if (status === 'OK' && results[0]) {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            // Accetta solo risultati dentro il bounding box di Palermo
            if (lat >= 38.055 && lat <= 38.245 && lng >= 13.285 && lng <= 13.455) {
              cache[imp.id] = { lat, lng };
            }
          }
          done++;
          setGeocodingProgress({ done, total: toGeocode.length });
          if (done % 10 === 0) {
            applyCache(cache);
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
          }
          setTimeout(() => next(i + 1), 80);
        }
      );
    };

    next(0);
    return () => { cancelled = true; };

    setDraftFilters({ ...FILTERS_EMPTY });

    setShowSugg(false);
    if (target) {
      setFlyToTarget({ ...target, _ts: Date.now() });

      const isCity = matchesSearch('Palermo Provincia', q) || normalizeText(q) === 'pa';
      if (isCity) {
        setFlyToTarget({ lat: 38.1155, lng: 13.3615, zoom: 12, _ts: Date.now() });
      } else {
        const isZona = ZONE.some(z => normalizeText(z) === normalizeText(q));
        const matching = geocodedImpianti.filter(i =>
          isZona ? matchesSearch(i.zona, q) : matchesSearch(i.indirizzo, q)

        if (matching.length > 0) {
          const lat = matching.reduce((s, i) => s + i.lat, 0) / matching.length;
          const lng = matching.reduce((s, i) => s + i.lng, 0) / matching.length;
          const zoom = matching.length >= 30 ? 12 : matching.length >= 10 ? 14 : 15;
          setFlyToTarget({ lat, lng, zoom, _ts: Date.now() });
        }

                flyToTarget,
              }),

              geocodingProgress && React.createElement('div', { className: 'geocoding-banner' },
                React.createElement('span', null,
                  `Geocoding indirizzi ${geocodingProgress.done}/${geocodingProgress.total}`
                ),
                React.createElement('div', { className: 'geocoding-progress-bar' },
                  React.createElement('div', {
                    className: 'geocoding-progress-fill',
                    style: { width: `${Math.round(geocodingProgress.done / geocodingProgress.total * 100)}%` }
                  })
                )
              ),

              React.createElement(MapInfobox, {
                total:             filteredImpianti.length,
                filteredImpianti,
              }),

              highlightedId && React.createElement(MapFloatingCard, {
                imp:               geocodedImpianti.find(i => i.id === highlightedId),
                added:             selectedIds.has(highlightedId),
                expanded:          expandedIds.has(highlightedId),
                onToggleAdd:       handleToggleAdd,
                onToggleExpand:    handleToggleExpand,
                onClose:           () => setHighlightedId(null),
                impLabel:          implantiLabels[highlightedId]?.[0] || null,
                availableLabels,
                pickerOpenId,
                onPickerOpenChange: setPickerOpenId,
                renderLabelPicker,
              }),
            )
          : React.createElement(ListView, { impianti: filteredImpianti, viewMode, setViewMode }),
      ),
    ),

    React.createElement(Drawer, {
      title: 'Filtri avanzati',
      placement: 'right',
      width: 480,
      open: filterDrawerOpen,
      onClose: () => setFilterDrawerOpen(false),
      footer: React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between' } },
        React.createElement(Button, { danger: true, type: 'text', onClick: resetFilters }, 'Azzera tutto'),
        React.createElement(Button, { type: 'primary', onClick: applyFilters }, 'Applica')
      ),
    },
      React.createElement(FilterPanel, {
        filterStatiAmm: draftFilters.statiAmm,       onFilterStatiAmmChange:    v => setDraft('statiAmm', v),
        filterCanale: draftFilters.canale,            onFilterCanaleChange:      v => setDraft('canale', v),
        filterSuolo: draftFilters.suolo,              onFilterSuoloChange:       v => setDraft('suolo', v),
        filterMediaOwner: draftFilters.mediaOwner,    onFilterMediaOwnerChange:  v => setDraft('mediaOwner', v),
        filterTipi: draftFilters.tipi,                onFilterTipiChange:        v => setDraft('tipi', v),
        filterFormati: draftFilters.formati,          onFilterFormatiChange:     v => setDraft('formati', v),
        availableFormats,
        filterIlluminazione: draftFilters.illuminazione, onFilterIlluminazioneChange: v => setDraft('illuminazione', v),
        minFacesEnabled: draftFilters.minFacesEnabled, onMinFacesEnabledChange:  v => setDraft('minFacesEnabled', v),
        minFacesValue: draftFilters.minFacesValue,    onMinFacesValueChange:     v => setDraft('minFacesValue', v),
      })
    ),
  );
}

// ─────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────
window.applyGravityTokens && window.applyGravityTokens();
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App)
  )
);
</script>
</body>
</html>
