function InfoCard({ title, value, subtitle }) {
  return (
    <div style={{ border:'1px solid #e8e8e8', borderRadius:'6px', padding:'12px', height:'100px', background:'#fff', display:'flex', flexDirection:'column', justifyContent:'space-between' }}>
      <div>

      </div>
      {subtitle && <Text type="secondary" style={{ fontSize:'11px', display:'block', marginTop:'auto', paddingTop:'4px' }}>{subtitle}</Text>}
    </div>
  );
}

function EmptyState({ message, imageSrc }) {
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', padding:'48px 24px', textAlign:'center' }}>
      {imageSrc && <img src={imageSrc} alt="Empty state" style={{ width:'200px', height:'auto', marginBottom:'16px' }} />}
      <div style={{ fontSize:'14px', color:'#8c8c8c' }}>{message}</div>
    </div>
  );
}

function GrantsAccordion({ data, selectedRowKey, onRowSelect, currentGrantKey, isReplaceMode, currentUtilityId }) {
  const [currentPage, setCurrentPage] = useState(1);
  const [searchText, setSearchText] = useState('');
  const [pageSize, setPageSize] = useState(5);
  const [activeKeys, setActiveKeys] = useState([]);

  useEffect(() => {
    if (data.length > 0) {
      const keyToOpen = currentGrantKey && data.some(g => g.key === currentGrantKey) ? currentGrantKey : data[0].key;
      setActiveKeys([keyToOpen]);
    }
  }, [data, currentGrantKey]);

  useEffect(() => {
    if (isReplaceMode && currentUtilityId && !selectedRowKey) {
      onRowSelect(currentUtilityId);
    }
  }, [isReplaceMode, currentUtilityId, selectedRowKey, onRowSelect]);

  const filteredData = data.filter(grant => {
    if (!searchText) return true;
    const s = searchText.toLowerCase();
    const grantMatch = grant.documentType.toLowerCase().includes(s) || grant.documentId.toLowerCase().includes(s) || grant.issuingAuthority.toLowerCase().includes(s) || (grant.issueDate && grant.issueDate.toLowerCase().includes(s));
    const utilityMatch = grant.utilities.some(u => u.utilityNumber.toLowerCase().includes(s) || u.propertyTax.toLowerCase().includes(s) || (u.connectedTo && u.connectedTo.some(t => t.toLowerCase().includes(s))));
    return grantMatch || utilityMatch;
  });

  const startIndex = (currentPage - 1) * pageSize;
  const paginatedData = filteredData.slice(startIndex, startIndex + pageSize);

  const collapseItems = paginatedData.map(grant => {
    const isGrantSelected = grant.utilities.some(u => selectedRowKey === `${grant.key}-${u.utilityNumber}`);
    return {
      key: grant.key,
      className: isGrantSelected ? 'grant-selected' : '',
      label: (
        <div style={{ width:'100%', display:'flex', alignItems:'flex-start', justifyContent:'space-between' }}>
          <div style={{ flex:1 }}>
            <div style={{ display:'flex', alignItems:'center', gap:'12px', fontSize:'14px', marginBottom:'8px' }}>
              <span style={{ fontWeight:500, color:'rgba(0,0,0,0.85)' }}>{grant.documentType}</span>
              <Tag style={{ margin:0, border:'1px solid #d9d9d9', borderRadius:'4px', color:'rgba(0,0,0,0.65)', backgroundColor:'#fafafa', fontSize:'13px', padding:'2px 8px' }}>{grant.documentId}</Tag>
            </div>
            <div style={{ display:'flex', alignItems:'center', gap:'24px', fontSize:'13px' }}>
              <span><span style={{ color:'rgba(0,0,0,0.45)' }}>Tipo concessione:</span> <span style={{ color:'rgba(0,0,0,0.85)' }}>Pubblica</span></span>
              <span><span style={{ color:'rgba(0,0,0,0.45)' }}>Ente Emittente:</span> <span style={{ color:'rgba(0,0,0,0.85)' }}>{grant.issuingAuthority}</span></span>
              <div style={{ fontSize:'12px', color:'rgba(0,0,0,0.45)', display:'flex', alignItems:'center', gap:'16px', flexWrap:'wrap' }}>
                {grant.expirationDate && <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span style={{ color:'rgba(0,0,0,0.45)' }}>Scadenza:</span><span style={{ color:'rgba(0,0,0,0.85)' }}>{grant.expirationDate}</span></span>}
                {grant.status && <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span style={{ color:'rgba(0,0,0,0.45)' }}>Stato:</span><div style={{ display:'flex', alignItems:'center', gap:'4px' }}><div style={{ width:'6px', height:'6px', borderRadius:'50%', backgroundColor: grant.status==='Attiva' ? '#52c41a' : '#ff4d4f' }} /><span style={{ color:'rgba(0,0,0,0.85)' }}>{grant.status}</span></div></span>}
              </div>
            </div>
          </div>
          {isGrantSelected && (
            <div style={{ paddingTop:'2px', paddingLeft:'16px', display:'flex', alignItems:'center', gap:'6px', fontSize:'13px', color:'#3E00FB', fontWeight:500 }}>
              <CheckCircleFilled style={{ fontSize:'16px' }} />
              <span>Selezionata</span>
            </div>
          )}
        </div>
      ),
      children: (
        <div style={{ padding:'8px 0' }}>
          <div style={{ border:'1px solid #d9d9d9', borderRadius:'6px', overflow:'hidden' }}>
            <div style={{ display:'grid', gridTemplateColumns:'2fr 2fr 2fr 4fr 40px', padding:'8px 16px', fontWeight:500, fontSize:'12px', color:'rgba(0,0,0,0.65)', backgroundColor:'#fafafa', borderBottom:'1px solid #f0f0f0' }}>
              <div>Numero Utenza</div><div>Codice Cimasa</div><div>Canone Patrimoniale</div><div>Aggiunta a:</div><div></div>
            </div>
            {grant.utilities && grant.utilities.length > 0 ? grant.utilities.map((utility, index) => {
              const utilityKey = `${grant.key}-${utility.utilityNumber}`;
              const isSelected = selectedRowKey === utilityKey;
              return (
                <div key={utilityKey} style={{ display:'grid', gridTemplateColumns:'2fr 2fr 2fr 4fr 40px', padding:'12px 16px', borderBottom: index < grant.utilities.length-1 ? '1px solid #f0f0f0' : 'none', backgroundColor: isSelected ? '#f9f7ff' : 'transparent', cursor:'pointer', transition:'background-color 0.2s', alignItems:'center' }}
                  onClick={() => onRowSelect(isSelected ? null : utilityKey)}
                  onMouseEnter={e => { if (!isSelected) e.currentTarget.style.backgroundColor = '#fafafa'; }}
                  onMouseLeave={e => { if (!isSelected) e.currentTarget.style.backgroundColor = 'transparent'; }}
                >
                  <div style={{ fontSize:'13px', color:'rgba(0,0,0,0.85)' }}>{utility.utilityNumber}</div>
                  <div style={{ fontSize:'13px', color: utility.cimasaCode==='Non specificata' || !utility.cimasaCode ? '#bfbfbf' : 'rgba(0,0,0,0.85)' }}>{utility.cimasaCode && utility.cimasaCode!=='Non specificata' ? utility.cimasaCode : 'N/D'}</div>
                  <div style={{ fontSize:'13px', color:'rgba(0,0,0,0.85)' }}>{utility.propertyTax} / anno</div>

  });

  return (
    <div>
      <Input
        placeholder="Cerca concessione..."
        prefix={<SearchOutlined style={{ color:'rgba(0,0,0,0.45)' }} />}

        onChange={e => { setSearchText(e.target.value); setCurrentPage(1); }}

      />
      <div style={{ marginBottom:'16px', padding:'12px 16px', backgroundColor:'#f6f7f9', borderRadius:'6px', fontSize:'13px', color:'rgba(0,0,0,0.65)', lineHeight:'1.5' }}>

      </div>
      <Collapse
        items={collapseItems}
        expandIcon={({ isActive }) => <DownOutlined rotate={isActive ? 180 : 0} style={{ fontSize:'10px', color:'rgba(0,0,0,0.45)' }} />}
        ghost={false}
        style={{ backgroundColor:'#fff', border:'1px solid #d9d9d9', borderRadius:'6px' }}
        activeKey={activeKeys}
        onChange={keys => setActiveKeys(keys)}
      />
      {filteredData.length > 0 && (
        <div style={{ display:'flex', justifyContent:'flex-end', padding:'16px 0', borderTop:'1px solid #f0f0f0', marginTop:'16px' }}>
          <Pagination
            current={currentPage}

            pageSize={pageSize}

            onShowSizeChange={(_, size) => { setPageSize(size); setCurrentPage(1); }}

            pageSizeOptions={['5','10','20','50']}

  );
}

function AuthorizationsList({ data, selectedKeys, onSelectionChange }) {
  const [searchText, setSearchText] = useState('');
  const [showOnlySelected, setShowOnlySelected] = useState(false);

  const handleToggle = key => {
    if (selectedKeys.includes(key)) onSelectionChange(selectedKeys.filter(k => k !== key));
    else onSelectionChange([...selectedKeys, key]);
  };

  const filteredData = useMemo(() => {
    let result = data;
    if (searchText) {
      const s = searchText.toLowerCase();
      result = result.filter(auth =>
        auth.authorizationCategory.toLowerCase().includes(s) ||
        auth.issuingAuthority.toLowerCase().includes(s) ||
        auth.protocolNumber.toLowerCase().includes(s) ||
        (auth.expirationDate && auth.expirationDate.toLowerCase().includes(s))
      );
    }
    if (showOnlySelected) result = result.filter(auth => selectedKeys.includes(auth.key));
    return result;
  }, [data, searchText, showOnlySelected, selectedKeys]);

  return (
    <div>
      <div style={{ marginBottom:'16px', padding:'12px 16px', backgroundColor:'#f6f7f9', borderRadius:'6px', fontSize:'13px', color:'rgba(0,0,0,0.65)', lineHeight:'1.5' }}>
        Seleziona tutte le autorizzazioni da collegare a questo impianto
      </div>
      <Input
        placeholder="Cerca autorizzazione"
        prefix={<SearchOutlined style={{ color:'rgba(0,0,0,0.45)' }} />}
        value={searchText}
        onChange={e => setSearchText(e.target.value)}
        style={{ marginBottom:'16px' }}
        allowClear
      />
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'16px' }}>
        <div style={{ fontSize:'14px' }}><span style={{ fontWeight:600 }}>Totale:</span> {filteredData.length}</div>
        <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
          <span style={{ fontSize:'13px', color:'rgba(0,0,0,0.65)' }}>Mostra solo i selezionati</span>
          <Switch size="small" checked={showOnlySelected} onChange={setShowOnlySelected} />
        </div>
      </div>
      <div style={{ border:'1px solid #d9d9d9', borderRadius:'6px', overflow:'hidden' }}>
        {filteredData.length > 0 ? filteredData.map((auth, index) => {
          const isSelected = selectedKeys.includes(auth.key);
          return (
            <div key={auth.key}
              style={{ padding:'16px', borderBottom: index < filteredData.length-1 ? '1px solid #f0f0f0' : 'none', backgroundColor: isSelected ? '#f9f7ff' : 'transparent', cursor:'pointer', transition:'background-color 0.2s', display:'flex', alignItems:'flex-start', justifyContent:'space-between', gap:'16px' }}
              onClick={() => handleToggle(auth.key)}
              onMouseEnter={e => { if (!isSelected) e.currentTarget.style.backgroundColor = '#fafafa'; }}
              onMouseLeave={e => { if (!isSelected) e.currentTarget.style.backgroundColor = 'transparent'; }}
            >
              <div style={{ flex:1 }}>
                <div style={{ display:'flex', alignItems:'center', gap:'12px', fontSize:'14px', marginBottom:'8px' }}>
                  <span style={{ fontWeight:500, color:'rgba(0,0,0,0.85)' }}>{auth.authorizationCategory}</span>
                  <Tag style={{ margin:0, border:'1px solid #d9d9d9', borderRadius:'4px', color:'rgba(0,0,0,0.65)', backgroundColor:'#fafafa', fontSize:'13px', padding:'2px 8px' }}>{auth.protocolNumber}</Tag>
                </div>
                <div style={{ display:'flex', alignItems:'center', gap:'24px', fontSize:'12px', color:'rgba(0,0,0,0.45)', flexWrap:'wrap' }}>
                  <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>Ente Emittente:</span><span style={{ color:'rgba(0,0,0,0.85)' }}>{auth.issuingAuthority}</span></span>
                  {auth.stipulationDate && <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>Data Stipula:</span><span style={{ color:'rgba(0,0,0,0.85)' }}>{auth.stipulationDate}</span></span>}
                  {auth.expirationDate && <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>Data Scadenza:</span><span style={{ color:'rgba(0,0,0,0.85)' }}>{auth.expirationDate}</span></span>}
                  <span style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>CUP:</span><span style={{ color:'rgba(0,0,0,0.85)' }}>{auth.cup}</span></span>
                </div>
              </div>
              <div style={{ display:'flex', alignItems:'flex-start', paddingTop:'2px' }}>
                <Checkbox checked={isSelected} onChange={e => { e.stopPropagation(); handleToggle(auth.key); }} />
              </div>
            </div>
          );
        }) : (
          <div style={{ padding:'24px 16px', textAlign:'center', color:'rgba(0,0,0,0.45)', fontSize:'13px' }}>
            {showOnlySelected ? 'Nessuna autorizzazione selezionata' : 'Nessuna autorizzazione disponibile'}
          </div>
        )}
      </div>
    </div>
  );
}

  const [tipoSuolo, setTipoSuolo] = useState('Privato');
  const [progettista, setProgettista] = useState('Studio Tecnico Associato Rossi & Partners');
  const [acciaoArmatura, setAcciaoArmatura] = useState('8450C fa44a - ø12~16mm');
  const [accountNumber, setAccountNumber] = useState(null);
  const [expirationDate, setExpirationDate] = useState(null);
  const [currentGrantKey, setCurrentGrantKey] = useState(null);
  const [addedPermits, setAddedPermits] = useState([]);
  const [isEditingIdentityCard, setIsEditingIdentityCard] = useState(false);
  const [isEditingProject, setIsEditingProject] = useState(false);
  const [modifiedFields, setModifiedFields] = useState(new Set());
  const [originalValues] = useState({ cimasaCode:'', tipoSuolo:'Privato', progettista:'Studio Tecnico Associato Rossi & Partners', acciaoArmatura:'8450C fa44a - ø12~16mm' });

  const handleInputChange = (fieldName, value) => {
    const next = new Set(modifiedFields);
    if (value !== originalValues[fieldName]) next.add(fieldName); else next.delete(fieldName);
    setModifiedFields(next);
    if (fieldName === 'cimasaCode') setCimasaCode(value);
    else if (fieldName === 'tipoSuolo') setTipoSuolo(value);
    else if (fieldName === 'progettista') setProgettista(value);
    else if (fieldName === 'acciaoArmatura') setAcciaoArmatura(value);
  };

  const handleCloseDrawer = () => {
    setDrawerOpen(false);
    setSelectedRowKey(null);
    setSelectedAuthKeys([]);
    setIsReplaceMode(false);
  };

  const handleCopyCoordinates = () => {
    const text = 'Via Libertà, 36, Palermo (PA)';
    if (navigator.clipboard?.writeText) {
      navigator.clipboard.writeText(text).then(() => message.success('Coordinate copiate con successo')).catch(() => fallbackCopy(text));
    } else fallbackCopy(text);
  };

  const fallbackCopy = text => {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.cssText = 'position:fixed;left:-999999px;top:-999999px';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); message.success('Coordinate copiate con successo'); }
    catch { message.error('Impossibile copiare il testo'); }
    ta.remove();
  };

  const handleAddPermit = () => {
    if (drawerType === 'autorizzazione') {
      if (selectedAuthKeys.length === 0) { message.warning("Per favore seleziona un'autorizzazione prima di continuare"); return; }
      const newAuths = selectedAuthKeys.map(authKey => {
        const auth = authorizationsData.find(a => a.key === authKey);
        if (!auth) return null;
        return { id:authKey, permitType:'autorizzazione', documentType:auth.authorizationCategory, documentId:auth.protocolNumber, authorizationCategory:auth.authorizationCategory, state:auth.status, isActive:auth.isActive };
      }).filter(Boolean);
      setAddedPermits([...addedPermits, ...newAuths]);
      handleCloseDrawer();
      message.success('Autorizzazione aggiunta con successo');
      return;
    }

    if (!selectedRowKey) { message.warning("Per favore seleziona un'utenza prima di continuare"); return; }
    let selectedGrant = null, selectedUtility = null;
    for (const grant of grantsData) {
      const utility = grant.utilities.find(u => `${grant.key}-${u.utilityNumber}` === selectedRowKey);
      if (utility) { selectedGrant = grant; selectedUtility = utility; break; }
    }
    if (!selectedGrant || !selectedUtility) return;

    const newPermit = { id:selectedRowKey, permitType:'concessione', documentType:selectedGrant.documentType, documentId:selectedGrant.documentId, accountNumber:selectedUtility.utilityNumber, state:selectedGrant.status || 'Attiva', isActive:selectedGrant.status === 'Attiva' };

    if (isReplaceMode) {
      const oldUtility = accountNumber || 'N/D';
      const newUtility = selectedUtility.utilityNumber;
      const oldCimasa = cimasaCode || 'N/D';
      const newCimasa = selectedUtility.cimasaCode && selectedUtility.cimasaCode !== 'Non specificata' ? selectedUtility.cimasaCode : 'N/D';
      modal.confirm({
        title:'Conferma Sostituzione Concessione', icon:null, width:520, centered:true,
        content: (
          <div style={{ marginTop:'16px' }}>
            <Text>Una volta confermato, il Numero Utenza e il Codice Cimasa verranno modificati come segue:</Text>

                <Col span={8}><Text style={{ fontSize:'13px' }}>Codice Cimasa</Text></Col>

              </Row>
            </div>
          </div>
        ),
        okText:'Conferma Sostituzione', cancelText:'Annulla',
        okButtonProps:{ style:{ backgroundColor:'#3E00FB' } },
        onOk: () => {
          setAddedPermits([newPermit]);
          setAccountNumber(selectedUtility.utilityNumber);

          setExpirationDate(selectedUtility.expirationDate || null);
          handleCloseDrawer();
          message.success('Concessione sostituita con successo');
        }
      });
    } else {
      setAddedPermits([...addedPermits, newPermit]);
      setAccountNumber(selectedUtility.utilityNumber);
      setCimasaCode(selectedUtility.cimasaCode && selectedUtility.cimasaCode !== 'Non specificata' ? selectedUtility.cimasaCode : '');
      setExpirationDate(selectedUtility.expirationDate || null);
      handleCloseDrawer();
    }
  };

  const handleRemovePermit = permitId => {
    const permit = addedPermits.find(p => p.id === permitId);

                            <div style={{ display:'flex', alignItems:'center', gap:'8px' }}>
                              <div style={{ width:'32px', height:'32px', borderRadius:'50%', backgroundColor:'#f5f5f5', display:'flex', alignItems:'center', justifyContent:'center', overflow:'hidden' }}>
                                <img src={AMAT_LOGO} alt="AMAT" style={{ width:'100%', height:'100%', objectFit:'cover' }} />
                              </div>
                              <span style={{ fontSize:'14px' }}>AMAT S.p.A.</span>
                            </div>
                          } subtitle="Fornito da terzi" />
                        </Col>
                        <Col span={6}>
                          <InfoCard title="Tipo Impianto" value="Pensilina" subtitle="4 facce" />
                        </Col>
                        <Col span={6}>
                          <InfoCard title="Stato" value={
                            <div style={{ display:'flex', alignItems:'center', gap:'6px' }}>
                              <div style={{ width:'10px', height:'10px', borderRadius:'50%', backgroundColor:'#1890ff' }} />
                              <span>Attivo</span>
                            </div>
                          } subtitle="Attivo dal 31/12/2025" />
                        </Col>
                        <Col span={6}>
                          <InfoCard title="Prezzo Totale" value="€1.450,00" subtitle="Tariffa a quattordicina" />
                        </Col>
                        <Col span={6}>
                          <InfoCard title="Codice Cimasa" value={
                            cimasaCode ? <div style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>{cimasaCode}</span><CopyOutlined style={{ fontSize:'14px', color:'#8c8c8c', cursor:'pointer' }} /></div>
                            : <span style={{ color:'#bfbfbf' }}>N/D</span>
                          } subtitle={cimasaCode ? 'Fornito da permesso' : undefined} />
                        </Col>
                        <Col span={6}>
                          <InfoCard title="Numero Utenza" value={
                            accountNumber ? <div style={{ display:'flex', alignItems:'center', gap:'6px' }}><span>{accountNumber}</span><CopyOutlined style={{ fontSize:'14px', color:'#8c8c8c', cursor:'pointer' }} /></div>
                            : <span style={{ color:'#bfbfbf' }}>N/D</span>
                          } subtitle={expirationDate ? `Scadenza: ${expirationDate}` : undefined} />
                        </Col>
                        <Col span={6}><InfoCard title="Suolo" value="Privato" subtitle="Categoria: Speciale" /></Col>
                        <Col span={6}><InfoCard title="Codice Area" value="2" subtitle="Classe Municipale: II" /></Col>
                      </Row>
                    </Col>
                  </Row>
                </div>

                <Divider />

                {/* Tabs */}
                <div>
                  <Tabs activeKey={activeTab} onChange={setActiveTab} items={tabItems} />
                  <div style={{ marginTop:'16px' }}>
                    {activeTab === '2' ? (
                      <>
                        {/* Scheda identificativa */}
                        <div style={{ marginBottom:'24px' }}>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
                            <Title level={5} style={{ margin:0 }}>Scheda identificativa</Title>
                            {!isEditingIdentityCard ? (
                              <Button icon={<EditOutlined />} onClick={() => setIsEditingIdentityCard(true)}>Modifica</Button>
                            ) : (
                              <Space>
                                <Button onClick={() => setIsEditingIdentityCard(false)}>Annulla</Button>
                                <Button type="primary" icon={<SaveOutlined />} onClick={() => { setIsEditingIdentityCard(false); message.success('Modifiche salvate con successo'); }}>Salva</Button>
                              </Space>
                            )}
                          </div>
                          <Row gutter={[16,16]}>
                            <Col span={6}>
                              <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
                                <Text type="secondary" style={{ fontSize:'13px' }}>Codice Cimasa</Text>
                                <Input value={cimasaCode} placeholder="N/D" readOnly={!isEditingIdentityCard} variant={isEditingIdentityCard ? 'outlined' : 'borderless'} onChange={e => handleInputChange('cimasaCode', e.target.value)} style={{ ...fieldStyle(isEditingIdentityCard), color: cimasaCode ? 'rgba(0,0,0,0.85)' : '#bfbfbf' }} className={inputClass('cimasaCode')} />
                              </div>
                            </Col>
                            <Col span={6}>
                              <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
                                <Text type="secondary" style={{ fontSize:'13px' }}>Tipo suolo</Text>
                                <Input value={tipoSuolo} readOnly={!isEditingIdentityCard} variant={isEditingIdentityCard ? 'outlined' : 'borderless'} onChange={e => handleInputChange('tipoSuolo', e.target.value)} style={fieldStyle(isEditingIdentityCard)} className={inputClass('tipoSuolo')} />
                              </div>
                            </Col>
                          </Row>
                        </div>

                        <Divider />

                        {/* Permessi */}
                        <div style={{ marginBottom:'24px' }}>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
                            <Title level={5}>Permessi</Title>
                            <Dropdown
                              menu={{ items:[
                                { key:'concessione', label:'Collega Concessione', onClick:() => { setDrawerType('concessione'); setDrawerOpen(true); } },
                                { key:'autorizzazione', label:'Collega Autorizzazione', onClick:() => { setDrawerType('autorizzazione'); setDrawerOpen(true); } }
                              ] }}
                              disabled={accountNumber !== null}
                            >
                              <Button icon={<PlusOutlined />} disabled={accountNumber !== null} />
                            </Dropdown>
                          </div>
                          {addedPermits.length > 0 ? (
                            <Row gutter={[16,16]}>
                              {addedPermits.map(permit => (
                                <Col span={8} key={permit.id}>
                                  <PermitCard
                                    permitType={permit.permitType} documentType={permit.documentType} documentId={permit.documentId}
                                    accountNumber={permit.accountNumber} authorizationCategory={permit.authorizationCategory}
                                    state={permit.state} isActive={permit.isActive}
                                    onReplace={() => { setDrawerType('concessione'); setDrawerOpen(true); setIsReplaceMode(true); }}
                                    onRemove={() => handleRemovePermit(permit.id)}
                                  />
                                </Col>
                              ))}
                            </Row>
                          ) : (
                            <EmptyState message="Aggiungi un permesso per collegarlo all'impianto" imageSrc={EMPTY_STATE_IMG} />
                          )}
                        </div>

                        <Divider />

                        {/* Progetto */}
                        <div>
                          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'8px' }}>
                            <Title level={5} style={{ margin:0 }}>Progetto</Title>
                            {!isEditingProject ? (
                              <Button icon={<EditOutlined />} onClick={() => setIsEditingProject(true)}>Modifica</Button>
                            ) : (
                              <Space>
                                <Button onClick={() => setIsEditingProject(false)}>Annulla</Button>
                                <Button type="primary" icon={<SaveOutlined />} onClick={() => { setIsEditingProject(false); message.success('Modifiche salvate con successo'); }}>Salva</Button>
                              </Space>
                            )}
                          </div>
                          <Row gutter={[24,16]}>
                            {[
                              { label:'Progettista', field:'progettista', value:progettista, isControlled:true },
                              { label:'Geologo', defaultVal:'Dott. Geol. Giuseppe Marino' },
                              { label:'D.L. (Direttore Lavori)', defaultVal:'Ing. Alessandro Bianchi' },
                              { label:'C.S.E. (Coordinatore Sicurezza Esecuzione)', defaultVal:'Ing. Laura Conti' },
                              { label:'Laboratorio', defaultVal:'Lab. Prova Materiali Sicilia - Cert. 2024/PA0145' },
                              { label:'Tecniche utilizzate', defaultVal:'Fondazioni profonde, struttura in c.a.' },
                              { label:'Acciaio armatura', field:'acciaoArmatura', value:acciaoArmatura, isControlled:true },
                              { label:'Acciaio strutturale', defaultVal:'S355JR - IPE 200' },
                              { label:'Calcestruzzo', defaultVal:'C30/37 - Rck 37 N/mm²' },
                              { label:'Data installazione', defaultVal:'20/11/2023' },
                              { label:'Collaudatore', defaultVal:'Ing. Stefano Messina' }
                            ].map(({ label, field, value, defaultVal, isControlled }) => (
                              <Col span={6} key={label}>
                                <div style={{ display:'flex', flexDirection:'column', gap:'8px' }}>
                                  <Text type="secondary" style={{ fontSize:'13px' }}>{label}</Text>
                                  {isControlled ? (
                                    <Input value={value} readOnly={!isEditingProject} variant={isEditingProject ? 'outlined' : 'borderless'} onChange={e => handleInputChange(field, e.target.value)} style={fieldStyle(isEditingProject)} className={inputClass(field)} />
                                  ) : (
                                    <Input defaultValue={defaultVal} readOnly={!isEditingProject} variant={isEditingProject ? 'outlined' : 'borderless'} style={fieldStyle(isEditingProject)} className="readonly-input" />
                                  )}
                                </div>
                              </Col>
                            ))}
                          </Row>
                        </div>
                      </>
                    ) : (
                      <div style={{ minHeight:'400px' }}></div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </Content>
        </Layout>
      </Layout>

      {/* Drawer permessi */}
      <Drawer
        title={drawerType === 'concessione' ? (isReplaceMode ? 'Sostituisci Concessione' : 'Collega Concessione') : 'Collega Autorizzazione'}
        placement="right"
        styles={{ body:{ padding:'24px' }, wrapper:{ width:'70%' } }}
        onClose={handleCloseDrawer}
        open={drawerOpen}
        extra={
          <div style={{ display:'flex', gap:'12px' }}>
            <Button onClick={handleCloseDrawer}>Annulla</Button>
            <Button
              type={(drawerType==='concessione' && selectedRowKey) || (drawerType==='autorizzazione' && selectedAuthKeys.length>0) ? 'primary' : 'default'}
              icon={<PlusOutlined />}
              disabled={(drawerType==='concessione' && !selectedRowKey) || (drawerType==='autorizzazione' && selectedAuthKeys.length===0)}
              onClick={handleAddPermit}
            >Aggiungi</Button>
          </div>
        }
      >
        {drawerType === 'concessione' ? (
          <GrantsAccordion
            data={grantsData} selectedRowKey={selectedRowKey} onRowSelect={setSelectedRowKey}
            currentGrantKey={currentGrantKey} isReplaceMode={isReplaceMode}
            currentUtilityId={addedPermits.length > 0 && addedPermits[0].permitType === 'concessione' ? addedPermits[0].id : null}
          />
        ) : (
          <AuthorizationsList data={authorizationsData} selectedKeys={selectedAuthKeys} onSelectionChange={setSelectedAuthKeys} />
        )}
      </Drawer>

      {/* Modal gallery */}
      <Modal title="Galleria Foto Impianto" open={photoModalOpen} onCancel={() => setPhotoModalOpen(false)} footer={null} width={800}>
        <Carousel autoplay arrows>
          {carouselImages.map((img, idx) => (
            <div key={idx}>
              <div style={{ height:'500px', background:`url(${img}) center/contain no-repeat`, backgroundColor:'#000' }} />
            </div>
          ))}
        </Carousel>
      </Modal>

      {/* Modal mappa */}
      <Modal title="Mappa - Pensilina_LibertàPA01" open={mapModalOpen} onCancel={() => setMapModalOpen(false)} footer={null} width={1000}>
        <div style={{ height:'600px', position:'relative', borderRadius:'8px', overflow:'hidden', background:'#fafafa' }}>
          <iframe
            width="100%" height="100%"
            style={{ border:0, display:'block', filter:'grayscale(1) brightness(1.1) contrast(0.9) hue-rotate(200deg) saturate(0.2)' }}
            src="https://www.openstreetmap.org/export/embed.html?bbox=13.3595%2C38.1247%2C13.3635%2C38.1267&layer=mapnik"
            title="Mappa di Via Libertà, 36, Palermo"
          />
          <img src={MAP_MARKER} alt="Marker" style={{ position:'absolute', top:'50%', left:'50%', transform:'translate(-50%, -100%)', width:'48px', height:'auto', zIndex:1000, pointerEvents:'none' }} />
        </div>
      </Modal>
    </>
  );
}

function App() {
  window.applyGravityTokens?.();
  return (
    <ConfigProvider theme={window.GRAVITY_THEME}>
      <AntApp>
        <AppContent />
      </AntApp>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
