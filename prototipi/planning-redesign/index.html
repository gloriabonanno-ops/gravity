            React.createElement('div', { style: { display: 'flex', gap: 6, justifyContent: 'flex-end' } },
              React.createElement(Button, { size: 'small', onClick: () => { setShowNewForm(false); setNewLabelName(''); } }, 'Annulla'),
              React.createElement(Button, { size: 'small', type: 'primary', onClick: createLabel, disabled: !newLabelName.trim() }, 'Crea'),
            )
          )
    );
  };

  // ── Face/system selection helpers ───────────────────────
  const getAvailFaces  = (sys) => (sys.faceObjs||[]).filter(f => f.state === 'Available');
  const getSelFaces    = (sys) => (sys.faceObjs||[]).filter(f => selectedFaceIds.has(f.id));
  const sysCheckState  = (sys) => {
    const avail = getAvailFaces(sys);
    const sel   = getSelFaces(sys);
    if (sel.length === 0)  return 'none';
    if (avail.length > 0 && sel.length >= avail.length) return 'all';
    return 'partial';
  };
  const toggleSys = (sys) => {
    if (readOnly) return;
    setSelectedFaceIds(prev => {
      const next = new Set(prev);
      const cs   = sysCheckState(sys);
      if (cs === 'none' || cs === 'partial') {
        getAvailFaces(sys).forEach(f => next.add(f.id));
      } else {
        (sys.faceObjs||[]).forEach(f => next.delete(f.id));
      }
      return next;
    });
  };
  const toggleFace = (face) => {
    if (readOnly || face.state === 'Reserved') return;
    setSelectedFaceIds(prev => {
      const next = new Set(prev);
      if (next.has(face.id)) next.delete(face.id); else next.add(face.id);
      return next;
    });
  };
  const toggleExpand = (sysId, e) => {
    e.stopPropagation();
    setExpandedSysIds(prev => {
      const next = new Set(prev);
      if (next.has(sysId)) next.delete(sysId); else next.add(sysId);
      return next;
    });
  };

  // Derived: which systems have ≥1 face selected (for map markers)
  const selectedSystemIds = React.useMemo(() => {
    const ids = new Set();
    SEARCH_RESULTS.forEach(s => {
      if ((s.faceObjs||[]).some(f => selectedFaceIds.has(f.id))) ids.add(s.id);
    });
    return ids;
  }, [selectedFaceIds]);

  // ── poiRadiusM ───────────────────────────────────────────
  const poiRadiusM = React.useMemo(() => {
    const unit = POI_UNIT_CONFIG[poiRadiusUnit];
    return unit ? unit.toM(poiRadiusIdx) : 500;
  }, [poiRadiusUnit, poiRadiusIdx]);

  // Tutti i sistemi del canale (indipendente dai filtri — usato per conteggi totali)
  const channelSystems = React.useMemo(() =>
    SEARCH_RESULTS.filter(s => s.channel === planning.category),
  [planning.category]);

  // ── filteredPoiPoints ─────────────────────────────────────
  // Per ogni collezione attiva, restituisce solo i punti dentro le zone attive.
  // Garantisce l'incrocio zona × POI: "scuole nel quartiere X" mostra solo le
  // scuole di quel quartiere, non tutte le scuole della città.
  // Se non ci sono zone attive usa tutti i punti (nessuna restrizione geografica sui POI).
  const ZONE_RADIUS = (type) =>
    type === 'province' ? 40000 : type === 'city' ? 8000 : 1200;

  // Popola il ref dalle Promise globale (già in volo dal caricamento pagina)
  React.useEffect(() => {
    _palermoCirPromise.then(data => { if (data) palermoCirRef.current = data; });
  }, []);

  // Ray-casting point-in-polygon — ring in formato GeoJSON [lng, lat]
  const pointInPolygon = (lat, lng, ring) => {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const [xi, yi] = ring[i], [xj, yj] = ring[j];
      if ((yi > lat) !== (yj > lat) && lng < ((xj - xi) * (lat - yi)) / (yj - yi) + xi)
        inside = !inside;
    }
    return inside;
  };

  // Ray-casting point-in-polygon — ring in formato Google Maps { lat, lng }
  const pointInPolygonLatLng = (lat, lng, ring) => {
    let inside = false;
    for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
      const { lat: yi, lng: xi } = ring[i], { lat: yj, lng: xj } = ring[j];
      if ((yi > lat) !== (yj > lat) && lng < ((xj - xi) * (lat - yi)) / (yj - yi) + xi)
        inside = !inside;
    }
    return inside;
  };

  // Verifica se un punto è dentro una geometria di zona (polygon o polyline con buffer)
  const systemInZoneGeo = (sysLat, sysLng, geo) => {
    if (!geo) return false;
    if (geo.type === 'polygon') {
      // Basta che sia dentro almeno uno dei poligoni (outer ring)
      return geo.paths.some(rings => pointInPolygonLatLng(sysLat, sysLng, rings[0]));
    }
    if (geo.type === 'polyline') {
      // Per le vie: distanza < 300 m da uno qualsiasi dei segmenti
      return geo.paths.some(line =>
        line.some(pt => haversineMeters(sysLat, sysLng, pt.lat, pt.lng) < 300)
      );
    }
    return false;
  };

  // Trova la circoscrizione che contiene il punto → restituisce i paths Google Maps
  // Usa la Promise globale così funziona anche se chiamata prima del mount
  const findPalermoCir = async (lat, lng) => {
    const data = await _palermoCirPromise;
    if (!data) return null;
    for (const feat of data.features) {
      const rings = feat.geometry.coordinates;
      if (pointInPolygon(lat, lng, rings[0]))
        return rings.map(ring => ring.map(([lo, la]) => ({ lat: la, lng: lo })));
    }
    return null;
  };

  // Genera un poligono irregolare attorno a un centro (simula confini reali)
  const zonePolygonPath = (centerLat, centerLng, radiusM) => {
    const numPoints = 12;
    const latFactor = 1 / 111320;
    const lngFactor = 1 / (111320 * Math.cos(centerLat * Math.PI / 180));
    // Pseudo-random deterministico basato su lat/lng → stessa zona = stessa forma
    let s = Math.abs(Math.round(centerLat * 1000 + centerLng * 1000)) || 42;
    const rand = () => { s = (s * 16807) % 2147483647; return (s - 1) / 2147483646; };
    return Array.from({ length: numPoints }, (_, i) => {
      const angle = (i / numPoints) * 2 * Math.PI + (rand() - 0.5) * 0.18;
      const r = radiusM * (0.72 + rand() * 0.5);
      return { lat: centerLat + Math.sin(angle) * r * latFactor,
               lng: centerLng + Math.cos(angle) * r * lngFactor };
    });
  };

  // ── Nominatim (ricerca luoghi) + Overpass (strade) ───────────────────────
  const OVERPASS_URL  = 'https://overpass-api.de/api/interpreter';
  const NOMINATIM_URL = 'https://nominatim.openstreetmap.org/search';

  const _overpassFetch = async (query) => {
    const res = await fetch(OVERPASS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'data=' + encodeURIComponent(query),
    });
    if (!res.ok) throw new Error(`Overpass HTTP ${res.status}`);
    return res.json();
  };

  const _nominatimSearch = async (q, lat, lng, delta = 0.3) => {
    const viewbox = `${lng - delta},${lat - delta},${lng + delta},${lat + delta}`;
    const url = `${NOMINATIM_URL}?` + new URLSearchParams({
      q, format: 'geojson', polygon_geojson: 1,
      limit: 10, countrycodes: 'it', viewbox, bounded: 1,
    });
    const res = await fetch(url, { headers: { 'Accept-Language': 'it,en' } });
    if (!res.ok) throw new Error(`Nominatim HTTP ${res.status}`);
    return res.json();
  };

  // Estrae il feature poligonale più rilevante dalla risposta Nominatim.
  // Preferisce relation OSM (confini amministrativi/place) rispetto a way o node.
  const _bestNominatimPolygon = (geojson) => {
    const polys = (geojson.features || []).filter(f =>
      f.geometry?.type === 'Polygon' || f.geometry?.type === 'MultiPolygon'
    );
    if (!polys.length) return null;
    // Ordine preferenza: relation boundary > relation place > way > resto
    const rank = f => {
      const p = f.properties || {};
      if (p.osm_type === 'R' && p.class === 'boundary') return 0;
      if (p.osm_type === 'R' && p.class === 'place')    return 1;
      if (p.osm_type === 'R')                            return 2;
      if (p.osm_type === 'W')                            return 3;
      return 4;
    };
    return polys.sort((a, b) => rank(a) - rank(b))[0];
  };

  const fetchZoneGeometry = React.useCallback(async (name, lat, lng, type) => {
    const STREET_TYPES = new Set(['via', 'corso', 'viale', 'piazza', 'lungomare']);
    const isStreet = STREET_TYPES.has(type);

    // ── Strade: Overpass highway ───────────────────────────────
    if (isStreet) {
      // Rimuove eventuale suffisso città (es. "Via Notarbartolo, Palermo" → "Via Notarbartolo")
      const streetName = name.includes(',') ? name.split(',')[0].trim() : name;
      try {
        const q = `[out:json][timeout:20];way["name"="${streetName}"]["highway"](around:600,${lat},${lng});out geom;`;
        const data = await _overpassFetch(q);

        if (data.elements?.length) {
          const lines = geojsonToGoogleLines(osmtogeojson(data));
          if (lines.length) return { type: 'polyline', paths: lines };
        }
      } catch(e) { /* ignore */ }
      return null;
    }

    // ── Province e Città: Nominatim per nome ──────────────────
    if (type === 'province' || type === 'city') {
      const delta = type === 'province' ? 1.5 : 0.5;
      const shortName = name.includes(' ') ? name.split(' ').slice(1).join(' ') : null;
      for (const q of [name, shortName].filter(Boolean)) {
        try {
          const geojson = await _nominatimSearch(q, lat, lng, delta);

          const feature = _bestNominatimPolygon(geojson);
          if (feature) {
            const paths = geojsonToGooglePaths({ features: [feature] });
            if (paths.length) return { type: 'polygon', paths };
          }
        } catch(e) { /* ignore */ }
      }
      return null;
    }

    // ── Quartieri / Zone: GeoJSON locale Palermo (point-in-polygon) ──
    const localPaths = await findPalermoCir(lat, lng);
    if (localPaths) {

      return { type: 'polygon', paths: [localPaths] };
    }

    // ── Quartieri / Zone: is_in Overpass (fallback per zone fuori Palermo) ──
    // Trova tutte le aree OSM che CONTENGONO le coordinate, poi sceglie
    // la più specifica (admin_level più alto o place=suburb/quarter).
    try {
      const q = `[out:json][timeout:25];
is_in(${lat},${lng})->.a;
(
  relation(pivot.a)["boundary"="administrative"];
  relation(pivot.a)["place"~"suburb|quarter|neighbourhood|district"];
);
out geom;`;
      const data = await _overpassFetch(q);

      if (data.elements?.length) {
        // Ordina per specificità: admin_level più alto = più locale
        const sorted = data.elements
          .filter(e => e.tags?.name)
          .sort((a, b) => {
            const al = parseInt(a.tags?.admin_level || 0);
            const bl = parseInt(b.tags?.admin_level || 0);
            // Preferisci place=suburb/quarter rispetto a boundary admin generico
            const aPlace = a.tags?.place ? 10 : al;
            const bPlace = b.tags?.place ? 10 : bl;
            return bPlace - aPlace; // decrescente: più specifico prima
          });

        if (sorted.length) {
          const geo = osmtogeojson({ elements: [sorted[0]] });
          const paths = geojsonToGooglePaths(geo);
          if (paths.length) return { type: 'polygon', paths };
        }
      }
    } catch(e) { /* ignore */ }

    return null;
  }, []);

  // Converte Feature GeoJSON Polygon/MultiPolygon in array di polygons Google Maps.
  // Ogni elemento è un array di rings [outerRing, ...holes] → un solo google.maps.Polygon per feature.
  const geojsonToGooglePaths = (geojson) => {
    const polygons = [];
    geojson.features?.forEach(f => {
      const g = f.geometry;
      if (!g) return;
      if (g.type === 'Polygon') {
        polygons.push(g.coordinates.map(ring => ring.map(([lng, lat]) => ({ lat, lng }))));
      } else if (g.type === 'MultiPolygon') {
        g.coordinates.forEach(poly => {
          polygons.push(poly.map(ring => ring.map(([lng, lat]) => ({ lat, lng }))));
        });
      }
    });
    return polygons; // paths[i] = [outerRing, ...holeRings]
  };

  // Converte Feature GeoJSON LineString/MultiLineString in array di paths Google Maps
  const geojsonToGoogleLines = (geojson) => {
    const lines = [];
    geojson.features?.forEach(f => {
      const g = f.geometry;
      if (!g) return;
      const segs = g.type === 'LineString' ? [g.coordinates]
        : g.type === 'MultiLineString' ? g.coordinates : [];
      segs.forEach(seg => lines.push(seg.map(([lng, lat]) => ({ lat, lng }))));
    });
    return lines;
  };

  // Effect: scarica geometria reale per ogni zona aggiunta
  React.useEffect(() => {
    appliedZones.forEach(({ text, target }) => {
      if (!target?.lat || !target?.lng) return;
      if (zoneGeoCacheRef.current.has(text)) return;
      zoneGeoCacheRef.current.set(text, 'loading');
      fetchZoneGeometry(text, target.lat, target.lng, target.type)
        .then(geo => {
          zoneGeoCacheRef.current.set(text, geo);
          setZoneGeometries(prev => { const m = new Map(prev); m.set(text, geo); return m; });
        })
        .catch(() => {
          zoneGeoCacheRef.current.set(text, null);
        });
    });
    // Pulisce cache per zone rimosse
    zoneGeoCacheRef.current.forEach((_, key) => {
      if (!appliedZones.some(z => z.text === key)) zoneGeoCacheRef.current.delete(key);
    });
  }, [appliedZones, fetchZoneGeometry]);
  // ─────────────────────────────────────────────────────────────────────────

  const filteredPoiPoints = React.useMemo(() => {
    const result = new Map();
    activePois.forEach(poi => {
      const allPts = poi.isCategory && poi.points?.length > 0
        ? poi.points
        : (poi.lat && poi.lng ? [{ lat: poi.lat, lng: poi.lng, name: poi.label }] : []);
      if (appliedZones.length === 0) {
        result.set(poi.collectionId, allPts);
        return;
      }
      const inZone = allPts.filter(pt =>
        appliedZones.some(({ target }) => {
          if (!target || target.lat == null || target.lng == null) return true; // zona testo → includi tutto
          return haversineMeters(pt.lat, pt.lng, target.lat, target.lng) <= ZONE_RADIUS(target.type);
        })
      );
      // Fallback: se nessun punto cade nella zona, usa tutti (evita che la collezione sparisca)
      result.set(poi.collectionId, inZone.length > 0 ? inZone : allPts);
    });
    return result;
  }, [activePois, appliedZones]);

  // ── Filtering combinato (AND proprietà · OR zone · incrocio POI-zona) ─
  const filteredSystems = React.useMemo(() => {
    const { days: _days } = parsePlanningDates(planning);
    const _isLongTerm = _days >= LONG_TERM_THRESHOLD;
    return SEARCH_RESULTS.filter(sys => {
      if (sys.channel !== planning.category) return false;
      if (!_isLongTerm && sys.saleModel === 'long_term_only') return false;
      if (visibleStates.length > 0 && !visibleStates.includes(sys.state)) return false;
      if (selectedTypes.length > 0 && !selectedTypes.includes(sys.type)) return false;
      if (selectedFormats.length > 0 && !selectedFormats.includes(sys.faceObjs?.[0]?.format)) return false;
      if (selectedIllumination.length > 0) {
        const k = sys.illuminated ? 'Illuminate' : 'Non illuminate';
        if (!selectedIllumination.includes(k)) return false;
      }
      if (minFacesEnabled && sys.faces < minFacesValue) return false;
      if (appliedZones.length > 0) {
        if (!sys.lat || !sys.lng) return false;
        const matchesAny = appliedZones.some(({ text: q, target }) => {
          const geo = zoneGeometries.get(q);
          // Se abbiamo geometria reale, usa point-in-polygon
          if (geo) return systemInZoneGeo(sys.lat, sys.lng, geo);
          // Fallback: haversine dal centro (geometria ancora in carico)
          if (target?.lat != null && target?.lng != null)
            return haversineMeters(sys.lat, sys.lng, target.lat, target.lng) <= ZONE_RADIUS(target.type);
          return false;
        });
        if (!matchesAny) return false;
      }
      // POI filter: usa solo i punti già filtrati per zona (filteredPoiPoints)
      if (activePois.length > 0 && sys.lat && sys.lng) {
        const inAny = activePois.some(poi => {
          const pts = filteredPoiPoints.get(poi.collectionId) || [];
          return pts.some(pt => haversineMeters(sys.lat, sys.lng, pt.lat, pt.lng) <= poiRadiusM);
        });
        if (!inAny) return false;
      }
      return true;
    });
  }, [planning.category, planning.start, planning.end,
      visibleStates, selectedTypes, selectedFormats,
      selectedIllumination, minFacesEnabled, minFacesValue,
      appliedZones, zoneGeometries, activePois, poiRadiusM, filteredPoiPoints]);

  // ── Auto-framing mappa ───────────────────────────────────
  // Helper condiviso: ritorna i bounds di tutti i contenuti visibili.
  // Include: spazi filtrati, punti POI, e centri delle zone attive (anche se nessuno spazio corrisponde).
  const computeVisibleBounds = () => {
    const bounds = new google.maps.LatLngBounds();
    filteredSystems.forEach(s => { if (s.lat && s.lng) bounds.extend({ lat: s.lat, lng: s.lng }); });
    activePois.forEach(poi => {
      (filteredPoiPoints.get(poi.collectionId) || []).forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
    });
    // Aggiunge sempre i centri delle zone attive (zona visibile anche senza spazi)
    appliedZones.forEach(z => {
      if (z.target?.lat && z.target?.lng) bounds.extend({ lat: z.target.lat, lng: z.target.lng });
    });
    return bounds;
  };

  const applyBounds = (bounds) => {
    const map = mapRef.current;
    if (!map || bounds.isEmpty()) return;
    const rightPad = panelOpen ? 440 : 80;
    map.fitBounds(bounds, { top: 80, right: rightPad, bottom: 80, left: 80 });
  };

  // Inquadra quando cambiano le zone attive
  React.useEffect(() => {
    if (!mapRef.current) return;
    applyBounds(computeVisibleBounds());
  }, [appliedZones]); // eslint-disable-line

  // Inquadra quando cambiano i POI attivi
  React.useEffect(() => {
    if (!mapRef.current) return;
    applyBounds(computeVisibleBounds());
  }, [activePois]); // eslint-disable-line

  // Pan centrato sul sistema in focus (click su record o marker)
  // Zoom minimo 16 per garantire l'uscita dai cluster
  React.useEffect(() => {
    if (!focusedId) return;
    const sys = SEARCH_RESULTS.find(s => s.id === focusedId);
    if (!sys?.lat || !sys?.lng) return;
    flyTo(sys.lat, sys.lng, 16);
  }, [focusedId]); // eslint-disable-line

  // Posizione pixel della card vicino al marker — aggiornata ad ogni pan/zoom
  const [focusCardPos, setFocusCardPos] = useState(null);
  const updateCardPos = React.useCallback(() => {
    if (!focusedId || !mapRef.current) { setFocusCardPos(null); return; }
    const sys = SEARCH_RESULTS.find(s => s.id === focusedId);
    if (!sys?.lat || !sys?.lng) { setFocusCardPos(null); return; }
    const map = mapRef.current;
    const proj = map.getProjection();
    const bounds = map.getBounds();
    if (!proj || !bounds) return;
    const scale = Math.pow(2, map.getZoom());
    const nw = proj.fromLatLngToPoint(
      new google.maps.LatLng(bounds.getNorthEast().lat(), bounds.getSouthWest().lng())
    );
    const pt = proj.fromLatLngToPoint(new google.maps.LatLng(sys.lat, sys.lng));
    const [, baseH] = getMarkerSize(map.getZoom());
    const markerH = Math.round(baseH * 1.4); // focused marker è 1.4×
    setFocusCardPos({
      x: Math.floor((pt.x - nw.x) * scale),
      y: Math.floor((pt.y - nw.y) * scale) - markerH - 8,
    });
  }, [focusedId]); // eslint-disable-line

  React.useEffect(() => {
    if (!focusedId) { setFocusCardPos(null); return; }
    updateCardPos();
    const map = mapRef.current;
    if (!map) return;
    const l = map.addListener('bounds_changed', updateCardPos);
    return () => google.maps.event.removeListener(l);
  }, [focusedId, updateCardPos]); // eslint-disable-line

  // ── activeFilterChips ────────────────────────────────────
  // Semantica [] = nessun filtro (mostra tutto), non-vuoto = filtra per questi valori.
  // Array filtri attivi — guida badge bottone/drawer e strip sotto searchbar
  const activeFilterChips = React.useMemo(() => {
    const chips = [];
    selectedTypes.forEach(t => chips.push({ key: `tipo:${t}`, label: t }));
    selectedIllumination.forEach(i => chips.push({ key: `ill:${i}`, label: i === 'Illuminate' ? 'Illuminato' : 'Non illuminato' }));
    selectedFormats.forEach(f => chips.push({ key: `fmt:${f}`, label: f, mono: true }));
    if (minFacesEnabled) chips.push({ key: 'faces', label: `Min ${minFacesValue} ${minFacesValue === 1 ? 'faccia' : 'facce'}` });
    return chips;
  }, [selectedTypes, selectedIllumination, selectedFormats, minFacesEnabled, minFacesValue]);

  const removeFilterChip = React.useCallback((key) => {
    if (key.startsWith('stato:'))     setVisibleStates(prev => prev.filter(x => x !== key.slice(6)));
    else if (key.startsWith('tipo:')) setSelectedTypes(prev => prev.filter(x => x !== key.slice(5)));
    else if (key.startsWith('ill:'))  setSelectedIllumination(prev => prev.filter(x => x !== key.slice(4)));
    else if (key.startsWith('fmt:'))  setSelectedFormats(prev => prev.filter(x => x !== key.slice(4)));
    else if (key === 'faces')         setMinFacesEnabled(false);
  }, []);

  const mapContainerRef    = React.useRef(null);
  const mapRef             = React.useRef(null);   // google.maps.Map
  const markersRef         = React.useRef([]);      // google.maps.Marker[]
  const clustererRef       = React.useRef(null);    // MarkerClusterer
  const poiOverlaysRef     = React.useRef([]);      // POI circles + markers
  const zoneCirclesRef     = React.useRef([]);      // zone highlight circles
  const palermoCirRef      = React.useRef(null);    // GeoJSON circoscrizioni Palermo
  const poiSuggestRef      = React.useRef(null);    // debounce timer for POI autocomplete

  // Misura il right del dropdown allineandolo all'inizio del pulsante Collezioni POI
  React.useEffect(() => {
    const measure = () => {
      if (!poiTriggerRef.current) return;
      const wrap = poiTriggerRef.current.closest('.ss-searchbar-wrap');
      if (!wrap) return;
      const wrapRect = wrap.getBoundingClientRect();
      const btnRect  = poiTriggerRef.current.getBoundingClientRect();
      setDropdownRight(Math.round(wrapRect.right - btnRect.left));
    };
    measure();
    window.addEventListener('resize', measure);
    return () => window.removeEventListener('resize', measure);
  }, []);

  // ── Zone autocomplete — Google Places AutocompleteService ───────────────────
  const [suggestions, setSuggestions] = useState([]);
  const zoneAcRef = React.useRef(null);

  React.useEffect(() => {
    if (searchMode !== 'zona') { setSuggestions([]); return; }
    const q = searchQuery.trim();
    if (q.length < 2) {
      setSuggestions([{ key: 'brief', label: 'Suggeriti dal Brief', brief: true, items: BRIEF_ZONE_ITEMS }]);
      return;
    }
    // Show static fallback immediately
    setSuggestions(getSuggestions(q));
    // Then fetch real Google Places predictions
    clearTimeout(zoneAcRef.current);
    zoneAcRef.current = setTimeout(() => {
      if (!window.google?.maps?.places) return;
      const svc = new google.maps.places.AutocompleteService();
      const SICILY_BOUNDS = new google.maps.LatLngBounds(
        { lat: 36.60, lng: 11.90 },   // SW — Sicilia Occidentale (PA, TP, AG)
        { lat: 38.35, lng: 14.20 }    // NE
      );
      svc.getPlacePredictions(
        { input: q, bounds: SICILY_BOUNDS, strictBounds: true, language: 'it' },
        (predictions, status) => {
          if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions) return;
          // strictBounds non è affidabile per query brevi: filtro aggiuntivo su "Sicilia"
          const sicilian = predictions.filter(p =>
            p.description.toLowerCase().includes('sicil') ||
            (p.structured_formatting?.secondary_text || '').toLowerCase().includes('sicil')
          );
          const groups = {};
          sicilian.forEach(pred => {
            const types = pred.types || [];
            let type, gk, gl;
            if (types.includes('locality') || types.includes('administrative_area_level_3')) {
              type = 'city';     gk = 'city';     gl = 'Città e Comuni';
            } else if (types.includes('administrative_area_level_2') || types.includes('administrative_area_level_1')) {
              type = 'province'; gk = 'province'; gl = 'Province e Regioni';
            } else if (types.includes('sublocality') || types.includes('neighborhood')) {
              type = 'zona';     gk = 'zona';     gl = 'Quartieri e Aree';
            } else if (types.includes('route')) {
              type = 'via';      gk = 'street';   gl = 'Strade e Vie';
            } else {
              return; // ignora tipi non appartenenti ai 4 gruppi gestiti
            }
            if (!groups[gk]) groups[gk] = { key: gk, label: gl, items: [] };
            groups[gk].items.push({
              text:    pred.structured_formatting?.main_text || pred.description,
              detail:  pred.structured_formatting?.secondary_text || '',
              type,
              placeId: pred.place_id,
            });
          });
          const ordered = ['city','province','zona','street']
            .map(k => groups[k]).filter(Boolean);
          if (ordered.length > 0) setSuggestions(ordered);
        }
      );
    }, 280);
    return () => clearTimeout(zoneAcRef.current);
  }, [searchQuery, searchMode]);

  const flyTo = (lat, lng, zoom) => {
    const map = mapRef.current;
    if (map) {
      // Offset verso sinistra per compensare il pannello laterale
      const rightPad = panelOpen ? 440 : 80;
      map.setZoom(zoom || 15);
      // Proietta le coordinate tenendo conto del padding del pannello
      const proj = map.getProjection();
      if (proj) {
        const scale = Math.pow(2, map.getZoom());
        const worldPt = proj.fromLatLngToPoint({ lat, lng });
        const offsetX = (rightPad / 2 - 40) / scale;
        const shifted = new google.maps.Point(worldPt.x - offsetX, worldPt.y);
        map.panTo(proj.fromPointToLatLng(shifted));
      } else {
        map.panTo({ lat, lng });
      }
    }
    setShowSugg(false);
  };

  const resetMapView = () => {
    const map = mapRef.current;
    if (!map) return;
    const bounds = new google.maps.LatLngBounds();
    SEARCH_RESULTS.filter(r => r.lat && r.lng).forEach(r => bounds.extend({ lat: r.lat, lng: r.lng }));
    if (!bounds.isEmpty()) {
      map.fitBounds(bounds);
    }
  };

  const makeIcon = (sys, isSelected, isHovered, isFocused, hasFocus) => {
    const zoom = mapRef.current ? mapRef.current.getZoom() : 14;
    let [w, h] = getMarkerSize(zoom);
    if (isFocused)      { w = Math.round(w * 1.4); h = Math.round(h * 1.4); }
    else if (isHovered) { w = Math.round(w * 1.12); h = Math.round(h * 1.12); }

    const dimOpacity = (hasFocus && !isFocused && !isSelected) ? 0.2 : 1;
    const src = markerSrc(sys.type, sys.state);
    const svgContent = _assetSvgCache[src];

    if (svgContent) {
      // Estrae il contenuto interno dell'SVG (senza il tag <svg> esterno)
      const inner = svgContent
        .replace(/<\?xml[^>]*\?>\s*/i, '')
        .replace(/<svg[^>]*>/i, '')
        .replace(/<\/svg>\s*$/i, '');

      // Drop shadow per focused
      const focusDefs = isFocused
        ? `<defs><filter id="fs" x="-50%" y="-50%" width="200%" height="200%">
             <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#3E00FB" flood-opacity="0.5"/>
           </filter></defs>`
        : '';
      const focusFilter = isFocused ? 'filter="url(#fs)"' : '';

      // Anello di selezione al centro del pallino (y≈33 nel viewBox 78×120)
      const selRing = isSelected && !isFocused
        ? `<circle cx="39.75" cy="46" r="22" fill="none" stroke="#3E00FB" stroke-width="4" stroke-opacity="0.9"/>`
        : '';

      const wrapped = `<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}" viewBox="0 0 78 120" opacity="${dimOpacity}">
        ${focusDefs}
        <g ${focusFilter}>${inner}</g>
        ${selRing}
      </svg>`;

      return {
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(wrapped),
        scaledSize: new google.maps.Size(w, h),
        anchor: new google.maps.Point(w / 2, Math.round(h * 0.92)),
      };
    }

    // Fallback URL (prima che gli SVG siano caricati)
    return {
      url: src,
      scaledSize: new google.maps.Size(w, h),
      anchor: new google.maps.Point(w / 2, Math.round(h * 0.92)),
    };
  };

  // Init Google Maps
  React.useEffect(() => {
    if (!mapContainerRef.current || mapRef.current) return;

    // Framing iniziale: inquadra tutta la Sicilia (tutti gli spazi)
    const allBounds = new google.maps.LatLngBounds();
    SEARCH_RESULTS.filter(r => r.lat && r.lng).forEach(r => allBounds.extend({ lat: r.lat, lng: r.lng }));
    const center = allBounds.isEmpty()
      ? { lat: 37.9, lng: 13.1 }
      : { lat: (allBounds.getNorthEast().lat() + allBounds.getSouthWest().lat()) / 2,
          lng: (allBounds.getNorthEast().lng() + allBounds.getSouthWest().lng()) / 2 };

    const map = new google.maps.Map(mapContainerRef.current, {
      center,
      zoom: 10,
      mapTypeId: 'roadmap',
      disableDefaultUI: false,
      zoomControl: true,
      streetViewControl: false,
      mapTypeControl: false,
      fullscreenControl: false,
      styles: [
        { featureType: 'water',       elementType: 'geometry', stylers: [{ color: '#b0d4f1' }] },
        { featureType: 'landscape',   elementType: 'geometry', stylers: [{ color: '#f5f5f0' }] },
        { featureType: 'road',        elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
        { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#f0f0ee' }] },
        { featureType: 'poi',         elementType: 'labels',   stylers: [{ visibility: 'off' }] },
        { featureType: 'transit',     elementType: 'labels',   stylers: [{ visibility: 'off' }] },
      ],
    });

    if (!allBounds.isEmpty()) map.fitBounds(allBounds);

    map.addListener('click', () => setFocusedId(null));

    mapRef.current = map;

    const clusterer = new markerClusterer.MarkerClusterer({
      map,
      markers: [],
      algorithm: new markerClusterer.SuperClusterAlgorithm({ maxZoom: 15 }),
      renderer: {
        render: ({ count, position }) => {
          const icon = makeClusterSvg(count);
          return new google.maps.Marker({
            position,
            icon,
            label: { text: ' ', color: 'transparent' },
            zIndex: Number(google.maps.Marker.MAX_ZINDEX) + count,
          });
        },
      },
    });
    clustererRef.current = clusterer;

    return () => {
      if (clustererRef.current) { clustererRef.current.clearMarkers(); clustererRef.current = null; }
      mapRef.current = null;
    };
  }, []);

  // ── Zone overlays (Google Maps) — usa geometria reale Overpass, fallback approssimato ──
  React.useEffect(() => {
    const map = mapRef.current;
    if (!map) return;
    zoneCirclesRef.current.forEach(c => c.setMap(null));
    zoneCirclesRef.current = [];
    appliedZones.forEach(z => {
      const target = z.target;
      if (!target || !target.lat || !target.lng) return;
      const strokeColor = 'rgba(0,0,0,0.28)';
      const strokeWeight = 1.5;
      const fillColor   = '#000000';
      const fillOpacity = 0.04;

      const geo = zoneGeometries.get(z.text);

      if (geo?.type === 'polygon' && geo.paths?.length) {
        // Geometria reale — ogni elemento è [outerRing, ...holes] → un Polygon per feature
        geo.paths.forEach(polygonRings => {
          const polygon = new google.maps.Polygon({
            map, paths: polygonRings,
            strokeColor, strokeOpacity: 1, strokeWeight,
            fillColor, fillOpacity,
          });
          zoneCirclesRef.current.push(polygon);
        });

      } else if (geo?.type === 'polyline' && geo.paths?.length) {
        // Via/strada — disegna come Polyline spessa
        geo.paths.forEach(line => {
          const pl = new google.maps.Polyline({
            map, path: line,
            strokeColor, strokeOpacity: 1, strokeWeight: 4,
          });
          zoneCirclesRef.current.push(pl);
        });

      } else {
        // Fallback approssimato (in attesa del fetch o fetch fallito)
        const r = ZONE_RADIUS(target.type);
        const path = zonePolygonPath(target.lat, target.lng, r);
        const polygon = new google.maps.Polygon({
          map, paths: path,
          strokeColor, strokeOpacity: 1, strokeWeight,

              React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', marginTop: 1 } },
                poi.radiusLabel,
                poi.isCategory && React.createElement('span', null, ` · ${poi.points?.length ?? 0} punti`)
              )
            ),
            React.createElement(Button, {
              type: 'text', size: 'small',
              icon: React.createElement(icons.CloseOutlined),
              onClick: () => removePoi(poi.id),
              style: { color: 'rgba(0,0,0,0.35)', flexShrink: 0 },
            })
          );
        }),
        React.createElement(antd.Divider, { style: { margin: '12px 0' } }),
      ),

      // Info raggio attivo
      React.createElement('div', { style: { padding: '8px 10px', background: '#F9F7FF', borderRadius: 8, display: 'flex', alignItems: 'center', gap: 8, fontSize: 12, color: 'rgba(0,0,0,0.55)', marginBottom: 16 } },
        React.createElement(icons.ExpandOutlined, { style: { color: '#3E00FB', fontSize: 13 } }),
        'Raggio: ',
        React.createElement('strong', { style: { color: '#3E00FB' } },
          POI_UNIT_CONFIG[poiRadiusUnit].fmt(poiRadiusIdx),
          ' (',
          poiRadiusUnit === 'm' ? 'distanza' : poiRadiusUnit === 'walk' ? 'a piedi' : 'in auto',
          ')'
        )
      ),

      // Sezione cerca luogo specifico
      React.createElement('div', { style: { position: 'relative', marginBottom: 20 } },
        React.createElement('div', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.05em', color: 'rgba(0,0,0,0.3)', marginBottom: 8 } }, 'Luogo specifico'),
        React.createElement(antd.Input, {
          placeholder: 'Cerca un luogo (es. Teatro Politeama)…',
          prefix: React.createElement(icons.SearchOutlined, { style: { color: 'rgba(0,0,0,0.35)' } }),
          value: poiQuery,
          onChange: e => { setPoiQuery(e.target.value); setShowPoiSuggestions(true); },
          onFocus: () => setShowPoiSuggestions(true),
          onBlur: () => setTimeout(() => setShowPoiSuggestions(false), 200),
          allowClear: true,
        }),
        showPoiSuggestions && poiSuggestions.length > 0 && React.createElement('div', {
          style: { position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, background: '#fff', border: '1px solid #E8E8E8', borderRadius: 8, boxShadow: '0 4px 20px rgba(0,0,0,0.12)', zIndex: 9999, overflow: 'hidden' }
        },
          poiSuggestions.map(item => {
            const isCollection = item.resultType === 'collection';
            const iconColor    = isCollection ? (item.color || '#3E00FB') : '#FF4A1C';
            const IconComp     = isCollection
              ? (icons[item.antIcon] || icons.AimOutlined)
              : icons.EnvironmentOutlined;
            return React.createElement('div', {
              key: item.key,
              className: 'ss-suggestion-item',
              onMouseDown: () => {
                selectPoi(item);
                setPoiDrawerOpen(false);
              },
            },
              React.createElement(IconComp, { style: { fontSize: 18, color: iconColor, flexShrink: 0, width: 24, textAlign: 'center' } }),
              React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                React.createElement('div', { style: { fontSize: 13, fontWeight: 500, color: 'rgba(0,0,0,0.88)' } }, item.label),
                React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', marginTop: 1 } },
                  isCollection ? `Collezione · ${item.points?.length ?? 0} punti` : 'Luogo specifico'
                )
              )
            );
          })
        ),

        // Luoghi dal brief
        BRIEF_POI_SINGLES.length > 0 && React.createElement('div', { style: { marginTop: 8 } },
          BRIEF_POI_SINGLES.map(s =>
            React.createElement('span', {
              key: s.id,
              className: 'poi-single-chip' + (activePois.some(p => p.label === s.label) ? ' active' : ''),
              onClick: () => {
                if (activePois.some(p => p.label === s.label)) {
                  setActivePois(prev => prev.filter(p => p.label !== s.label));
                } else {
                  const unit = POI_UNIT_CONFIG[poiRadiusUnit];
                  const meters = unit ? unit.toM(poiRadiusIdx) : 500;
                  setActivePois(prev => [...prev, {
                    id: `poi-${Date.now()}`,
                    label: s.label,
                    color: '#FF4A1C',
                    antIcon: 'EnvironmentOutlined',
                    lat: s.lat, lng: s.lng,
                    points: [{ lat: s.lat, lng: s.lng, name: s.label }],
                    radiusLabel: unit ? unit.fmt(poiRadiusIdx) : `${meters} m`,
                    meters,
                    isCategory: false,
                  }]);
                }
              },
            },
              React.createElement(icons.PushpinOutlined, { style: { fontSize: 11, color: '#FF4A1C' } }),
              s.label
            )
          )
        )
      ),

      // Griglia categorie POI
      React.createElement('div', { style: { fontSize: 11, fontWeight: 700, textTransform: 'uppercase', letterSpacing: '.05em', color: 'rgba(0,0,0,0.3)', marginBottom: 8 } }, 'Categorie'),
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 4 } },
        POI_COLLECTIONS.map(coll => {
          const CatIconComp = icons[coll.antIcon] || icons.AimOutlined;
          const isActive = activePois.some(p => p.collectionId === coll.id);
          return React.createElement('div', {
            key: coll.id,
            onClick: () => {
              if (isActive) {
                setActivePois(prev => prev.filter(p => p.collectionId !== coll.id));
              } else {
                selectPoi({ ...coll, resultType: 'collection' });
              }
            },
            style: {
              display: 'flex', alignItems: 'center', gap: 12,
              padding: '10px 12px', borderRadius: 8, cursor: 'pointer',
              background: isActive ? `${coll.color}10` : 'transparent',
              border: `1px solid ${isActive ? coll.color + '55' : 'transparent'}`,
              transition: 'all 0.15s',
            },
          },
            React.createElement('div', {
              style: {
                width: 36, height: 36, borderRadius: '50%', flexShrink: 0,
                background: `${coll.color}18`,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
              }
            },
              React.createElement(CatIconComp, { style: { fontSize: 16, color: coll.color } })
            ),
            React.createElement('div', { style: { flex: 1, minWidth: 0 } },
              React.createElement('div', { style: { fontSize: 14, fontWeight: 500, color: isActive ? coll.color : 'rgba(0,0,0,0.88)' } }, coll.label),
              React.createElement('div', { style: { fontSize: 12, color: 'rgba(0,0,0,0.38)', marginTop: 1 } },
                coll.city + ' · ' + coll.points.length + ' punti'
              )
            ),
            isActive && React.createElement(icons.CheckOutlined, { style: { color: coll.color, fontSize: 14, flexShrink: 0 } })
          );
        })
      ),

      ) // close ss-map-area
    ), // close ss-card-map
      )    // close ss-main-nr
    )    // close ss-workspace-nr
    )    // close ss-content-nr
  );   // close ss-root-nr
}

// ══════════════════════════════════════════════════════
// APP ROOT
// ══════════════════════════════════════════════════════

function AppRoot() {
  const [view, setView] = useState('list');  // 'list' | 'select-systems'
  const [selectedPlanning, setSelectedPlanning] = useState(null);
  // Overrides di stato per plannings: riflette cambiamenti runtime nella lista
  const [stateOverrides, setStateOverrides] = useState({});

  // Compute which nav key is active based on current view
  const activeNavKey = (view === 'list' || view === 'select-systems')
    ? 'plannings'
    : 'overview';

  function handleNavSelect(key) {
    if (key === 'plannings') {
      setView('list');
      setSelectedPlanning(null);
    }
    // other keys: Overview, Inventory, Campaigns — navigazione futura
  }

  function handleSelectPlanning(planning) {
    setSelectedPlanning(planning);
    setView('select-systems');
  }

  function handleApplySelection(selectedFaceIds) {
    setSelectedPlanning(prev => {
      if (!prev) return prev;
      const updated = { ...prev, hasSystems: true, state: 'In trattativa', faces: selectedFaceIds ? selectedFaceIds.size : prev.faces };
      setStateOverrides(o => ({ ...o, [prev.id]: 'In trattativa' }));
      return updated;
    });
    setView('list');
  }

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App, null,
      React.createElement('div', { className: 'app-shell' },
        React.createElement(TopNav, { activeNavKey, onNavSelect: handleNavSelect }),
        React.createElement('main', { className: 'app-main' },
          view === 'list' && React.createElement(PlanningsList, {
            onSelect: handleSelectPlanning,
            stateOverrides,
          }),
          view === 'select-systems' && selectedPlanning && React.createElement(SelectSystems, {
            planning: selectedPlanning,
            onBack: () => setView('list'),
            onApply: handleApplySelection,
          })
        )
      )
    )
  );
}

// ── Mount ──────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppRoot));
</script>
</body>
