<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Mappa Impianti OOH</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.js"></script>
  <script src="../tokens.js"></script>

  <!-- Google Maps + MarkerClusterer -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDeN8PAeuZkOtG8uyRzvXP2rOzP37HMBdI&libraries=places"></script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #F5F5F5;
      font-size: 14px;
      line-height: 1.5714;
    }

    /* ── App shell ── */
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Navbar ── */
    .top-nav {
      height: 73px; background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; z-index: 200;
    }
    .top-nav-logo { display: flex; align-items: center; padding: 0 20px; height: 100%; flex-shrink: 0; }
    .top-nav-logo img { display: block; }
    .top-nav-menu-wrap { flex: 1; align-self: stretch; display: flex; align-items: stretch; }
    .top-nav-menu-wrap .ant-menu-horizontal { border-bottom: none !important; height: 73px; line-height: 73px; }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu { height: 73px; line-height: 73px; padding: 0 16px; top: 0; }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item::after,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu::after { bottom: 0 !important; border-bottom-width: 2px !important; }
    .top-nav-right { display: flex; align-items: center; gap: 24px; padding: 0 20px; flex-shrink: 0; }
    .top-nav-bell {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center;
      color: rgba(0,0,0,0.65); padding: 4px; border-radius: 6px; transition: background 0.15s;
    }
    .top-nav-bell:hover { background: rgba(0,0,0,0.04); }

    /* ── Workspace (below navbar) ── */
    .ooh-workspace {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      gap: 12px; padding: 16px;
      background: #F5F5F5;
      overflow: hidden;
    }

    /* ── Search card (top) ── */
    .ooh-search-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #F0F0F0;
      flex-shrink: 0;
      align-self: stretch;
      display: flex;
      align-items: flex-start;
    }
    .ooh-search-area {
      padding: 14px 20px 12px;
      display: flex; flex-direction: column; gap: 8px;
      width: 60%;
    }
    .ss-search-bar { display: flex; gap: 8px; align-items: center; }

    /* Pill search */
    .ss-search-pill {
      display: flex; align-items: center;
      border: 1.5px solid #D9D9D9; border-radius: 8px;
      background: #fff; flex: 1; height: 40px;
      overflow: visible; transition: border-color 0.2s;
      flex-shrink: 1; position: relative;
    }
    .ss-search-pill.poi { border-color: #3E00FB; }
    .ss-search-pill:focus-within { border-color: #3E00FB; box-shadow: 0 0 0 3px rgba(62,0,251,0.08); }
    .ss-pill-tabs {
      display: flex; align-items: center;
      padding: 3px 4px; gap: 2px; flex-shrink: 0;
      align-self: stretch;
      background: rgba(0,0,0,0.04); border-radius: 6px; margin: 4px;
    }
    .ss-pill-tab {
      padding: 0 12px; height: 26px; border-radius: 4px;
      border: none; background: none; cursor: pointer;
      font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45);
      display: flex; align-items: center; gap: 5px;
      transition: all 0.2s; white-space: nowrap;
    }
    .ss-pill-tab.active {
      background: #fff; color: rgba(0,0,0,0.88); font-weight: 500;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12), 0 0 0 0.5px rgba(0,0,0,0.06);
    }
    .ss-pill-tab:hover:not(.active) { color: rgba(0,0,0,0.65); }
    .ss-pill-sep { width: 1px; align-self: stretch; background: #E8E8E8; flex-shrink: 0; margin: 8px 0; }
    .ss-pill-input { flex: 1; height: 100%; min-width: 0; overflow: visible; position: relative; }
    .ss-pill-input .ant-input-affix-wrapper {
      border: none !important; box-shadow: none !important;
      background: transparent !important; border-radius: 0 !important;
      height: 40px !important; padding: 0 14px !important; font-size: 14px;
      display: flex !important; align-items: center !important;
    }
    .ss-pill-input .ant-input { background: transparent !important; }

    /* Filtri + Cerca inside pill */
    .ss-filter-inline.ant-btn {
      border: none !important; box-shadow: none !important;
      border-radius: 0 !important; height: 40px !important;
      margin: 0; padding: 0 14px;
      background: transparent !important; color: rgba(0,0,0,0.65) !important;
      font-weight: 400; white-space: nowrap; flex-shrink: 0;
      display: inline-flex !important; align-items: center !important;
    }
    .ss-filter-inline.ant-btn:hover { color: #3E00FB !important; background: rgba(0,0,0,0.03) !important; }
    .ss-cerca-inline.ant-btn {
      border: none !important; box-shadow: none !important;
      border-radius: 0 8px 8px 0 !important; height: 40px !important;
      margin: 0; padding: 0 22px; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
      display: inline-flex !important; align-items: center !important;
    }

    /* Brief chips */
    .ss-brief-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ss-brief-label {
      font-size: 11px; color: rgba(0,0,0,0.35); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; margin-right: 2px;
    }
    .ss-brief-chip {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 3px 10px; border-radius: 12px;
      border: 1px solid #E8E8E8; font-size: 12px;
      color: rgba(0,0,0,0.65); cursor: pointer;
      background: #FAFAFA; transition: all 0.15s; user-select: none;
    }
    .ss-brief-chip:hover { border-color: #3E00FB; color: #3E00FB; background: #F0EAFF; }
    .ss-brief-chip.active { border-color: #3E00FB; color: #3E00FB; background: #F0EAFF; font-weight: 600; }

    /* ── Suggestions dropdown ── */
    .ss-suggestions-wrap {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1px solid #E8E8E8; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12); z-index: 600;
      overflow: hidden;
    }
    .ss-sugg-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: rgba(0,0,0,0.3);
      padding: 10px 14px 3px; line-height: 1.2;
    }
    .ss-suggestion-item {
      display: flex; align-items: center; gap: 10px;
      padding: 7px 14px; cursor: pointer;
      font-size: 13px; color: rgba(0,0,0,0.88);
      transition: background 0.1s;
    }
    .ss-suggestion-item:hover { background: #F7F5FF; }
    .ss-zone-active-bar {
      display: flex; align-items: center; gap: 8px;
      padding: 4px 6px 0;
    }
    .ss-zone-active-tag {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 10px 2px 8px; border-radius: 12px;
      background: #F0EAFF; border: 1px solid #C5B4FF;
      font-size: 12px; color: #3E00FB; font-weight: 500; cursor: default;
    }
    .ss-zone-active-tag .clear-btn {
      margin-left: 4px; cursor: pointer; font-size: 11px;
      color: #3E00FB; opacity: 0.6; line-height: 1;
    }
    .ss-zone-active-tag .clear-btn:hover { opacity: 1; }

    /* ── Map area ── */
    .ooh-map-area {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
      border-radius: 8px;
    }
    #ooh-map { width: 100%; height: 100%; }

    /* Google Maps overrides */
    .gm-style .gm-style-iw-c { border-radius: 8px !important; box-shadow: 0 2px 12px rgba(0,0,0,0.15) !important; padding: 0 !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; }
    .gm-style-iw-tc::after { display: none !important; }
    .gm-ui-hover-effect { display: none !important; }
    .gm-style .gmnoprint { opacity: 0.7; }
    .gm-style-cc { font-size: 9px !important; }

    /* ── Infobox (map overlay, bottom-left) ── */
    .ss-map-infobox {
      position: absolute; bottom: 40px; left: 16px;
      background: rgba(255,255,255,0.98);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.06);
      z-index: 400; width: 244px; overflow: hidden;
    }
    .ss-infobox-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .ss-infobox-count { font-size: 30px; font-weight: 700; color: rgba(0,0,0,0.88); line-height: 1; letter-spacing: -0.5px; }
    .ss-infobox-count-label { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45); margin-top: 3px; }
    .ss-infobox-body { padding: 8px 16px 6px; }
    .ss-infobox-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .ss-infobox-label { color: rgba(0,0,0,0.35); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; flex-shrink: 0; }
    .ss-infobox-value { color: rgba(0,0,0,0.75); font-weight: 500; text-align: right; margin-left: 8px; }
    .ss-infobox-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; border-top: 1px solid #F5F5F5;
      cursor: pointer; transition: background 0.15s; gap: 8px;
    }
    .ss-infobox-toggle:hover { background: #F9F7FF !important; }

    /* ── Right panel (planning-def-POI style) ── */
    .ss-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 420px;
      background: #fff;
      box-shadow: -2px 0 20px rgba(0,0,0,0.13);
      display: flex; flex-direction: column;
      z-index: 500; transition: transform 0.25s ease;
    }
    .ss-panel-hidden { transform: translateX(420px); }
    .ss-panel-toggle {
      position: absolute; left: -32px; top: 50%; transform: translateY(-50%);
      background: #fff; border: 1px solid #E8E8E8; border-right: none;
      border-radius: 6px 0 0 6px; width: 32px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: -3px 0 8px rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.4); z-index: 501; transition: color 0.15s;
    }
    .ss-panel-toggle:hover { color: #3E00FB; }
    .ss-panel-header {
      display: flex; align-items: center;
      padding: 10px 12px; border-bottom: 1px solid #F0F0F0;
      gap: 4px; flex-shrink: 0; background: #FAFAFA;
    }
    .ss-panel-tab {
      flex: 1; padding: 6px 8px; font-size: 13px; font-weight: 500;
      color: rgba(0,0,0,0.88); cursor: pointer; text-align: center;
      border-radius: 6px; transition: all 0.15s; user-select: none;
    }
    .ss-panel-tab.active { background: #F0EAFF; color: #3E00FB; }
    .ss-panel-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; background: #F7F5FF;
      border-bottom: 1px solid #E4DCFF; flex-shrink: 0;
    }
    .ss-panel-toolbar-info { font-size: 12px; color: rgba(0,0,0,0.45); }
    .ss-panel-toolbar-action { font-size: 12px; color: #3E00FB; font-weight: 500; cursor: pointer; }
    .ss-panel-toolbar-action:hover { text-decoration: underline; }
    .ss-panel-body { flex: 1; overflow-y: auto; }
    .ss-panel-body::-webkit-scrollbar { width: 4px; }
    .ss-panel-body::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 2px; }
    .ss-panel-empty { padding: 40px 20px; text-align: center; color: rgba(0,0,0,0.35); font-size: 13px; }

    /* Panel item */
    .ss-system-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 10px 14px; border-bottom: 1px solid #F5F5F5;
      cursor: pointer; transition: background 0.1s;
    }
    .ss-system-item:last-child { border-bottom: none; }
    .ss-system-item:hover { background: #FAFAFA; }
    .ss-system-item.highlighted { background: #F7F5FF; border-left: 3px solid #3E00FB; padding-left: 11px; }
    .ss-system-item.selected-item { background: #F7F5FF; }
    .ss-item-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px;
      border: 2px solid #fff; box-shadow: 0 0 0 1.5px rgba(0,0,0,0.12);
    }
    .ss-system-info { flex: 1; min-width: 0; }
    .ss-system-code { font-size: 10px; font-family: 'SF Mono','Fira Code',monospace; color: rgba(0,0,0,0.28); margin-bottom: 1px; }
    .ss-system-address { font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 3px; }
    .ss-system-tags { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .ss-item-tipo { font-size: 11px; color: rgba(0,0,0,0.45); }
    .ss-item-sep { font-size: 11px; color: rgba(0,0,0,0.20); }
    .ss-item-zona { font-size: 11px; color: rgba(0,0,0,0.35); }
    .ss-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
    .ss-item-add {
      width: 24px; height: 24px; border-radius: 50%;
      border: 1.5px solid #D9D9D9; background: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.15s; color: rgba(0,0,0,0.35);
      flex-shrink: 0;
    }
    .ss-item-add:hover { border-color: #3E00FB; color: #3E00FB; background: #F0EAFF; }
    .ss-item-add.added { border-color: #3E00FB; background: #3E00FB; color: #fff; }
    .ss-item-faces { font-size: 11px; color: rgba(0,0,0,0.35); white-space: nowrap; }

    /* Panel footer */
    .ss-panel-footer {
      padding: 12px 14px; border-top: 1px solid #F0F0F0; flex-shrink: 0; background: #FAFAFA;
    }
    .ss-panel-total-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .ss-panel-total-label { font-size: 12px; color: rgba(0,0,0,0.45); }
    .ss-panel-total-amount { font-size: 16px; font-weight: 700; color: rgba(0,0,0,0.88); }

    /* Leaflet tooltip */
    .ooh-leaflet-tooltip.leaflet-tooltip {
      background: rgba(20,20,20,0.88) !important; color: #fff !important;
      border: none !important; border-radius: 6px !important;
      font-size: 12px !important; padding: 6px 10px !important;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2) !important;
    }
    .ooh-leaflet-tooltip.leaflet-tooltip::before { display: none !important; }

    /* ── SysRow (planning-def-POI style) ── */
    .ss-sys-row { border-bottom: 1px solid #F0F0F0; }
    .ss-sys-row:last-child { border-bottom: none; }
    .ss-sys-head {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; transition: background 0.1s;
    }
    .ss-sys-head:hover { background: #FAFAFA; }
    .ss-sys-head.ss-sys-selected { background: #F7F5FF; }
    .ss-sys-head.ss-sys-hovered  { background: #F3F3F3; }
    .ss-sys-info { flex: 1; min-width: 0; }
    .ss-sys-code {
      font-size: 10px; font-family: 'SF Mono','Fira Code',monospace;
      color: rgba(0,0,0,0.28); margin-top: 1px;
    }
    .ss-sys-addr {
      font-size: 11px; color: rgba(0,0,0,0.45);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .ss-sys-label { font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
    .ss-sys-label.ss-sys-premium { font-weight: 600; }
    .ss-sys-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; font-size: 11px; color: rgba(0,0,0,0.40); }
    .ss-sys-meta-icon { font-size: 11px; color: rgba(0,0,0,0.30); flex-shrink: 0; display: flex; align-items: center; }
    .ss-sys-meta-type { font-weight: 500; color: rgba(0,0,0,0.45); }
    .ss-sys-meta-sep { color: rgba(0,0,0,0.20); margin: 0 1px; }
    .ss-sys-meta-fmt { font-family: 'SF Mono','Fira Code',monospace; font-size: 10px; color: rgba(0,0,0,0.30); }
    /* Label chip + button */
    .ss-label-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 10px; border: 1px solid;
      font-size: 10px; font-weight: 500; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .ss-label-btn {
      color: rgba(0,0,0,0.20); font-size: 12px; cursor: pointer;
      padding: 2px 3px; border-radius: 4px; line-height: 1; flex-shrink: 0;
      display: inline-flex; align-items: center;
    }
    .ss-label-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    /* Label picker popover */
    .ss-label-picker { width: 210px; }
    .ss-label-picker-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 0 8px; }
    .ss-label-picker-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; border-radius: 4px; }
    .ss-label-picker-row:hover { background: #F5F5F5; padding-left: 4px; margin: 0 -4px; }
    /* Color palette for new label */
    .ss-color-palette { display: flex; gap: 5px; margin: 8px 0; }
    .ss-color-swatch { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; transition: transform 0.1s; }
    .ss-color-swatch:hover { transform: scale(1.15); }
    .ss-face-badge { font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .ss-face-badge-all  { color: #52C41A; }
    .ss-face-badge-part { color: #3E00FB; }
    .ss-face-badge-none { color: rgba(0,0,0,0.35); }
    .ss-expand-btn {
      color: rgba(0,0,0,0.25); font-size: 10px; cursor: pointer;
      padding: 4px 6px; border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s, background 0.1s;
    }
    .ss-expand-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    .ss-faces-body { background: #FAFAFA; border-top: 1px solid #F0F0F0; padding: 3px 0 5px; }
    .ss-face-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px 5px 30px; cursor: pointer; transition: background 0.1s;
    }
    .ss-face-row:hover { background: rgba(0,0,0,0.02); }
    .ss-face-row.ss-face-selected { background: rgba(62,0,251,0.05); }
    .ss-face-type { font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.65); min-width: 95px; flex-shrink: 0; }
    .ss-face-format { font-size: 10px; color: rgba(0,0,0,0.30); font-family: 'SF Mono','Fira Code',monospace; flex: 1; white-space: nowrap; }
    .ss-face-state { display: flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(0,0,0,0.45); white-space: nowrap; flex-shrink: 0; }
    .ss-face-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Map floating card ── */
    .ss-map-floatcard {
      position: absolute; top: 16px; left: 16px; z-index: 450;
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.06); width: 320px; overflow: hidden;
    }
    .ss-map-floatcard-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px 6px; border-bottom: 1px solid #F0F0F0;
    }
    .ss-map-floatcard-title {
      font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.35);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .ss-map-floatcard-close {
      background: none; border: none; cursor: pointer; color: rgba(0,0,0,0.3);
      padding: 2px 4px; border-radius: 4px; display: flex; align-items: center;
    }
    .ss-map-floatcard-close:hover { color: rgba(0,0,0,0.65); background: rgba(0,0,0,0.05); }

/* ── Filter drawer ── */
.ant-drawer-body { padding-top: 8px !important; }
.filter-section { padding: 14px 10px; border-bottom: 1px solid #F0F0F0; }

function getSuggestions(query) {
  if (!query || query.trim().length < 2) return [];
  const q = normalizeText(query.trim());
  const buckets = { city: [], province: [], zona: [], street: [] };
  LOCATION_SUGG.forEach(item => {
    const searchIn = normalizeText(item.text + ' ' + item.detail);
    if (!searchIn.includes(q) && !q.split(' ').every(w => searchIn.includes(w))) return;
    const bucket = ['via','corso','viale','piazza','area'].includes(item.type) ? 'street' : item.type;
    if (buckets[bucket] && buckets[bucket].length < 4) buckets[bucket].push(item);
  });
  return [
    { key: 'city',     label: 'Città e Comuni',     items: buckets.city },
    { key: 'province', label: 'Province',            items: buckets.province },
    { key: 'zona',     label: 'Quartieri e Zone',    items: buckets.zona },
    { key: 'street',   label: 'Strade e Aree',       items: buckets.street },
  ].filter(g => g.items.length > 0);
}

function highlightMatch(text, query) {
  if (!query) return React.createElement('span', null, text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function generateMockPoiPoints(cat, zoneBbox) {
  const bbox = zoneBbox || { minLat: 38.055, maxLat: 38.245, minLng: 13.285, maxLng: 13.455 };
  const count = cat.mockCount;
  const points = [];
  let s = (cat.key.charCodeAt(0) * 13 + count * 7 + 42) >>> 0;
  const rand = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 0x100000000; };
  for (let i = 0; i < count; i++) {
    const lat = bbox.minLat + rand() * (bbox.maxLat - bbox.minLat);
    const lng = bbox.minLng + rand() * (bbox.maxLng - bbox.minLng);
    points.push({ id: `poi-${cat.key}-${i}`, label: cat.label, lat, lng, type: 'category', category: cat.key, color: cat.color, icon: cat.icon });
  }
  return points;
}

const PHOTON_BBOX_PA = '13.285,38.055,13.455,38.245';

async function photonSuggestPOI(query, limit = 7) {
  try {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lang=it&limit=${limit}&bbox=${PHOTON_BBOX_PA}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return [];
    const data = await res.json();
    const seen = new Set();
    return (data.features || []).map(feat => {
      const p = feat.properties;
      const [lng, lat] = feat.geometry.coordinates;
      if (!p.name || !lat || !lng) return null;
      const addrParts = [];
      if (p.street) addrParts.push(p.housenumber ? `${p.street} ${p.housenumber}` : p.street);
      if (p.city && p.city !== p.name) addrParts.push(p.city);
      const sub = addrParts.join(', ') || (p.osm_value || '').replace(/_/g, ' ');
      return { id: `ph-${lat.toFixed(5)}-${lng.toFixed(5)}`, label: p.name, sub, lat, lng, type: 'single', color: '#FF4A1C', icon: '📍' };
    }).filter(x => { if (!x || seen.has(x.label)) return false; seen.add(x.label); return true; });
  } catch { return []; }
}

// ── Places API — mappatura categoria → tipo Google ────────
const CATEGORY_TO_PLACES_TYPE = {
  scuole:       'school',
  supermercati: 'supermarket',
  ospedali:     'hospital',
  trasporti:    'transit_station',
  ristorazione: 'restaurant',
  farmacie:     'pharmacy',
  palestre:     'gym',
  cc:           'shopping_mall',
  universita:   'university',
  cinema:       'movie_theater',
  parchi:       'park',
};

// Cerca POI reali con Google Places nearbySearch.
// Ritorna un array di punti compatibili con activePois.
function fetchRealPOI(service, cat, center, radius) {
  return new Promise(resolve => {
    const type = CATEGORY_TO_PLACES_TYPE[cat.key];
    if (!type || !service) { resolve([]); return; }

    const allResults = [];

    const handlePage = (results, status, pagination) => {
      if (status === google.maps.places.PlacesServiceStatus.OK && results) {
        results.forEach(p => {
          if (p.geometry?.location) {
            allResults.push({
              id:       `gp-${p.place_id}`,
              label:    p.name,
              lat:      p.geometry.location.lat(),
              lng:      p.geometry.location.lng(),
              type:     'category',
              category: cat.key,
              color:    cat.color,
              icon:     cat.icon,
            });
          }
        });
      }
      // Recupera pagine successive (max 60 risultati totali, Google impone 2s tra pagine)
      if (pagination?.hasNextPage && allResults.length < 60) {
        setTimeout(() => pagination.nextPage(), 2100);
      } else {
        resolve(allResults);
      }
    };

    service.nearbySearch({ location: center, radius: radius || 8000, type }, handlePage);
  });
}

// ─────────────────────────────────────────────────────────
// RICERCA — helpers normalizzazione e matching per parole
// ─────────────────────────────────────────────────────────
const STOP_WORDS = new Set(['via', 'corso', 'piazza', 'viale', 'largo', 'vicolo', 'lungomare', 'di', 'della', 'delle', 'degli', 'del', 'dei', 'de', 'in', 'a', 'e', 'il', 'la', 'lo', 'le', 'i', 'gli']);

function normalizeText(str) {
  return str
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // rimuove accenti
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')                     // punteggiatura → spazio
    .replace(/\s+/g, ' ')
    .trim();
}

// Restituisce true se ogni parola non-stop di query è contenuta in una parola di text
function matchesSearch(text, query) {
  if (!query) return true;
  const textWords  = normalizeText(text).split(' ');
  const queryWords = normalizeText(query).split(' ').filter(w => w.length > 1 && !STOP_WORDS.has(w));
  if (queryWords.length === 0) return true;
  return queryWords.every(qw => textWords.some(tw => tw.includes(qw)));
}

// ─────────────────────────────────────────────────────────
const MARKER_GREEN     = '#52C41A';
const MARKER_GREEN_SEL = '#389E0D';

const clusterColor = (n) => {
  if (n <= 2)  return { bg: '#D9F7BE', fg: '#135200' };
  if (n <= 5)  return { bg: '#B7EB8F', fg: '#135200' };
  if (n <= 10) return { bg: '#73D13D', fg: '#135200' };
  if (n <= 20) return { bg: '#52C41A', fg: '#fff' };
  if (n <= 50) return { bg: '#389E0D', fg: '#fff' };
  return               { bg: '#237804', fg: '#fff' };
};

const MAP_STYLES = [
  { elementType: 'geometry',            stylers: [{ color: '#f5f5f5' }] },
  { elementType: 'labels.icon',         stylers: [{ visibility: 'off' }] },
  { elementType: 'labels.text.fill',    stylers: [{ color: '#717171' }] },
  { elementType: 'labels.text.stroke',  stylers: [{ color: '#f5f5f5' }] },
  { featureType: 'water',      elementType: 'geometry', stylers: [{ color: '#c8dff0' }] },
  { featureType: 'water',      elementType: 'labels.text.fill', stylers: [{ color: '#9e9e9e' }] },
  { featureType: 'road',       elementType: 'geometry', stylers: [{ color: '#ffffff' }] },
  { featureType: 'road.arterial', elementType: 'geometry', stylers: [{ color: '#eeeeee' }] },
  { featureType: 'road.highway',  elementType: 'geometry', stylers: [{ color: '#dadada' }] },
  { featureType: 'road.highway',  elementType: 'geometry.stroke', stylers: [{ color: '#c9c9c9' }] },
  { featureType: 'poi',        stylers: [{ visibility: 'off' }] },
  { featureType: 'transit',    stylers: [{ visibility: 'off' }] },
  { featureType: 'administrative.locality', elementType: 'labels.text.fill', stylers: [{ color: '#555' }] },
];

const makeMarkerIcon = (isHighlighted, isSelected) => ({
  path: google.maps.SymbolPath.CIRCLE,
  scale:        isHighlighted ? 11 : (isSelected ? 9 : 7),
  fillColor:    isSelected ? MARKER_GREEN_SEL : MARKER_GREEN,
  fillOpacity:  0.9,
  strokeColor:  isHighlighted ? '#3E00FB' : '#ffffff',
  strokeWeight: isHighlighted ? 3 : 2,
});

const makeClusterSvg = (count) => {
  const { bg, fg } = clusterColor(count);
  const s = count <= 5 ? 32 : count <= 20 ? 36 : 40;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
    <circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${bg}" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
    <text x="${s/2}" y="${s/2+4.5}" text-anchor="middle" fill="${fg}" font-size="12" font-weight="700" font-family="sans-serif">${count}</text>
  </svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), size: s };
};

function GoogleMap({ impianti, highlightedId, selectedIds, showOnlySelected, filteredIds, onSelect, flyToTarget, activePois, poiRadius }) {
  const containerRef  = useRef(null);
  const mapRef        = useRef(null);
  const clustererRef  = useRef(null);
  const markersRef    = useRef({});   // id → { marker, imp, infoWindow }
  const openInfoRef   = useRef(null); // InfoWindow aperta
  const poiCirclesRef = useRef([]);   // google.maps.Circle per ogni POI
  const poiMarkersRef = useRef([]);   // google.maps.Marker per ogni POI

  // ── Init mappa + marker ───────────────────────────────
  useEffect(() => {
    if (mapRef.current || !containerRef.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 38.1155, lng: 13.3615 },
      zoom: 13,
      styles: MAP_STYLES,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
      gestureHandling: 'greedy',
    });

    const allMarkers = impianti.map(imp => {
      const marker = new google.maps.Marker({
        position: { lat: imp.lat, lng: imp.lng },
        icon: makeMarkerIcon(false, false),
      });

      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="padding:6px 2px;font-family:-apple-system,sans-serif">
          <div style="font-size:12px;font-weight:600;color:rgba(0,0,0,0.88);margin-bottom:2px">${imp.indirizzo}</div>
          <div style="font-size:11px;color:rgba(0,0,0,0.45)">${imp.tipo} · ${imp.zona}</div>
        </div>`,
        disableAutoPan: true,
        pixelOffset: new google.maps.Size(0, -4),
      });

      marker.addListener('mouseover', () => {
        if (openInfoRef.current) openInfoRef.current.close();
        infoWindow.open(map, marker);
        openInfoRef.current = infoWindow;
      });
      marker.addListener('mouseout', () => {
        infoWindow.close();
        openInfoRef.current = null;
      });
      marker.addListener('click', () => onSelect(imp.id));

      markersRef.current[imp.id] = { marker, imp, infoWindow };
      return marker;
    });

    // Clusterer con renderer custom
    const clusterer = new markerClusterer.MarkerClusterer({
      map,
      markers: allMarkers,
      renderer: {
        render: ({ count, position }) => {
          const { size: s } = makeClusterSvg(count);
          const { url } = makeClusterSvg(count);
          return new google.maps.Marker({
            position,
            icon: {
              url,
              scaledSize: new google.maps.Size(s, s),
              anchor:     new google.maps.Point(s / 2, s / 2),
            },
            zIndex: 10000 + count,
          });
        },
      },
    });

    mapRef.current   = map;
    clustererRef.current = clusterer;

    return () => { mapRef.current = null; clustererRef.current = null; };
  }, []);

  // ── Aggiorna posizioni marker quando cambiano le coordinate (geocoding) ──
  useEffect(() => {
    if (!mapRef.current || !clustererRef.current) return;
    let changed = false;
    impianti.forEach(imp => {
      const entry = markersRef.current[imp.id];
      if (!entry) return;
      const curr = entry.marker.getPosition();
      if (!curr ||
          Math.abs(curr.lat() - imp.lat) > 0.000005 ||
          Math.abs(curr.lng() - imp.lng) > 0.000005) {
        entry.marker.setPosition({ lat: imp.lat, lng: imp.lng });
        entry.imp = { ...entry.imp, lat: imp.lat, lng: imp.lng };
        changed = true;
      }
    });
    if (changed) clustererRef.current.render();
  }, [impianti]);

  // ── Aggiorna stile e visibilità marker ────────────────
  useEffect(() => {
    if (!clustererRef.current) return;

    const visibleMarkers = [];
    Object.entries(markersRef.current).forEach(([id, { marker }]) => {
      const isHighlighted = id === highlightedId;
      const isSelected    = selectedIds.has(id);
      const inFilter      = !filteredIds || filteredIds.has(id);
      const visible       = inFilter && !(showOnlySelected && !isSelected && !isHighlighted);

      marker.setIcon(makeMarkerIcon(isHighlighted, isSelected));
      marker.setZIndex(isHighlighted ? 9999 : isSelected ? 500 : 1);

      if (visible) visibleMarkers.push(marker);
    });

    clustererRef.current.clearMarkers(true);
    clustererRef.current.addMarkers(visibleMarkers);

    if (highlightedId && markersRef.current[highlightedId]) {
      const { imp } = markersRef.current[highlightedId];
      mapRef.current.panTo({ lat: imp.lat, lng: imp.lng });
      if (mapRef.current.getZoom() < 15) mapRef.current.setZoom(16);
    }
  }, [highlightedId, selectedIds, showOnlySelected, filteredIds]);

  // ── Fly to zona cercata ───────────────────────────────
  useEffect(() => {
    if (!flyToTarget || !mapRef.current) return;
    mapRef.current.panTo({ lat: flyToTarget.lat, lng: flyToTarget.lng });
    mapRef.current.setZoom(flyToTarget.zoom || 14);
  }, [flyToTarget]);

  // ── Cerchi e marker POI ───────────────────────────────
  useEffect(() => {
    if (!mapRef.current) return;

    // Rimuovi cerchi e marker precedenti
    poiCirclesRef.current.forEach(c => c.setMap(null));
    poiMarkersRef.current.forEach(m => m.setMap(null));
    poiCirclesRef.current = [];
    poiMarkersRef.current = [];

    if (!activePois || activePois.length === 0) return;

    activePois.forEach(poi => {
      const circle = new google.maps.Circle({
        map: mapRef.current,
        center: { lat: poi.lat, lng: poi.lng },
        radius: poiRadius || 500,
        fillColor: poi.color || '#FF4A1C',
        fillOpacity: 0.10,
        strokeColor: poi.color || '#FF4A1C',
        strokeOpacity: 0.55,
        strokeWeight: 1.5,
        zIndex: 50,
      });
      poiCirclesRef.current.push(circle);

      const marker = new google.maps.Marker({
        map: mapRef.current,
        position: { lat: poi.lat, lng: poi.lng },
        icon: makePoiMarkerIcon(poi.color),
        title: poi.label,
        zIndex: 200,
      });
      poiMarkersRef.current.push(marker);
    });
  }, [activePois, poiRadius]);

  return React.createElement('div', { ref: containerRef, id: 'ooh-map' });
}

  const placesServiceRef  = useRef(null);   // google.maps.places.PlacesService
  const poiCacheRef       = useRef({});     // cache risultati per evitare chiamate duplicate

  // ── Label system ──────────────────────────────────────
  const [availableLabels, setAvailableLabels] = useState(INITIAL_LABELS);
  const [implantiLabels,  setImplantiLabels]  = useState(INITIAL_IMP_LABELS);

  }, []);

  }, []);

  const createLabel = useCallback(() => {

    setAvailableLabels(prev => [...prev, lbl]);
    setNewLabelName(''); setShowNewForm(false);
  }, [newLabelName, newLabelColor]);

  const renderLabelPicker = useCallback((impId) => {
    const current = implantiLabels[impId]?.[0] || null;
    return React.createElement('div', { className: 'ss-label-picker', onClick: e => e.stopPropagation() },

      availableLabels.map(lbl => {
        const isSel = current === lbl.id;
        return React.createElement('div', {
          key: lbl.id,
          className: 'ss-label-picker-row',
          style: isSel ? { background: lbl.color + '12' } : {},
          onClick: () => { toggleImpLabel(impId, lbl.id); closePicker(); },
        },

            style: { width: 14, height: 14, borderRadius: '50%', flexShrink: 0, display: 'inline-block',
              background: isSel ? lbl.color : 'transparent', border: `2px solid ${lbl.color}` },
          }),
          React.createElement('span', { style: { fontSize: 13, color: 'rgba(0,0,0,0.75)' } }, lbl.name),
        );
      }),
      React.createElement('div', { style: { borderTop: '1px solid #F0F0F0', margin: '8px 0 4px' } }),
      !showNewForm
        ? React.createElement('div', {
            style: { display: 'flex', alignItems: 'center', gap: 6, padding: '4px 0', cursor: 'pointer', color: '#3E00FB', fontSize: 13 },
            onClick: () => setShowNewForm(true),
          },

          )
        : React.createElement('div', null,
            React.createElement(Input, {
              size: 'small', autoFocus: true, placeholder: 'Nome etichetta',
              value: newLabelName, onChange: e => setNewLabelName(e.target.value),
              onPressEnter: createLabel, style: { marginBottom: 8 },
            }),
            React.createElement('div', { className: 'ss-color-palette' },
              ...LABEL_COLORS.map(c => React.createElement('span', {
                key: c, className: 'ss-color-swatch',
                style: { background: c, outline: newLabelColor === c ? `2px solid ${c}` : 'none', outlineOffset: 2 },
                onClick: () => setNewLabelColor(c),
              }))
            ),
            React.createElement('div', { style: { display: 'flex', gap: 6, justifyContent: 'flex-end' } },
              React.createElement(Button, { size: 'small', onClick: () => { setShowNewForm(false); setNewLabelName(''); } }, 'Annulla'),
              React.createElement(Button, { size: 'small', type: 'primary', onClick: createLabel, disabled: !newLabelName.trim() }, 'Crea'),
            )
          )
    );
  }, [availableLabels, implantiLabels, pickerOpenId, showNewForm, newLabelName, newLabelColor, toggleImpLabel, closePicker, createLabel]);

  // ── Geocoding ─────────────────────────────────────────
  const [geocodedImpianti,  setGeocodedImpianti]  = useState(IMPIANTI);
  const [geocodingProgress, setGeocodingProgress] = useState(null);

  useEffect(() => {
    const CACHE_KEY = 'gravity_geocache_v3';
    let cache = {};
    try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) {}

    const applyCache = (c) => {
      setGeocodedImpianti(IMPIANTI.map(imp =>
        c[imp.id] ? { ...imp, lat: c[imp.id].lat, lng: c[imp.id].lng } : imp
      ));
    };

    const toGeocode = IMPIANTI.filter(imp => !cache[imp.id]);

    if (toGeocode.length === 0) {
      applyCache(cache);
      return;
    }

    setGeocodingProgress({ done: 0, total: toGeocode.length });
    const geocoder = new google.maps.Geocoder();
    let done = 0;
    let cancelled = false;

    const next = (i) => {
      if (cancelled) return;
      if (i >= toGeocode.length) {
        applyCache(cache);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
        setGeocodingProgress(null);
        return;
      }
      const imp = toGeocode[i];
      const palermoBounds = new google.maps.LatLngBounds(
        { lat: 38.055, lng: 13.285 },
        { lat: 38.245, lng: 13.455 }
      );
      geocoder.geocode(
        {
          address: `${imp.indirizzo}, Palermo`,
          componentRestrictions: { country: 'IT', locality: 'Palermo' },
          bounds: palermoBounds,
        },
        (results, status) => {
          if (status === 'OK' && results[0]) {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            // Accetta solo risultati dentro il bounding box di Palermo
            if (lat >= 38.055 && lat <= 38.245 && lng >= 13.285 && lng <= 13.455) {
              cache[imp.id] = { lat, lng };
            }
          }
          done++;
          setGeocodingProgress({ done, total: toGeocode.length });
          if (done % 10 === 0) {
            applyCache(cache);
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
          }
          setTimeout(() => next(i + 1), 80);
        }
      );
    };

    next(0);
    return () => { cancelled = true; };
  }, []);

  // ── Inizializza PlacesService (richiede libraries=places) ──
  useEffect(() => {
    try {
      const el = document.createElement('div');
      placesServiceRef.current = new google.maps.places.PlacesService(el);
    } catch(e) {
      console.warn('Places API non disponibile:', e);
    }
  }, []);

  const [filterDrawerOpen,    setFilterDrawerOpen]    = useState(false);
  const [filterStati,         setFilterStati]         = useState([]);
  const [filterTipi,          setFilterTipi]          = useState([]);
  const [filterFormati,       setFilterFormati]       = useState([]);
  const [filterIlluminazione, setFilterIlluminazione] = useState([]);
  const [minFacesEnabled,     setMinFacesEnabled]     = useState(false);
  const [minFacesValue,       setMinFacesValue]       = useState(1);

  // Formati disponibili in base ai tipi attivi (se nessun tipo selezionato → tutti i formati)
  const availableFormats = useMemo(() => {
    if (filterTipi.length === 0) return ALL_TIPO_FORMATI;
    const s = new Set();
    filterTipi.forEach(t => (TIPO_FORMATI[t] || []).forEach(f => s.add(f)));
    return [...s].sort();
  }, [filterTipi]);

  const resetFilters = useCallback(() => {
    setFilterStati(Object.keys(STATO_CONFIG));
    setFilterTipi(TIPI);
    setFilterFormati(ALL_TIPO_FORMATI);
    setFilterIlluminazione([]);
    setMinFacesEnabled(false);
    setMinFacesValue(1);
  }, []);

  // Suggerimenti raggruppati per tipo
  const suggestions = useMemo(() => {
    if (searchMode !== 'zona') return [];
    return getSuggestions(searchQuery);
  }, [searchQuery, searchMode]);

  // ── Handler POI ────────────────────────────────────────
  const activatePOICategory = useCallback(async (cat) => {
    // Toggle off se già attiva
    if (activePois.some(p => p.category === cat.key)) {
      setActivePois(prev => prev.filter(p => p.category !== cat.key));
      return;
    }

    setShowPoiSugg(false);
    setPoiQuery('');
    setPoiLoading(true);
    setPoiLoadingLabel(`${cat.icon} ${cat.label}`);

    // Centro di ricerca: zona attiva o Palermo intera
    let center = { lat: 38.1155, lng: 13.3615 };
    let radius = 8000;
    if (appliedZone) {
      const q = appliedZone;
      const isZona = ZONE.some(z => normalizeText(z) === normalizeText(q));
      const inZone = geocodedImpianti.filter(i => isZona ? matchesSearch(i.zona, q) : matchesSearch(i.indirizzo, q));
      if (inZone.length > 0) {
        const lats = inZone.map(i => i.lat), lngs = inZone.map(i => i.lng);
        center = { lat: (Math.min(...lats) + Math.max(...lats)) / 2, lng: (Math.min(...lngs) + Math.max(...lngs)) / 2 };
        radius = 2500;
      }
    }

    const cacheKey = `${cat.key}|${center.lat.toFixed(4)}|${center.lng.toFixed(4)}`;
    let points;

    if (poiCacheRef.current[cacheKey]) {
      points = poiCacheRef.current[cacheKey];
    } else {
      points = await fetchRealPOI(placesServiceRef.current, cat, center, radius);
      poiCacheRef.current[cacheKey] = points;
    }

    setActivePois(prev => [...prev, ...points]);
    setPoiLoading(false);
    setPoiLoadingLabel(null);
  }, [activePois, appliedZone, geocodedImpianti]);

  const activateSinglePOI = useCallback((suggestion) => {
    setActivePois(prev => {
      if (prev.some(p => p.id === suggestion.id)) return prev;
      return [...prev, { id: suggestion.id, label: suggestion.label, lat: suggestion.lat, lng: suggestion.lng, type: 'single', color: '#FF4A1C', icon: '📍' }];
    });
    setShowPoiSugg(false);
    setPoiQuery('');
  }, []);

  const removePOIsByCategory = useCallback((category) => {
    setActivePois(prev => prev.filter(p => p.category !== category));
  }, []);

  const removeSinglePOI = useCallback((id) => {
    setActivePois(prev => prev.filter(p => p.id !== id));
  }, []);

  const handlePoiInputChange = useCallback((val) => {
    setPoiQuery(val);
    setShowPoiSugg(true);
    if (poiDebounceRef.current) clearTimeout(poiDebounceRef.current);
    if (val.length >= 2) {
      setPoiLoading(true);
      poiDebounceRef.current = setTimeout(async () => {
        const results = await photonSuggestPOI(val);
        setPoiSuggList(results);
        setPoiLoading(false);
      }, 350);
    } else {
      setPoiSuggList([]);
      setPoiLoading(false);
    }
  }, []);

  // Categorie POI attive (raggruppate per chip)
  const activePoiCategories = useMemo(() => {
    const seen = new Set();
    return activePois.filter(p => p.type === 'category' && !seen.has(p.category) && seen.add(p.category));
  }, [activePois]);

  const activeSinglePois = useMemo(() => activePois.filter(p => p.type === 'single'), [activePois]);

  // Applica la ricerca zona: aggiorna filtro + naviga la mappa
  const applyZoneSearch = useCallback((query, target) => {
    const q = (query || searchQuery).trim();
    if (!q) { setAppliedZone(null); return; }
    setAppliedZone(q);
    setShowSugg(false);
    if (target) {
      setFlyToTarget({ ...target, _ts: Date.now() });
    } else {
      const isCity = matchesSearch('Palermo Provincia', q) || normalizeText(q) === 'pa';
      if (isCity) {
        setFlyToTarget({ lat: 38.1155, lng: 13.3615, zoom: 12, _ts: Date.now() });
      } else {
        const isZona = ZONE.some(z => normalizeText(z) === normalizeText(q));
        const matching = geocodedImpianti.filter(i =>
          isZona ? matchesSearch(i.zona, q) : matchesSearch(i.indirizzo, q)
        );
        if (matching.length > 0) {
          const lat = matching.reduce((s, i) => s + i.lat, 0) / matching.length;
          const lng = matching.reduce((s, i) => s + i.lng, 0) / matching.length;
          const zoom = matching.length >= 30 ? 12 : matching.length >= 10 ? 14 : 15;
          setFlyToTarget({ lat, lng, zoom, _ts: Date.now() });
        }
      }
    }
  }, [searchQuery]);

  const clearZoneSearch = useCallback(() => {
    setAppliedZone(null);
    setSearchQuery('');
    setShowSugg(false);
  }, []);

  const filteredImpianti = useMemo(() => {
    return geocodedImpianti.filter(imp => {
      if (filterStati.length > 0 && !filterStati.includes(imp.stato)) return false;
      if (filterTipi.length > 0 && !filterTipi.includes(imp.tipo)) return false;
      if (filterFormati.length > 0 && !filterFormati.includes(imp.formato)) return false;
      if (filterIlluminazione.length > 0) {
        const k = imp.illuminato ? 'Illuminate' : 'Non illuminate';
        if (!filterIlluminazione.includes(k)) return false;
      }
      if (minFacesEnabled && imp.faces < minFacesValue) return false;
      // ── Filtro zona search ──
      if (appliedZone) {
        const q = appliedZone;
        const isCity    = matchesSearch('Palermo Provincia', q) || normalizeText(q) === 'pa';
        const isZona    = ZONE.some(z => normalizeText(z) === normalizeText(q));
        if (!isCity) {
          if (isZona) {
            // Zona/quartiere: filtra per zona
            if (!matchesSearch(imp.zona, q)) return false;
          } else {
            // Via specifica: filtra SOLO per indirizzo
            if (!matchesSearch(imp.indirizzo, q)) return false;
          }
        }
      }
      // ── Filtro POI ──
      if (activePois.length > 0) {
        const inAnyRadius = activePois.some(poi =>
          haversineMeters(imp.lat, imp.lng, poi.lat, poi.lng) <= poiRadius
        );
        if (!inAnyRadius) return false;
      }
      return true;
    });
  }, [geocodedImpianti, filterStati, filterTipi, filterFormati, filterIlluminazione, minFacesEnabled, minFacesValue, appliedZone, activePois, poiRadius]);

  const filteredIds = useMemo(() => new Set(filteredImpianti.map(i => i.id)), [filteredImpianti]);

  const activeFilterCount = useMemo(() => {
    let n = 0;
    if (filterStati.length > 0) n++;
    if (filterTipi.length > 0) n++;
    if (filterFormati.length > 0) n++;
    if (filterIlluminazione.length > 0) n++;
    if (minFacesEnabled) n++;
    return n;
  }, [filterStati, filterTipi, filterFormati, filterIlluminazione, minFacesEnabled]);

  const itemRefs = useRef({});

  const handleHighlight = useCallback((id) => {
    setHighlightedId(prev => prev === id ? null : id);
  }, []);

  const handleToggleAdd = useCallback((id) => {
    if (id === null) {
      setSelectedIds(new Set());
      return;
    }
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);

  const handleToggleExpand = useCallback((id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);

  // Scroll panel list to highlighted item
  useEffect(() => {
    if (!highlightedId || panelTab !== 'results') return;
    const el = itemRefs.current[highlightedId];
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, [highlightedId, panelTab]);

  const totalSelectedFaces = useMemo(
    () => geocodedImpianti.filter(i => selectedIds.has(i.id)).reduce((s, i) => s + i.faces, 0),
    [geocodedImpianti, selectedIds]
  );


  return React.createElement('div', { className: 'app-shell' },
    React.createElement(Navbar),

    React.createElement('div', { className: 'ooh-workspace' },

      // ── SEARCH CARD (top) ──────────────────────────────
      React.createElement('div', { className: 'ooh-search-card' },
        React.createElement('div', { className: 'ooh-search-area' },

          // Search bar — pill con tab Zona / POI
          React.createElement('div', { className: 'ss-search-bar' },
            React.createElement('div', { className: 'ss-search-pill' },

              // Tab switcher
              React.createElement('div', { className: 'ss-pill-tabs' },
                React.createElement('button', {
                  type: 'button',
                  className: `ss-pill-tab${searchMode === 'zona' ? ' active' : ''}`,
                  onClick: () => { setSearchMode('zona'); setActivePois([]); setPoiQuery(''); setShowPoiSugg(false); },
                },
                  React.createElement(EnvironmentOutlined),
                  'Zona'
                ),
                React.createElement('button', {
                  type: 'button',
                  className: `ss-pill-tab${searchMode === 'poi' ? ' active' : ''}`,
                  onClick: () => { setSearchMode('poi'); setShowSugg(false); },
                },
                  React.createElement(icons.AimOutlined),
                  'POI'
                )
              ),

              React.createElement('div', { className: 'ss-pill-sep' }),

              // Input + suggestions dropdown (UI identica in entrambe le modalità)
              React.createElement('div', { className: 'ss-pill-input' },
                React.createElement(Input, {
                  variant: 'borderless',
                  placeholder: searchMode === 'zona'
                    ? 'Cerca via, quartiere, città, provincia…'
                    : 'Cerca luogo specifico o seleziona categoria…',
                  prefix: React.createElement(SearchOutlined, { style: { color: 'rgba(0,0,0,0.3)', fontSize: 14 } }),
                  allowClear: true,
                  style: { height: '100%' },
                  value: searchMode === 'zona' ? searchQuery : poiQuery,
                  onChange: e => {
                    if (searchMode === 'zona') {
                      setSearchQuery(e.target.value);
                      setShowSugg(e.target.value.length >= 2);
                      if (!e.target.value) clearZoneSearch();
                    } else {
                      handlePoiInputChange(e.target.value);
                    }
                  },
                  onFocus: () => {
                    if (searchMode === 'zona') { if (searchQuery.length >= 2) setShowSugg(true); }
                    else setShowPoiSugg(true);
                  },
                  onBlur: () => {
                    if (searchMode === 'zona') setTimeout(() => setShowSugg(false), 180);
                    else setTimeout(() => setShowPoiSugg(false), 200);
                  },
                  onPressEnter: () => searchMode === 'zona' ? applyZoneSearch() : setShowPoiSugg(true),
                }),

                // Dropdown zona
                searchMode === 'zona' && showSugg && suggestions.length > 0 && React.createElement('div', { className: 'ss-suggestions-wrap' },
                  suggestions.map(group =>
                    React.createElement(React.Fragment, { key: group.key },
                      React.createElement('div', { className: 'ss-sugg-group-title' }, group.label),
                      group.items.map(s => {
                        const cfg = SUGG_CONFIG[s.type] || SUGG_CONFIG.area;
                        return React.createElement('div', {
                          key: s.text,
                          className: 'ss-suggestion-item',
                          onMouseDown: () => { setSearchQuery(s.text); applyZoneSearch(s.text, s); },
                        },
                          React.createElement('div', {
                            style: { width: 28, height: 28, borderRadius: 6, background: cfg.bg,
                              display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }
                          },
                            React.createElement(EnvironmentOutlined, { style: { fontSize: 12, color: cfg.color } })
                          ),
                          React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                            React.createElement('div', { style: { fontSize: 13, color: 'rgba(0,0,0,0.85)', lineHeight: '18px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } },
                              highlightMatch(s.text, searchQuery)
                            ),
                            React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', lineHeight: '16px', marginTop: 1 } }, s.detail)
                          ),
                          React.createElement('span', {
                            style: { fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 3,
                              background: cfg.bg, color: cfg.color, border: `1px solid ${cfg.color}33`,
                              flexShrink: 0, textTransform: 'uppercase', letterSpacing: '.04em' }
                          }, cfg.label)
                        );
                      })
                    )
                  )
                ),

                // Dropdown POI
                searchMode === 'poi' && showPoiSugg && React.createElement('div', { className: 'poi-sugg-wrap' },
                  poiQuery.length < 2
                    ? React.createElement(React.Fragment, null,
                        React.createElement('div', { className: 'poi-sugg-section-title' },
                          appliedZone ? `Categorie nella zona: ${appliedZone}` : 'Categorie'
                        ),
                        React.createElement('div', { className: 'poi-category-grid' },
                          POI_CATEGORIES_FULL.map(cat => {
                            const isActive = activePois.some(p => p.category === cat.key);
                            return React.createElement('button', {
                              key: cat.key,
                              className: `poi-category-btn${isActive ? ' active' : ''}`,
                              onMouseDown: () => activatePOICategory(cat),
                            }, cat.icon, ' ', cat.label);
                          })
                        )
                      )
                    : poiLoading
                      ? React.createElement('div', { style: { padding: '14px', textAlign: 'center', color: 'rgba(0,0,0,0.35)', fontSize: 13 } }, 'Ricerca in corso…')
                      : poiSuggList.length > 0
                        ? React.createElement(React.Fragment, null,
                            React.createElement('div', { className: 'poi-sugg-section-title' }, 'Luoghi'),
                            poiSuggList.map(s =>
                              React.createElement('div', {
                                key: s.id,
                                className: 'poi-sugg-item',
                                onMouseDown: () => activateSinglePOI(s),
                              },
                                React.createElement('span', { className: 'poi-sugg-icon' }, s.icon),
                                React.createElement('div', null,
                                  React.createElement('div', { className: 'poi-sugg-label' }, s.label),
                                  s.sub && React.createElement('div', { className: 'poi-sugg-sub' }, s.sub)
                                )
                              )
                            )
                          )
                        : React.createElement('div', { style: { padding: '14px', textAlign: 'center', color: 'rgba(0,0,0,0.35)', fontSize: 13 } }, 'Nessun risultato per "', poiQuery, '"')
                ),
              ),

              React.createElement('div', { className: 'ss-pill-sep' }),

              // Filtri
              React.createElement(Button, {
                className: 'ss-filter-inline',
                icon: React.createElement(SlidersOutlined),
                onClick: () => setFilterDrawerOpen(true),
              },
                activeFilterCount > 0 ? `Filtri (${activeFilterCount})` : 'Filtri'
              ),

              // Cerca
              React.createElement(Button, {
                className: 'ss-cerca-inline',
                type: 'primary',
                icon: React.createElement(SearchOutlined),
                onClick: () => searchMode === 'zona' ? applyZoneSearch() : setShowPoiSugg(true),
              }, 'Cerca'),
            ),
          ),

          // ── Brief chips: zona + POI attivi + loading ────
          (appliedZone || activePoiCategories.length > 0 || activeSinglePois.length > 0 || poiLoadingLabel) &&
          React.createElement('div', { className: 'ss-brief-chips', style: { marginTop: 6 } },
            React.createElement('span', { className: 'ss-brief-label' }, 'Filtri attivi:'),

            appliedZone && React.createElement('div', { className: 'ss-zone-active-tag' },
              React.createElement(EnvironmentOutlined, { style: { fontSize: 11 } }),
              ' ', appliedZone,
              React.createElement('span', { className: 'clear-btn', onClick: clearZoneSearch }, '×')
            ),

            activePoiCategories.map(poi =>
              React.createElement('div', { key: poi.category, className: 'poi-active-chip' },
                poi.icon, ' ', poi.label,
                React.createElement('span', { className: 'clear-btn', onClick: () => removePOIsByCategory(poi.category) }, '×')
              )
            ),

            activeSinglePois.map(poi =>
              React.createElement('div', { key: poi.id, className: 'poi-active-chip' },
                '📍 ', poi.label,
                React.createElement('span', { className: 'clear-btn', onClick: () => removeSinglePOI(poi.id) }, '×')
              )
            ),

            // Chip loading mentre Places API risponde
            poiLoadingLabel && React.createElement('div', { className: 'poi-loading-chip' },
              React.createElement('span', { className: 'poi-loading-spinner' }),
              'Carico ', poiLoadingLabel, '…'
            ),
          ),
        ),

        // Radius slider POI — fuori da ooh-search-area, non altera la larghezza della pill
        searchMode === 'poi' && React.createElement('div', { className: 'poi-radius-wrap', style: { margin: '14px 20px 0 0', alignSelf: 'flex-start' } },
          React.createElement('span', { className: 'poi-radius-label' }, 'Raggio'),
          React.createElement(Slider, {
            min: 100, max: 2000, step: 50,
            value: poiRadius,
            onChange: setPoiRadius,
            style: { flex: 1 },
            disabled: poiLoading,
            tooltip: { formatter: v => `${v} m` },
          }),
          React.createElement('span', { className: 'poi-radius-val' },
            poiRadius >= 1000 ? `${(poiRadius / 1000).toFixed(1)} km` : `${poiRadius} m`
          ),
        ),
      ),

      // ── MAP AREA ────────────────────────────────────────
      React.createElement('div', { className: 'ooh-map-area' },

        React.createElement(GoogleMap, {
          impianti:         geocodedImpianti,
          highlightedId,
          selectedIds,
          showOnlySelected,
          filteredIds,
          onSelect:         handleHighlight,
          flyToTarget,
          activePois,
          poiRadius,
        }),

        geocodingProgress && React.createElement('div', { className: 'geocoding-banner' },
          React.createElement('span', null,
            `Geocoding indirizzi ${geocodingProgress.done}/${geocodingProgress.total}`
          ),
          React.createElement('div', { className: 'geocoding-progress-bar' },
            React.createElement('div', {
              className: 'geocoding-progress-fill',
              style: { width: `${Math.round(geocodingProgress.done / geocodingProgress.total * 100)}%` }
            })
          )
        ),

        React.createElement(MapInfobox, {
          total:             filteredImpianti.length,
          filteredImpianti,
          filterStati,
          selectedCount:     selectedIds.size,
          selectedFaces:     totalSelectedFaces,
          showOnlySelected,
          onToggleShowOnly:  () => setShowOnlySelected(v => !v),
        }),

        // Floating card (shows when a marker is highlighted)
        highlightedId && React.createElement(MapFloatingCard, {
          imp:               geocodedImpianti.find(i => i.id === highlightedId),
          added:             selectedIds.has(highlightedId),
          expanded:          expandedIds.has(highlightedId),
          onToggleAdd:       handleToggleAdd,
          onToggleExpand:    handleToggleExpand,
          onClose:           () => setHighlightedId(null),
          impLabel:          implantiLabels[highlightedId]?.[0] || null,
          availableLabels,
          pickerOpenId,
          onPickerOpenChange: setPickerOpenId,
          renderLabelPicker,
        }),

        React.createElement(RightPanel, {
          impianti:          filteredImpianti,
          allImpianti:       geocodedImpianti,
          panelOpen,
          onToggle:          () => setPanelOpen(v => !v),
          panelTab,
          onTabChange:       setPanelTab,
          highlightedId,
          selectedIds,
          expandedIds,
          onHighlight:       handleHighlight,
          onToggleAdd:       handleToggleAdd,
          onToggleExpand:    handleToggleExpand,
          itemRefs,
          implantiLabels,
          availableLabels,
          pickerOpenId,
          onPickerOpenChange: setPickerOpenId,
          renderLabelPicker,
        })
      )
    ),

    React.createElement(Drawer, {
      title: 'Filtri avanzati',
      placement: 'right',
      width: 480,
      open: filterDrawerOpen,
      onClose: () => setFilterDrawerOpen(false),
      footer: React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between' } },
        React.createElement(Button, { danger: true, type: 'text', onClick: resetFilters }, 'Azzera tutto'),
        React.createElement(Button, { type: 'primary', onClick: () => setFilterDrawerOpen(false) }, 'Applica')
      ),
    },
      React.createElement(FilterPanel, {
        filterStati, onFilterStatiChange: setFilterStati,
        filterTipi, onFilterTipiChange: setFilterTipi,
        filterFormati, onFilterFormatiChange: setFilterFormati,
        availableFormats,
        filterIlluminazione, onFilterIlluminazioneChange: setFilterIlluminazione,
        minFacesEnabled, onMinFacesEnabledChange: setMinFacesEnabled,
        minFacesValue, onMinFacesValueChange: setMinFacesValue,
      })
    ),
  );
}

// ─────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────
window.applyGravityTokens && window.applyGravityTokens();
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App)
  )
);
</script>
</body>
</html>
