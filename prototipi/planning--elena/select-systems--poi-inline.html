function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}

function SuggestionItem({ item, query }) {
  const ts = TYPE_STYLE[item.type] || TYPE_STYLE.street;
  const displayText = item.city ? `${item.text}, ${item.city}` : item.text;
  return React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, padding: '2px 0' } },
    React.createElement('div', {
      style: { width: 28, height: 28, borderRadius: 6, background: ts.bg, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }
    },

    ),

      React.createElement('div', { style: { fontSize: 13, color: 'rgba(0,0,0,0.85)', lineHeight: '18px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } },
        highlightMatch(displayText, query)
      ),
      React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', lineHeight: '16px', marginTop: 1 } }, item.detail)
    ),

    }, ts.label)
  );
}

function getSuggestions(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.trim();
  const ql = q.toLowerCase();
  const buckets = { city: [], province: [], neighborhood: [], street: [] };
  LOCATION_DB.forEach(item => {
    const searchIn = [item.text, item.city, item.detail].filter(Boolean).join(' ').toLowerCase();
    if (!searchIn.includes(ql)) return;
    if (buckets[item.type] && buckets[item.type].length < 4) buckets[item.type].push(item);
  });
  const GROUP_LABELS = {
    city: 'Città e Comuni', province: 'Province e Regioni',
    neighborhood: 'Quartieri e Zone', street: 'Indirizzi',
  };
  const result = [];
  ['city', 'province', 'neighborhood', 'street'].forEach(type => {
    const items = buckets[type];
    if (!items.length) return;
    result.push({
      label: GROUP_LABELS[type],
      options: items.map((item, i) => {
        const displayText = item.city ? `${item.text}, ${item.city}` : item.text;
        return {
          value: displayText,
          label: React.createElement(SuggestionItem, { key: `${type}_${i}`, item, query: q }),
        };
      }),
    });
  });
  return result;
}

  if (zoom <= 13) return [28, 43];
  if (zoom <= 14) return [36, 55];

function MapView({ systems, selectedIds, onToggle, pois = [], poiRadii = {}, activePOI, onPoiClick }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);
  const clusterGroupRef = useRef(null);
  const [zoom, setZoom] = useState(13);

  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    mapRef.current = L.map(containerRef.current, { center: [38.107, 13.372], zoom: 13 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19,
    }).addTo(mapRef.current);
    mapRef.current.on('zoomend', () => setZoom(mapRef.current.getZoom()));
    clusterGroupRef.current = L.markerClusterGroup({
      disableClusteringAtZoom: 16,
      maxClusterRadius: 60,
      iconCreateFunction: cluster => {
        const count = cluster.getChildCount();
        return L.divIcon({
          html: `<div style="width:36px;height:36px;background:#3E00FB;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(62,0,251,0.35);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:13px;font-family:-apple-system,sans-serif">${count}</div>`,
          iconSize: [36, 36], iconAnchor: [18, 18], className: '',
        });
      },
    });
    clusterGroupRef.current.addTo(mapRef.current);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; clusterGroupRef.current = null; } };
  }, []);

  useEffect(() => {
    if (!mapRef.current || !clusterGroupRef.current) return;
    clusterGroupRef.current.clearLayers();
    const [mw, mh] = getMarkerSize(zoom);
    systems.forEach(sys => {
      const sel = selectedIds.includes(sys.id);
      const s = STATUS[sys.status];
      const imgs = MARKER_IMGS[sys.type] || MARKER_IMGS['Palina'];
      const icon = L.divIcon({
        html: `<div style="width:${mw}px;height:${mh}px;${sel ? 'filter:drop-shadow(0 0 6px #3E00FB) drop-shadow(0 0 2px #3E00FB);' : ''}">
          <img src="${imgs[_MARKER_STATUS_IDX[sys.status] || 0]}" style="width:${mw}px;height:${mh}px;display:block" />
        </div>`,
        iconSize: [mw, mh], iconAnchor: [mw / 2, mh], className: '',
      });
      L.marker([sys.lat, sys.lng], { icon })
        .bindPopup(L.popup({ offset: [0, -(mh - 4)], closeButton: false }).setContent(`

            <div style="font-weight:600;font-size:13px;margin-bottom:2px">${sys.id} · ${sys.type}</div>

    mapRef.current.eachLayer(l => { if (l._poiLayer) l.remove(); });

      const isActive = poi.id === activePOI;
      const circle = L.circle([poi.lat, poi.lng], {

        </div>`,
        iconSize: [28, 28], iconAnchor: [14, 14], className: '',
      });
      const marker = L.marker([poi.lat, poi.lng], { icon: poiIcon });
      marker._poiLayer = true;
      marker.on('click', () => onPoiClick && onPoiClick(poi.id));
      marker.addTo(mapRef.current);
    });
  }, [pois, poiRadii, activePOI]);

  return React.createElement('div', { ref: containerRef, id: 'leaflet-map' });
}

function getFaceSlots(face) {
  return face.slots || [face.status];
}

function getFaceStatus(face) {
  const slots = getFaceSlots(face);
  if (slots.includes('available')) return 'available';
  if (slots.includes('option'))    return 'option';
  return 'reserved';
}

function getBorderColor(sys) {
  const all = sys.faces.flatMap(getFaceSlots);
  if (all.includes('available')) return '#52C41A';
  if (all.includes('option'))    return '#EB2F96';
  return '#722ED1';
}

function isFullyReserved(sys) {
  return sys.faces.every(f => getFaceStatus(f) === 'reserved');
}

  const [searchText,   setSearchText]   = useState('');
  const [suggestions,  setSuggestions]  = useState([]);
  const [searchScope,  setSearchScope]  = useState('address');
  const [activeTypes,  setActiveTypes]  = useState([]);
  const [activeSizes,  setActiveSizes]  = useState([]);
  const [hiddenLocs,   setHiddenLocs]   = useState([]);
  const [activeLocs,   setActiveLocs]   = useState([]);
  const [drawerOpen,   setDrawerOpen]   = useState(false);
  const [poiDrawerOpen, setPoiDrawerOpen] = useState(false);
  const [advFilters,   setAdvFilters]   = useState({ salesModel: [], statusF: [], format: [], illuminated: null });
  const [hasSearched,  setHasSearched]  = useState(false);
  const [viewMode,     setViewMode]     = useState('map');
  const [showSelected, setShowSelected] = useState(false);
  const [selectedIds,       setSelectedIds]       = useState([]);
  const [selectedFaceKeys, setSelectedFaceKeys] = useState([]); // chiavi `${sysId}-${faceId}`

  // ── POI state ──────────────────────────────────────────
  const [poiCategory,  setPoiCategory]  = useState(null);
  const [poiRadii,     setPoiRadii]     = useState({});
  const [activePOI,    setActivePOI]    = useState(null);
  const [typedPh,      setTypedPh]      = useState('');

  useEffect(() => {
    let phraseIdx = 0, charIdx = 0, phase = 'typing';
    let timeout;
    const tick = () => {
      const phrase = TYPEWRITER_PHRASES[phraseIdx];
      if (phase === 'typing') {
        charIdx++;
        setTypedPh(phrase.slice(0, charIdx));
        if (charIdx >= phrase.length) { phase = 'holding'; timeout = setTimeout(tick, 1800); }
        else timeout = setTimeout(tick, 46);
      } else if (phase === 'holding') {
        phase = 'deleting'; timeout = setTimeout(tick, 30);
      } else {
        charIdx--;
        setTypedPh(phrase.slice(0, charIdx));
        if (charIdx <= 0) { phraseIdx = (phraseIdx + 1) % TYPEWRITER_PHRASES.length; phase = 'typing'; timeout = setTimeout(tick, 450); }
        else timeout = setTimeout(tick, 22);
      }
    };
    timeout = setTimeout(tick, 700);
    return () => clearTimeout(timeout);
  }, []);

  const foundPOIs = poiCategory ? (POI_DATA[poiCategory] || []) : [];

  const handlePoiApply = (cat, radii) => {
    setPoiCategory(cat);
    setPoiRadii(radii);
    setActivePOI(cat ? (POI_DATA[cat]?.[0]?.id || null) : null);
  };

  const toggleType = t =>
    setActiveTypes(prev => prev.includes(t) ? prev.filter(x => x !== t) : [...prev, t]);

  const toggleSize = s =>
    setActiveSizes(prev => prev.includes(s) ? prev.filter(x => x !== s) : [...prev, s]);

  const toggleSystem = id => {
    const sys = SYSTEMS.find(s => s.id === id);
    if (!sys || isFullyReserved(sys)) return;
    setSelectedIds(prev => {
      const isSelected = prev.includes(id);
      if (isSelected) {
        setSelectedFaceKeys(fk => fk.filter(k => !k.startsWith(`${id}-`)));
        return prev.filter(x => x !== id);
      } else {
        if (sys) {
          const keys = sys.faces.filter(f => getFaceStatus(f) !== 'reserved').map(f => `${id}-${f.id}`);
          setSelectedFaceKeys(fk => [...new Set([...fk, ...keys])]);
        }
        return [...prev, id];
      }
    });
  };

  const toggleFace = (sysId, faceId) => {
    const key = `${sysId}-${faceId}`;
    setSelectedFaceKeys(prev => {
      const next = prev.includes(key) ? prev.filter(x => x !== key) : [...prev, key];
      const sysHasFace = next.some(k => k.startsWith(`${sysId}-`));
      setSelectedIds(ids => sysHasFace
        ? (ids.includes(sysId) ? ids : [...ids, sysId])
        : ids.filter(x => x !== sysId)
      );
      return next;
    });
  };

  const advCount = advFilters.salesModel.length + advFilters.statusF.length +
                   advFilters.format.length + (advFilters.illuminated ? 1 : 0);

  const activeChips = [
    ...activeTypes.map(t  => ({ key: `type_${t}`,  label: t, prefix: 'Tipologia', active: true })),
    ...activeSizes.map(s  => ({ key: `size_${s}`,  label: s, prefix: 'Formato',   active: true })),
    ...advFilters.salesModel.map(v => ({ key: `sm_${v}`,   label: v, prefix: 'Modello',       active: true })),
    ...advFilters.statusF.map(v    => ({ key: `st_${v}`,   label: STATUS[v]?.label || v, prefix: 'Disponibilità', active: true })),
    ...advFilters.format.map(v     => ({ key: `fmt_${v}`,  label: v, prefix: 'Formato',        active: true })),
    ...(advFilters.illuminated ? [{ key: 'ill', label: advFilters.illuminated, prefix: 'Illuminato', active: true }] : []),
    ...(poiCategory ? [{ key: 'poi', label: POI_CATEGORIES.find(c => c.key === poiCategory)?.label || poiCategory, prefix: 'POI', active: true }] : []),
  ];

  const removeChip = key => {
    if (key.startsWith('type_'))   setActiveTypes(p => p.filter(x => `type_${x}` !== key));
    else if (key.startsWith('size_')) setActiveSizes(p => p.filter(x => `size_${x}` !== key));
    else if (key.startsWith('sm_'))  setAdvFilters(p => ({ ...p, salesModel: p.salesModel.filter(v => `sm_${v}`  !== key) }));
    else if (key.startsWith('st_'))  setAdvFilters(p => ({ ...p, statusF:    p.statusF.filter(v    => `st_${v}`  !== key) }));
    else if (key.startsWith('fmt_')) setAdvFilters(p => ({ ...p, format:     p.format.filter(v     => `fmt_${v}` !== key) }));
    else if (key === 'ill')          setAdvFilters(p => ({ ...p, illuminated: null }));
    else if (key === 'poi')          { setPoiCategory(null); setPoiRadii({}); setActivePOI(null); }
  };

  const clearAll = () => {
    setActiveTypes([]);
    setActiveSizes([]);
    setAdvFilters({ salesModel: [], statusF: [], format: [], illuminated: null });
    setPoiCategory(null); setPoiRadii({}); setActivePOI(null);
  };

  const handleSearch = () => {
    if (!searchText.trim() && activeTypes.length === 0 && activeSizes.length === 0 && advCount === 0) {
      messageApi.warning('Inserisci un indirizzo o seleziona almeno un filtro');
      return;
    }
    setHasSearched(true);
  };

  const displayed = (() => {
    let list = showSelected ? SYSTEMS.filter(s => selectedIds.includes(s.id)) : SYSTEMS;
    if (activeTypes.length > 0) list = list.filter(s => activeTypes.some(t => s.type.toLowerCase().includes(t.toLowerCase())));
    if (activeSizes.length > 0) list = list.filter(s => activeSizes.includes(s.size));
    if (foundPOIs.length > 0) {
      list = list.filter(sys =>
        foundPOIs.some(poi => haversineDistance(poi.lat, poi.lng, sys.lat, sys.lng) <= (poiRadii[poi.id] || 500))
      );
    }
    return list;

  const someResultsSelected   = selectedFromResults.length > 0 && !allResultsSelected;

  const selectAllFromResults = () => {
    const toAdd = selectableFromResults.filter(s => !selectedIds.includes(s.id));
    if (!toAdd.length) return;
    const newFaceKeys = [...selectedFaceKeys];
    toAdd.forEach(sys => {
      sys.faces.filter(f => getFaceStatus(f) !== 'reserved').forEach(f => {
        const key = `${sys.id}-${f.id}`;
        if (!newFaceKeys.includes(key)) newFaceKeys.push(key);
      });
    });
    setSelectedIds(prev => [...prev, ...toAdd.map(s => s.id)]);
    setSelectedFaceKeys(newFaceKeys);
  };

  const deselectAllFromResults = () => {
    const removeSet = new Set(selectableFromResults.map(s => s.id));
    setSelectedIds(prev => prev.filter(id => !removeSet.has(id)));
    setSelectedFaceKeys(prev => prev.filter(k => !selectableFromResults.some(s => k.startsWith(`${s.id}-`))));

  const toggleSelectAll = () => allResultsSelected || someResultsSelected

                  React.createElement(Button, {

                    icon: React.createElement(SearchOutlined),
                    onClick: handleSearch,

              // Row 2: quick type + size filter pills (Tag closable) — nascosti dopo la ricerca
              !hasSearched && React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 6, marginTop: 10, flexWrap: 'nowrap', width: '100%', justifyContent: 'center', overflow: 'hidden' } },
                ...SUGGESTED_TYPES.map(t => {
                  const active = activeTypes.includes(t);
                  return React.createElement(Tag, {
                    key: t,

                  return React.createElement(Tag, {
