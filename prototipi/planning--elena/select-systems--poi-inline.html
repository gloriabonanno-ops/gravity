function haversineDistance(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLng / 2) ** 2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function highlightMatch(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}

function SuggestionItem({ item, query }) {
  const ts = TYPE_STYLE[item.type] || TYPE_STYLE.street;
  const displayText = item.city ? `${item.text}, ${item.city}` : item.text;
  return React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, padding: '2px 0' } },

      ),

    ),

      style: { fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 3, background: ts.bg, color: ts.color, border: `1px solid ${ts.color}22`, flexShrink: 0, textTransform: 'uppercase', letterSpacing: '.04em' }
    }, ts.label)
  );
}

function getSuggestions(query) {
  if (!query || query.trim().length < 2) return [];
  const q = query.trim();
  const ql = q.toLowerCase();
  const buckets = { city: [], province: [], neighborhood: [], street: [] };
  LOCATION_DB.forEach(item => {
    const searchIn = [item.text, item.city, item.detail].filter(Boolean).join(' ').toLowerCase();
    if (!searchIn.includes(ql)) return;
    if (buckets[item.type] && buckets[item.type].length < 4) buckets[item.type].push(item);
  });
  const GROUP_LABELS = {
    city: 'Città e Comuni', province: 'Province e Regioni',
    neighborhood: 'Quartieri e Zone', street: 'Indirizzi',
  };
  const result = [];
  ['city', 'province', 'neighborhood', 'street'].forEach(type => {
    const items = buckets[type];
    if (!items.length) return;
    result.push({
      label: GROUP_LABELS[type],
      options: items.map((item, i) => {
        const displayText = item.city ? `${item.text}, ${item.city}` : item.text;
        return {
          value: displayText,
          label: React.createElement(SuggestionItem, { key: `${type}_${i}`, item, query: q }),
        };
      }),
    });
  });
  return result;
}

function MapView({ systems, selectedIds, onToggle, pois = [], poiRadii = {}, activePOI, onPoiClick }) {
  const containerRef = useRef(null);
  const mapRef = useRef(null);

  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    mapRef.current = L.map(containerRef.current, { center: [38.107, 13.372], zoom: 13 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19,
    }).addTo(mapRef.current);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, []);

  useEffect(() => {
    if (!mapRef.current) return;
    mapRef.current.eachLayer(l => { if (l._poiLayer || l instanceof L.Marker) l.remove(); });
    systems.forEach(sys => {
      const sel = selectedIds.includes(sys.id);
      const s = STATUS[sys.status];
      const c = sel ? '#3E00FB' : s.color;
      const icon = L.divIcon({
        html: `<div style="position:relative;width:30px;height:38px">
          <svg viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg"

            <circle cx="15" cy="15" r="7" fill="white" opacity="0.9"/>

          </svg>
          ${sel ? '<div style="position:absolute;top:-2px;right:-2px;width:10px;height:10px;background:#3E00FB;border-radius:50%;border:1.5px solid #fff"></div>' : ''}
        </div>`,
        iconSize: [30, 38], iconAnchor: [15, 38], className: '',
      });
      L.marker([sys.lat, sys.lng], { icon })
        .bindPopup(L.popup({ offset: [0, -34], closeButton: false }).setContent(`
          <div style="font-family:-apple-system,sans-serif;min-width:156px;padding:2px 0">
            <div style="font-weight:600;font-size:13px;margin-bottom:2px">${sys.id} · ${sys.type}</div>
            <div style="color:#999;font-size:12px;margin-bottom:6px">${sys.address}, ${sys.city}</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:12px">
              <div style="width:7px;height:7px;border-radius:50%;background:${s.color}"></div>
              <span style="color:${s.color};font-weight:500">${s.label}</span>
            </div>
          </div>`))
        .on('click', () => onToggle(sys.id))
        .addTo(mapRef.current);
    });
  }, [systems, selectedIds]);

  // POI markers + cerchi di copertura
  useEffect(() => {
    if (!mapRef.current) return;
    mapRef.current.eachLayer(l => { if (l._poiLayer) l.remove(); });
    pois.forEach(poi => {
      const radius = poiRadii[poi.id] || 500;
      const isActive = poi.id === activePOI;
      const circle = L.circle([poi.lat, poi.lng], {
        radius, color: '#3E00FB', fillColor: '#3E00FB',
        fillOpacity: isActive ? 0.12 : 0.06,
        weight: isActive ? 2 : 1, opacity: isActive ? 0.5 : 0.3, dashArray: '4 4',
      }).addTo(mapRef.current);
      circle._poiLayer = true;
      const poiIcon = L.divIcon({
        html: `<div style="width:28px;height:28px;background:#3E00FB;border-radius:6px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(62,0,251,0.35);${isActive ? 'outline:3px solid #6B3FFF;outline-offset:1px;' : ''}">
          <svg viewBox="0 0 16 16" width="14" height="14" fill="white"><path d="M8 2a4 4 0 1 0 0 8A4 4 0 0 0 8 2zM1 8a7 7 0 1 1 14 0A7 7 0 0 1 1 8z"/><circle cx="8" cy="8" r="2" fill="white"/></svg>
        </div>`,
        iconSize: [28, 28], iconAnchor: [14, 14], className: '',
      });
      const marker = L.marker([poi.lat, poi.lng], { icon: poiIcon });
      marker._poiLayer = true;
      marker.on('click', () => onPoiClick && onPoiClick(poi.id));
      marker.addTo(mapRef.current);
    });
  }, [pois, poiRadii, activePOI]);

  return React.createElement('div', { ref: containerRef, id: 'leaflet-map' });
}
