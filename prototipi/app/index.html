    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--gravity-font-body);
      background: var(--gravity-bg);
      color: var(--gravity-text);
      font-size: 14px;
      line-height: 1.5714;
    }

    /* ═══════════════════════════════════════════════════════
       LOGIN SCREEN
    ═══════════════════════════════════════════════════════ */

    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 100% 90% at 50% 100%, rgba(62,0,251,0.5) 0%, transparent 65%),
        var(--gravity-bg);
    }

    .login-card {
      background: var(--gravity-bg-container);
      border-radius: var(--gravity-radius-lg);
      box-shadow: var(--gravity-shadow-md);
      padding: 48px;
      width: 440px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .login-logo img.mark { height: 36px; width: auto; }
    .login-logo img.type { height: 16px; width: auto; }

    .login-head {
      width: 100%;
      text-align: center;
    }

    .login-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--gravity-text);
      margin: 0 0 8px;
      line-height: 1.2;
    }

    .login-sub {
      font-size: 14px;
      color: var(--gravity-text-secondary);
      margin: 0;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form .ant-input-affix-wrapper,
    .login-form .ant-input {
      height: 44px;
    }

    .login-form .ant-btn-lg {
      height: 44px;
      font-size: 15px;
      margin-top: 4px;
    }

    .login-footer {
      font-size: 12px;
      color: var(--gravity-text-tertiary);
      text-align: center;
    }

    /* ═══════════════════════════════════════════════════════
       APP SHELL
    ═══════════════════════════════════════════════════════ */

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navbar ── */
    .topbar {
      background: var(--gravity-bg-container);
      border-bottom: 1px solid var(--gravity-split);
      display: flex;
      align-items: stretch;
      padding-right: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: stretch;
      flex: 1;
      min-width: 0;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      text-decoration: none;
      padding: 0 20px;
    }

    .topbar .ant-menu-horizontal {
      border-bottom: none !important;
      flex: 1;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    /* ── Main ── */
    .main {
      flex: 1;
      padding: 24px;
      background: var(--gravity-bg);
      overflow-y: auto;
      min-width: 0;
    }

       DASHBOARD CONTENT
    ═══════════════════════════════════════════════════════ */

    /* Section heading */

      font-size: 16px;
      font-weight: 600;
      color: var(--gravity-text);
      margin: 0 0 16px;
    }

    /* KPI row */

      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 40px;

      font-size: 32px;
      font-weight: 600;
      line-height: 28px;

      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 40px;

      padding: 16px;
      text-align: center;
      color: var(--gravity-text-tertiary);

    /* Recent tables */

      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;

      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid var(--gravity-split);
      gap: 12px;

      padding-bottom: 0;

      font-weight: 500;
      color: var(--gravity-text);

      text-overflow: ellipsis;
      white-space: nowrap;
      min-width: 0;

      color: var(--gravity-text-tertiary);
      flex-shrink: 0;

    ═══════════════════════════════════════════════════════ */

      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 24px;
      gap: 24px;

    .greeting-left {

      flex-direction: column;
      gap: 8px;
    }

    .greeting-meta {
      display: flex;
      align-items: center;
      gap: 12px;
    }

       MINI CALENDAR
    ═══════════════════════════════════════════════════════ */

    .mini-calendar { user-select: none; }

    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .cal-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      text-align: center;
    }

    .cal-cell {
      padding: 4px 2px;
      font-size: 11px;
      border-radius: 4px;
      color: var(--gravity-text);
      line-height: 1.5;
    }

    .cal-cell.dow {
      color: var(--gravity-text-tertiary);
      font-size: 10px;
      font-weight: 500;
    }

    .cal-cell.today {

      color: #fff;

    ═══════════════════════════════════════════════════════ */

      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 12px;
      margin-bottom: 24px;

    .task-row {

      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--gravity-split);

    .task-row:last-child { border-bottom: none; padding-bottom: 0; }

    .task-text { font-size: 13px; display: block; }

    .task-done .task-text {

      color: var(--gravity-text-tertiary);

    .team-row {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--gravity-split);
    }

    .team-row:last-child { border-bottom: none; padding-bottom: 0; }

// variant='mark' → solo marchio | variant='full' → marchio + logotipo (default)
function Logo({ markH = 26, typeH = 13, gap = 10, variant = 'full' }) {
  const [showFallback, setShowFallback] = useState(false);
  return React.createElement('div', { style: { display:'flex', alignItems:'center', gap } },
    !showFallback
      ? React.createElement('img', {
          src: '../../brand/Gravity_mark.svg',
          style: { height: markH, width: 'auto' },
          alt: 'Gravity',
          onError: () => setShowFallback(true),
        })
      : React.createElement('span', {
          style: {
            fontFamily: 'var(--gravity-font-brand)',
            fontSize: markH * 0.75,
            fontWeight: 600,
            color: 'var(--gravity-primary)',
          }
        }, 'G'),
    variant === 'full' && React.createElement('img', {
      src: '../../brand/Gravity_type.svg',
      style: { height: typeH, width: 'auto' },
      alt: '',
      onError: (e) => { e.target.style.display = 'none'; }
    })
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// LOGIN SCREEN

function LoginScreen({ onLogin }) {
  const [email, setEmail]       = useState('gloria@gravity.com');
  const [password, setPassword] = useState('Gravity2024!');
  const [loading, setLoading]   = useState(false);
  const [pwVisible, setPwVisible] = useState(false);

  const canSubmit = email.trim().length > 3 && password.length >= 1;

  function handleSubmit() {
    if (!canSubmit) return;
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      onLogin({ email });
    }, 900);
  }

  function handleKey(e) {
    if (e.key === 'Enter') handleSubmit();
  }

  return React.createElement('div', { className: 'login-bg' },
    React.createElement('div', { className: 'login-card' },

      React.createElement('div', { className: 'login-logo' },
        React.createElement(Logo, { markH: 56, variant: 'mark' })
      ),

      React.createElement('div', { className: 'login-head' },
        React.createElement('h1', { className: 'login-title' }, 'Accedi a Gravity'),
        React.createElement('p', { className: 'login-sub' },
          'Inserisci le tue credenziali aziendali per continuare.'
        )
      ),

      React.createElement('div', { className: 'login-form' },

        React.createElement(Input, {
          size: 'large',
          placeholder: 'Email aziendale',
          prefix: React.createElement(UserOutlined, { style: { color: 'var(--gravity-text-tertiary)' } }),
          type: 'email',
          value: email,
          autoFocus: true,
          onChange: e => setEmail(e.target.value),
          onKeyDown: handleKey,
        }),

        React.createElement(Input, {
          size: 'large',
          placeholder: 'Password',
          prefix: React.createElement(LockOutlined, { style: { color: 'var(--gravity-text-tertiary)' } }),
          type: pwVisible ? 'text' : 'password',
          value: password,
          onChange: e => setPassword(e.target.value),
          onKeyDown: handleKey,
          suffix: React.createElement(Button, {
            type: 'text',
            size: 'small',
            tabIndex: -1,
            icon: React.createElement(pwVisible ? EyeInvisibleOutlined : EyeOutlined),
            onClick: () => setPwVisible(v => !v),
            style: { color: 'var(--gravity-text-tertiary)' }
          }),
        }),

        React.createElement(Button, {
          type: 'primary',
          size: 'large',
          block: true,
          loading,
          disabled: !canSubmit,
          onClick: handleSubmit,
          icon: React.createElement(RightOutlined),
          iconPosition: 'end',
          style: { marginTop: 4 }
        }, 'Accedi')

      ),

      React.createElement('p', { className: 'login-footer' },
        'Problemi di accesso? Contatta il tuo amministratore di sistema.'
      )

    )
  );
}

function MiniCalendar() {
  const today = new Date();
  const [current, setCurrent] = useState(new Date(today.getFullYear(), today.getMonth(), 1));

  const year  = current.getFullYear();
  const month = current.getMonth();
  const monthLabel = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(current);

  const offset    = (new Date(year, month, 1).getDay() + 6) % 7; // Mon=0
  const totalDays = new Date(year, month + 1, 0).getDate();

  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);

  const isToday = d =>
    d !== null &&
    year  === today.getFullYear() &&
    month === today.getMonth() &&
    d     === today.getDate();

  return React.createElement(Card, {
    size: 'small',
    styles: { body: { padding: '12px 16px' } },
    style: { width: 228 },
  },
    React.createElement('div', { className: 'mini-calendar' },

      React.createElement('div', { className: 'cal-header' },
        React.createElement(Button, {
          type: 'text', size: 'small',
          icon: React.createElement(LeftOutlined),
          onClick: () => setCurrent(new Date(year, month - 1, 1)),
          style: { color: 'var(--gravity-text-tertiary)', padding: '0 4px' },
        }),
        React.createElement(Typography.Text, { strong: true, style: { fontSize: 12, textTransform: 'capitalize' } },
          monthLabel
        ),
        React.createElement(Button, {
          type: 'text', size: 'small',
          icon: React.createElement(RightOutlined),
          onClick: () => setCurrent(new Date(year, month + 1, 1)),
          style: { color: 'var(--gravity-text-tertiary)', padding: '0 4px' },
        }),
      ),

      React.createElement('div', { className: 'cal-grid' },
        ['L','M','M','G','V','S','D'].map((d, i) =>
          React.createElement('div', { key: 'dow-' + i, className: 'cal-cell dow' }, d)
        ),
        cells.map((d, i) =>
          React.createElement('div', {
            key: 'c-' + i,
            className: 'cal-cell' + (isToday(d) ? ' today' : ''),
          }, d !== null ? d : '')
        )
      )

    )
  );
}

        seesTeam && React.createElement(Card, { title: 'Attività del team', size: 'small' },
          TEAM_ACTIVITY.map((a, i) =>

              React.createElement('div', { style: { flex: 1, minWidth: 0 } },

                  React.createElement('strong', null, a.user), ' ' + a.action
                ),
                React.createElement('br'),
                React.createElement(Typography.Text, { type: 'secondary', style: { fontSize: 12 } }, a.target)
              ),

            )

        ),

function App() {
  const [screen, setScreen]   = useState('login'); // 'login' | 'welcome'
  const [loggedUser, setLoggedUser] = useState(null);
  const [msgApi, ctxHolder]   = antMessage.useMessage();

  function handleLogin({ email }) {
    setLoggedUser({ ...USER, email });
    setScreen('welcome');
  }

  function handleLogout() {
    setLoggedUser(null);
    setScreen('login');
  }

  function handleNavigate(key) {
    msgApi.info({
      content: 'Schermata "' + key + '" in costruzione — proseguiamo step by step!',
      duration: 3,
    });
  }

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(React.Fragment, null,
      ctxHolder,
      screen === 'login'
        ? React.createElement(LoginScreen, { onLogin: handleLogin })
        : React.createElement(WelcomeScreen, {
            user: loggedUser,
            onLogout: handleLogout,
            onNavigate: handleNavigate,
          })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
