    /* ── Search card (top) ── */

    /* Brief chips */

    .ss-sys-info { flex: 1; min-width: 0; }
    .ss-sys-code {

    }

    .ss-sys-meta-type { font-weight: 500; color: rgba(0,0,0,0.45); }
    .ss-sys-meta-sep { color: rgba(0,0,0,0.20); margin: 0 1px; }
    .ss-sys-meta-fmt { font-family: 'SF Mono','Fira Code',monospace; font-size: 10px; color: rgba(0,0,0,0.30); }
    /* Label chip + button */
    .ss-label-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 10px; border: 1px solid;

      white-space: nowrap; flex-shrink: 0;
    }
    .ss-label-btn {
      color: rgba(0,0,0,0.20); font-size: 12px; cursor: pointer;
      padding: 2px 3px; border-radius: 4px; line-height: 1; flex-shrink: 0;

    }
    .ss-label-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    /* Label picker popover */
    .ss-label-picker { width: 210px; }
    .ss-label-picker-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 0 8px; }
    .ss-label-picker-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; border-radius: 4px; }
    .ss-label-picker-row:hover { background: #F5F5F5; padding-left: 4px; margin: 0 -4px; }
    /* Color palette for new label */
    .ss-color-palette { display: flex; gap: 5px; margin: 8px 0; }
    .ss-color-swatch { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; transition: transform 0.1s; }
    .ss-color-swatch:hover { transform: scale(1.15); }
    .ss-face-badge { font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .ss-face-badge-all  { color: #52C41A; }
    .ss-face-badge-part { color: #3E00FB; }
    .ss-face-badge-none { color: rgba(0,0,0,0.35); }
    .ss-expand-btn {
      color: rgba(0,0,0,0.25); font-size: 10px; cursor: pointer;
      padding: 4px 6px; border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s, background 0.1s;
    }
    .ss-expand-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    .ss-faces-body { background: #FAFAFA; border-top: 1px solid #F0F0F0; padding: 3px 0 5px; }
    .ss-face-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px 5px 30px; cursor: pointer; transition: background 0.1s;
    }
    .ss-face-row:hover { background: rgba(0,0,0,0.02); }
    .ss-face-row.ss-face-selected { background: rgba(62,0,251,0.05); }
    .ss-face-type { font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.65); min-width: 95px; flex-shrink: 0; }
    .ss-face-format { font-size: 10px; color: rgba(0,0,0,0.30); font-family: 'SF Mono','Fira Code',monospace; flex: 1; white-space: nowrap; }
    .ss-face-state { display: flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(0,0,0,0.45); white-space: nowrap; flex-shrink: 0; }
    .ss-face-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

    /* ── Map floating card ── */
    .ss-map-floatcard {
      position: absolute; top: 16px; left: 16px; z-index: 450;
      background: #fff; border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.16), 0 1px 4px rgba(0,0,0,0.08);
      border: 1px solid rgba(0,0,0,0.06); width: 320px; overflow: hidden;
    }
    .ss-map-floatcard-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px 6px; border-bottom: 1px solid #F0F0F0;
    }
    .ss-map-floatcard-title {
      font-size: 10px; font-weight: 600; color: rgba(0,0,0,0.35);
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .ss-map-floatcard-close {
      background: none; border: none; cursor: pointer; color: rgba(0,0,0,0.3);
      padding: 2px 4px; border-radius: 4px; display: flex; align-items: center;
    }
    .ss-map-floatcard-close:hover { color: rgba(0,0,0,0.65); background: rgba(0,0,0,0.05); }

/* ── Filter drawer ── */
.ant-drawer-body { padding-top: 8px !important; }
.filter-section { padding: 14px 10px; border-bottom: 1px solid #F0F0F0; }
.filter-section:last-child { border-bottom: none; }
.filter-section-label { font-size: 12px; font-weight: 600; color: rgba(0,0,0,0.65); margin-bottom: 8px; }
.filter-macro-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(0,0,0,0.3); margin: 8px 0 4px; }
.filter-macro-label:first-child { margin-top: 0; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 6px; border: 1px solid #D9D9D9;
  font-size: 13px; cursor: pointer; margin: 3px;
  background: #fff; color: rgba(0,0,0,0.65); transition: all 0.15s; user-select: none;
}
.filter-chip.selected { background: #F0EAFF; border-color: #3E00FB; color: #3E00FB; font-weight: 500; }
.filter-chip:hover:not(.selected) { border-color: #b0b0b0; color: rgba(0,0,0,0.88); }

/* ── Geocoding progress banner ── */
.geocoding-banner {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  background: rgba(62,0,251,0.92); color: #fff;
  padding: 6px 16px 6px 14px; border-radius: 0 0 10px 10px;
  font-size: 12px; font-weight: 500; z-index: 200;
  white-space: nowrap; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.geocoding-progress-bar {
  width: 100px; height: 3px; background: rgba(255,255,255,0.3);
  border-radius: 2px; overflow: hidden;
}
.geocoding-progress-fill {
  height: 100%; background: #fff; border-radius: 2px; transition: width 0.25s;
}


    /* ── Nuovo Impianto (drawer) ──────────────────────────── */
    .ni-section { padding: 10px 0; }
    .ni-section:first-child { padding-top: 4px; }
    .ni-section:last-child { padding-bottom: 0; }
    .ni-section-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.35); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 16px; }
    .ni-grid { display: grid; gap: 0 12px; }
    .ni-grid-2 { grid-template-columns: 1fr 1fr; }
    .ni-grid-3 { grid-template-columns: 1fr 1fr 1fr; }
    .ni-grid-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

    /* ── Create page ── */
    .create-page { flex: 1; min-height: 0; display: flex; flex-direction: column; background: #F5F5F5; overflow: hidden; }
    .create-topbar { display: flex; align-items: center; gap: 8px; height: 52px; padding: 0 24px; background: #fff; border-bottom: 1px solid #F0F0F0; flex-shrink: 0; }
    .create-body { flex: 1; min-height: 0; display: flex; overflow: hidden; }
    .create-nav { width: 188px; flex-shrink: 0; padding: 20px 12px; background: #fff; border-right: 1px solid #F0F0F0; overflow-y: auto; }
    .create-nav-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: rgba(0,0,0,0.3); padding: 0 10px; margin-bottom: 6px; }
    .create-nav-item { display: block; padding: 6px 10px; border-radius: 6px; font-size: 13px; color: rgba(0,0,0,0.65); cursor: pointer; margin-bottom: 1px; transition: background 0.12s, color 0.12s; user-select: none; }
    .create-nav-item:hover { background: rgba(0,0,0,0.04); color: rgba(0,0,0,0.88); }
    .create-nav-item.active { background: rgba(62,0,251,0.07); color: #3E00FB; font-weight: 500; }
    .create-scroll { flex: 1; overflow-y: auto; padding: 32px 40px 80px; }
    .create-content { max-width: 720px; }
    .create-section { margin-bottom: 32px; }
    .create-section-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.35); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 14px; }
    .ni-field { margin-bottom: 14px; }
    .ni-field:last-child { margin-bottom: 0; }
    .ni-label { font-size: 13px; color: rgba(0,0,0,0.65); margin-bottom: 5px; }
    .ni-label .req { color: #FF4D4F; margin-left: 2px; }
    .ni-switch-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; }
    .ni-switch-label { font-size: 14px; color: rgba(0,0,0,0.85); }
    .ni-switch-sub   { font-size: 12px; color: rgba(0,0,0,0.45); margin-top: 1px; }
    .ni-entity-tag { display: inline-flex; align-items: center; gap: 6px; background: #F5F5F5; border: 1px solid #D9D9D9; border-radius: 4px; padding: 3px 8px; font-size: 12px; color: rgba(0,0,0,0.75); margin: 3px 4px 3px 0; }
    .ni-entity-tag-remove { cursor: pointer; color: rgba(0,0,0,0.35); font-size: 10px; }

    /* ── Modale Nuovo Impianto ─────────────────────────────── */
    .nim-field { margin-bottom: 16px; }
    .nim-field:last-child { margin-bottom: 0; }
    .nim-label { font-size: 13px; color: rgba(0,0,0,0.65); margin-bottom: 5px; }
    .nim-label .req { color: #FF4D4F; }
    .nim-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .nim-grid-addr { display: grid; grid-template-columns: 1fr 88px; gap: 12px; }
    .nim-section-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.35); text-transform: uppercase; letter-spacing: .07em; margin: 20px 0 12px; }
    .nim-section-title:first-child { margin-top: 0; }

    /* ── Impianto Detail Page ───────────────────────────────── */
    .imp-detail-page { flex: 1; min-height: 0; overflow-y: auto; background: #f5f5f5; }

    .imp-detail-content { padding: 0 24px 40px; }
    .imp-detail-card-wrap { background: #fff; border-radius: 8px; margin-top: -80px; position: relative; z-index: 10; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .info-card { border: 1px solid #F0F0F0; border-radius: 8px; padding: 12px 24px; height: 131px; background: #fff; display: flex; flex-direction: column; justify-content: center; gap: 10px; overflow: hidden; }
    .info-card-title { font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.88); display: block; line-height: 22px; }

    .grant-selected > .ant-collapse-header { background-color: #f9f7ff !important; }
    .readonly-input.ant-input:hover, .readonly-input.ant-input:focus { border-color: #d9d9d9 !important; box-shadow: none !important; }

    .tab-section { margin-bottom: 24px; }
    .field-col { display: flex; flex-direction: column; gap: 8px; }
    .imp-detail-tl-item { display: flex; gap: 16px; padding: 14px 0; border-bottom: 1px solid #F5F5F5; }
    .imp-detail-tl-item:last-child { border-bottom: none; }
    .ant-tabs .ant-tabs-nav::before { border-bottom: none !important; }

<body>
<div id="root"></div>
<script>
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const { ConfigProvider, Input, Tag, Badge, Avatar, Button, Empty, Drawer, InputNumber, Switch, Typography, Popover, Menu, Divider, Segmented, Table, Space, Cascader, Select, Dropdown, Form, AutoComplete, DatePicker, Upload, Modal, Tabs, Descriptions, Tooltip, Collapse, Pagination, Checkbox, Carousel, Row, Col, Card } = antd;
const { Text } = Typography;
const {
  SearchOutlined, BellOutlined, PlusOutlined, AppstoreOutlined, SendOutlined,
  RightOutlined, DownOutlined, ArrowLeftOutlined, EditOutlined,
  EnvironmentOutlined, CloseOutlined, BarsOutlined,
  ClockCircleOutlined, CopyOutlined,

function getSuggestions(query) {
  if (!query || query.trim().length < 2) return [];
  const q = normalizeText(query.trim());
  const buckets = { city: [], province: [], zona: [], street: [] };
  LOCATION_SUGG.forEach(item => {
    const searchIn = normalizeText(item.text + ' ' + item.detail);
    if (!searchIn.includes(q) && !q.split(' ').every(w => searchIn.includes(w))) return;
    const bucket = ['via','corso','viale','piazza','area'].includes(item.type) ? 'street' : item.type;
    if (buckets[bucket] && buckets[bucket].length < 4) buckets[bucket].push(item);
  });
  return [
    { key: 'city',     label: 'Città e Comuni',     items: buckets.city },
    { key: 'province', label: 'Province',            items: buckets.province },
    { key: 'zona',     label: 'Quartieri e Zone',    items: buckets.zona },
    { key: 'street',   label: 'Strade e Aree',       items: buckets.street },
  ].filter(g => g.items.length > 0);
}

function highlightMatch(text, query) {
  if (!query) return React.createElement('span', null, text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}


// ─────────────────────────────────────────────────────────
// RICERCA — helpers normalizzazione e matching per parole
// ─────────────────────────────────────────────────────────
const STOP_WORDS = new Set(['via', 'corso', 'piazza', 'viale', 'largo', 'vicolo', 'lungomare', 'di', 'della', 'delle', 'degli', 'del', 'dei', 'de', 'in', 'a', 'e', 'il', 'la', 'lo', 'le', 'i', 'gli']);

function normalizeText(str) {
  return str
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // rimuove accenti
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')                     // punteggiatura → spazio
    .replace(/\s+/g, ' ')
    .trim();
}

// Restituisce true se ogni parola non-stop di query è contenuta in una parola di text
function matchesSearch(text, query) {
  if (!query) return true;
  const textWords  = normalizeText(text).split(' ');
  const queryWords = normalizeText(query).split(' ').filter(w => w.length > 1 && !STOP_WORDS.has(w));
  if (queryWords.length === 0) return true;
  return queryWords.every(qw => textWords.some(tw => tw.includes(qw)));
}

  { elementType: 'geometry',            stylers: [{ color: '#f5f5f5' }] },
  { elementType: 'labels.icon',         stylers: [{ visibility: 'off' }] },
  { elementType: 'labels.text.fill',    stylers: [{ color: '#717171' }] },

  { featureType: 'water',      elementType: 'geometry', stylers: [{ color: '#c8dff0' }] },

];

const _svgCache = new Map();
const _addOutline = (svgText, w, h) => {
  let s = svgText.replace(/stroke="white"/g, 'stroke="#3E00FB"').replace(/stroke-width="3"/g, 'stroke-width="6"');
  s = s.replace(/<svg([^>]*)>/, (_, a) => {
    a = a.replace(/\swidth="[^"]*"/, '').replace(/\sheight="[^"]*"/, '');
    return `<svg${a} width="${w}" height="${h}">`;
  });
  return s;
};

const makeMarkerIcon = (tipo, stato_amm, isHighlighted, isSelected) => {
  const folder = TIPO_TO_FOLDER[tipo] || 'OOH/palina';
  const file   = (STATO_AMM_CONFIG[stato_amm] || STATO_AMM_CONFIG['Attivo']).file;
  const scale  = 0.46;
  const w = Math.round(78 * scale);
  const h = Math.round(119 * scale);
  const key = `${folder}/${file}`;
  if (isHighlighted && _svgCache.has(key)) {
    return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(_addOutline(_svgCache.get(key), w, h)), scaledSize: new google.maps.Size(w, h), anchor: new google.maps.Point(w / 2, h) };
  }
  return { url: `../assets/${folder}/${file}.svg`, scaledSize: new google.maps.Size(w, h), anchor: new google.maps.Point(w / 2, h) };
};

const makeClusterSvg = (count) => {
  const s = count <= 5 ? 32 : count <= 20 ? 38 : 44;
  const fs = count <= 5 ? 11 : count <= 20 ? 12 : 13;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 78 78" fill="none">
    <path d="M39 70.5C56.397 70.5 70.5 56.397 70.5 39C70.5 21.603 56.397 7.5 39 7.5C21.603 7.5 7.5 21.603 7.5 39C7.5 56.397 21.603 70.5 39 70.5Z" fill="url(#cg)" stroke="white" stroke-width="1.5" stroke-miterlimit="10"/>
    <defs>
      <linearGradient id="cg" x1="39" y1="70.5" x2="39" y2="7.5" gradientUnits="userSpaceOnUse">
        <stop stop-color="#006FFF"/>
        <stop offset="1" stop-color="#093F7E"/>
      </linearGradient>
    </defs>
    <text x="39" y="44" text-anchor="middle" fill="white" font-size="${fs * (78/s)}" font-weight="700" font-family="-apple-system,BlinkMacSystemFont,sans-serif">${count}</text>
  </svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), size: s };
};

function GoogleMap({ impianti, highlightedId, selectedIds, filteredIds, onSelect, onMarkerClick, cardImp, onCardClose, onDetail, flyToTarget }) {
  const containerRef  = useRef(null);
  const mapRef        = useRef(null);
  const clustererRef  = useRef(null);
  const markersRef    = useRef({});   // id → { marker, imp, infoWindow }
  const openInfoRef   = useRef(null); // InfoWindow aperta
  const cardImpRef         = useRef(null);
  const highlightMarkerRef = useRef(null);
  const [cardPx, setCardPx] = useState(null);

  const recalcCardPx = React.useCallback(() => {
    const imp = cardImpRef.current;
    const map = mapRef.current;
    if (!imp || !map) { setCardPx(null); return; }
    const proj = map.getProjection();
    const bounds = map.getBounds();
    if (!proj || !bounds) { setCardPx(null); return; }
    const scale = Math.pow(2, map.getZoom());
    const nw = proj.fromLatLngToPoint(new google.maps.LatLng(bounds.getNorthEast().lat(), bounds.getSouthWest().lng()));
    const entry = markersRef.current[imp.id];
    const lat = entry ? entry.imp.lat : imp.lat;
    const lng = entry ? entry.imp.lng : imp.lng;
    const pt = proj.fromLatLngToPoint(new google.maps.LatLng(lat, lng));
    setCardPx({ x: Math.floor((pt.x - nw.x) * scale), y: Math.floor((pt.y - nw.y) * scale) });
  }, []);

  useEffect(() => {
    const seen = new Set();
    impianti.forEach(imp => {
      const folder = TIPO_TO_FOLDER[imp.tipo] || 'OOH/palina';
      const file = (STATO_AMM_CONFIG[imp.stato_amm] || STATO_AMM_CONFIG['Attivo']).file;
      const key = `${folder}/${file}`;
      if (!seen.has(key) && !_svgCache.has(key)) {
        seen.add(key);
        fetch(`../assets/${key}.svg`).then(r => r.text()).then(text => _svgCache.set(key, text)).catch(() => {});
      }
    });
  }, []);

  // ── Init mappa + marker ───────────────────────────────
  useEffect(() => {
    if (mapRef.current || !containerRef.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 38.1155, lng: 13.3615 },
      zoom: 13,
      styles: MAP_STYLES,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.LEFT_TOP },
      gestureHandling: 'greedy',
    });

    const allMarkers = impianti.map(imp => {
      const marker = new google.maps.Marker({
        position: { lat: imp.lat, lng: imp.lng },
        icon: makeMarkerIcon(imp.tipo, imp.stato_amm, false, false),
      });

      const infoWindow = new google.maps.InfoWindow({
        content: `<div style="padding:6px 2px;font-family:-apple-system,sans-serif">
          <div style="font-size:12px;font-weight:600;color:rgba(0,0,0,0.88);margin-bottom:2px">${imp.indirizzo}</div>
          <div style="font-size:11px;color:rgba(0,0,0,0.45)">${imp.tipo} · ${imp.zona}</div>
        </div>`,
        disableAutoPan: true,
        pixelOffset: new google.maps.Size(0, -4),
      });

      marker.addListener('mouseover', () => {
        if (openInfoRef.current) openInfoRef.current.close();
        infoWindow.open(map, marker);
        openInfoRef.current = infoWindow;
      });
      marker.addListener('mouseout', () => {
        infoWindow.close();
        openInfoRef.current = null;
      });
      marker.addListener('click', () => { if (onMarkerClick) onMarkerClick(imp); else onSelect(imp.id); });

      markersRef.current[imp.id] = { marker, imp, infoWindow };
      return marker;
    });

    // Clusterer con renderer custom
    const clusterer = new markerClusterer.MarkerClusterer({
      map,
      markers: allMarkers,
      renderer: {
        render: ({ count, position }) => {
          const { size: s } = makeClusterSvg(count);
          const { url } = makeClusterSvg(count);
          return new google.maps.Marker({
            position,
            icon: {
              url,
              scaledSize: new google.maps.Size(s, s),
              anchor:     new google.maps.Point(s / 2, s / 2),
            },
            zIndex: 10000 + count,
          });
        },
      },
    });

    google.maps.event.addListener(map, 'bounds_changed', recalcCardPx);

    mapRef.current   = map;
    clustererRef.current = clusterer;

    return () => { mapRef.current = null; clustererRef.current = null; };
  }, []);

  // ── Aggiorna posizioni marker quando cambiano le coordinate (geocoding) ──
  useEffect(() => {
    if (!mapRef.current || !clustererRef.current) return;
    let changed = false;
    impianti.forEach(imp => {
      const entry = markersRef.current[imp.id];
      if (!entry) return;
      const curr = entry.marker.getPosition();
      if (!curr ||
          Math.abs(curr.lat() - imp.lat) > 0.000005 ||
          Math.abs(curr.lng() - imp.lng) > 0.000005) {
        entry.marker.setPosition({ lat: imp.lat, lng: imp.lng });
        entry.imp = { ...entry.imp, lat: imp.lat, lng: imp.lng };
        changed = true;
      }
    });
    if (changed) clustererRef.current.render();
  }, [impianti]);

  // ── Aggiorna stile e visibilità marker ────────────────
  useEffect(() => {
    if (!clustererRef.current) return;

    const visibleMarkers = [];
    Object.entries(markersRef.current).forEach(([id, { marker, imp }]) => {
      const isHighlighted = id === highlightedId;
      const isSelected    = selectedIds.has(id);
      const inFilter      = !filteredIds || filteredIds.has(id);
      const visible       = inFilter;

      marker.setIcon(makeMarkerIcon(imp.tipo, imp.stato_amm, false, isSelected));
      marker.setZIndex(isHighlighted ? 9999 : isSelected ? 500 : 1);
      marker.setOpacity(isHighlighted ? 0 : (cardImp ? 0.3 : 1));

      if (visible) visibleMarkers.push(marker);
    });

    clustererRef.current.clearMarkers(true);
    clustererRef.current.addMarkers(visibleMarkers);

    if (highlightedId && markersRef.current[highlightedId]) {
      const { imp } = markersRef.current[highlightedId];
      mapRef.current.panTo({ lat: imp.lat, lng: imp.lng });
      if (mapRef.current.getZoom() < 15) mapRef.current.setZoom(16);
    }
  }, [highlightedId, selectedIds, filteredIds, cardImp]);

  // ── Overlay marker highlighted (bypass clusterer) ────────
  useEffect(() => {
    if (highlightMarkerRef.current) {
      highlightMarkerRef.current.setMap(null);
      highlightMarkerRef.current = null;
    }
    if (!highlightedId || !mapRef.current) return;
    const entry = markersRef.current[highlightedId];
    if (!entry) return;
    const { imp } = entry;
    const folder = TIPO_TO_FOLDER[imp.tipo] || 'OOH/palina';
    const file   = (STATO_AMM_CONFIG[imp.stato_amm] || STATO_AMM_CONFIG['Attivo']).file;
    const key    = `${folder}/${file}`;
    const w = Math.round(78 * 0.46), h = Math.round(119 * 0.46);
    let alive = true;

    // Crea subito l'overlay con l'icona normale — così il marker è sempre visibile
    highlightMarkerRef.current = new google.maps.Marker({
      position: { lat: imp.lat, lng: imp.lng },
      icon: { url: `../assets/${folder}/${file}.svg`, scaledSize: new google.maps.Size(w, h), anchor: new google.maps.Point(w / 2, h) },
      map: mapRef.current,
      zIndex: 10000,
      clickable: false,
    });

    // Poi aggiorna a outlined non appena il testo SVG è disponibile
    const applyOutline = (text) => {
      if (!alive || !highlightMarkerRef.current) return;
      _svgCache.set(key, text);
      highlightMarkerRef.current.setIcon({
        url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(_addOutline(text, w, h)),
        scaledSize: new google.maps.Size(w, h),
        anchor: new google.maps.Point(w / 2, h),
      });
    };

    if (_svgCache.has(key)) applyOutline(_svgCache.get(key));
    else fetch(`../assets/${folder}/${file}.svg`).then(r => r.text()).then(applyOutline).catch(() => {});

    return () => { alive = false; };
  }, [highlightedId]);

  // ── Posizione card sul marker ────────────────────────
  useEffect(() => {
    cardImpRef.current = cardImp;
    setCardPx(null);
  }, [cardImp]);

  // ── Fly to zona cercata ───────────────────────────────
  useEffect(() => {
    if (!flyToTarget || !mapRef.current) return;
    mapRef.current.panTo({ lat: flyToTarget.lat, lng: flyToTarget.lng });
    mapRef.current.setZoom(flyToTarget.zoom || 14);
  }, [flyToTarget]);


  return React.createElement('div', { id: 'ooh-map', style: { position: 'relative' } },
    React.createElement('div', { ref: containerRef, style: { width: '100%', height: '100%' } }),
    cardImp && React.createElement('div', {
      style: { position: 'absolute', left: cardPx ? cardPx.x - 125 : 'calc(50% - 125px)', top: cardPx ? cardPx.y + 8 : 'calc(50% + 8px)', zIndex: 500, width: 250, pointerEvents: 'auto' }
    }, React.createElement(ImpiantoMapCard, { key: cardImp.id, imp: cardImp, onClose: onCardClose, onDetail: onDetail || null }))
  );
}

async function fetchAddrSuggestions(q) {
  if (!q || q.length < 3) return [];
  try {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=12&lang=default&lat=41.9&lon=12.4&zoom=12&bbox=6.6,35.5,18.5,47.1`;
    const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return [];
    const data = await res.json();
    const seen = new Set();
    const qHasNum = /\d/.test(q);
    return (data.features || [])
      .filter(f => f.properties.street || f.properties.name)
      .flatMap(f => {
        const p = f.properties;
        const [lng, lat] = f.geometry.coordinates;
        if (!lat || !lng) return [];
        const via    = p.street || p.name || '';
        const civico = p.housenumber || '';
        const citta  = p.city || p.town || p.village || '';
        const label  = [via, civico].filter(Boolean).join(' ') || citta;
        if (!label || seen.has(label)) return [];
        seen.add(label);
        const subParts = [];
        if (citta && citta !== label) subParts.push(citta);
        if (p.state) subParts.push(p.state);
        return [{
          id: `${lng.toFixed(5)}-${lat.toFixed(5)}`,
          display: [[via, civico].filter(Boolean).join(' '), citta, p.country].filter(Boolean).join(', '),
          sub: subParts.join(', ') || p.country || '',
          via,
          civico,
          cap: p.postcode || '',
          citta,
          provincia: p.county || '',
          regione: p.state || '',
          nazione: p.country || '',
          lat,
          lng,
          _hasNum: !!p.housenumber,
        }];
      })
      .sort((a, b) => qHasNum && a._hasNum !== b._hasNum ? (a._hasNum ? -1 : 1) : 0)
      .slice(0, 8);
  } catch { return []; }
}

function App() {
  const [page, setPage] = useState('map'); // 'map' | 'detail'

  // ── Ricerca zona ──────────────────────────────────────

  const createLabel = useCallback(() => {

              React.createElement(Button, { size: 'small', type: 'primary', onClick: createLabel, disabled: !newLabelName.trim() }, 'Crea'),

          )
    );
  }, [availableLabels, implantiLabels, pickerOpenId, showNewForm, newLabelName, newLabelColor, toggleImpLabel, closePicker, createLabel]);

  // ── Geocoding ─────────────────────────────────────────
  const [geocodedImpianti,  setGeocodedImpianti]  = useState(IMPIANTI);
  const [geocodingProgress, setGeocodingProgress] = useState(null);

  useEffect(() => {
    const CACHE_KEY = 'gravity_geocache_v3';
    let cache = {};
    try { cache = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}'); } catch(e) {}

    const applyCache = (c) => {
      setGeocodedImpianti(IMPIANTI.map(imp =>
        c[imp.id] ? { ...imp, lat: c[imp.id].lat, lng: c[imp.id].lng } : imp
      ));
    };

    const toGeocode = IMPIANTI.filter(imp => !cache[imp.id]);

    if (toGeocode.length === 0) {
      applyCache(cache);
      return;
    }

    setGeocodingProgress({ done: 0, total: toGeocode.length });
    const geocoder = new google.maps.Geocoder();
    let done = 0;
    let cancelled = false;

    const next = (i) => {
      if (cancelled) return;
      if (i >= toGeocode.length) {
        applyCache(cache);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
        setGeocodingProgress(null);
        return;
      }
      const imp = toGeocode[i];
      const palermoBounds = new google.maps.LatLngBounds(
        { lat: 38.055, lng: 13.285 },
        { lat: 38.245, lng: 13.455 }
      );
      geocoder.geocode(
        {
          address: `${imp.indirizzo}, Palermo`,
          componentRestrictions: { country: 'IT', locality: 'Palermo' },
          bounds: palermoBounds,
        },
        (results, status) => {
          if (status === 'OK' && results[0]) {
            const lat = results[0].geometry.location.lat();
            const lng = results[0].geometry.location.lng();
            // Accetta solo risultati dentro il bounding box di Palermo
            if (lat >= 38.055 && lat <= 38.245 && lng >= 13.285 && lng <= 13.455) {
              cache[imp.id] = { lat, lng };
            }
          }
          done++;
          setGeocodingProgress({ done, total: toGeocode.length });
          if (done % 10 === 0) {
            applyCache(cache);
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
          }
          setTimeout(() => next(i + 1), 80);
        }
      );
    };

    next(0);
    return () => { cancelled = true; };
  }, []);

  const [filterDrawerOpen, setFilterDrawerOpen] = useState(false);

  const FILTERS_EMPTY = {
    statiAmm: [], canale: [], suolo: [], mediaOwner: [],
    tipi: [], formati: [], illuminazione: [],
    minFacesEnabled: false, minFacesValue: 1,
  };

  // Draft — modificati nel drawer, non ancora applicati
  const [draftFilters, setDraftFilters] = useState({ ...FILTERS_EMPTY });
  // Applied — effettivamente usati per filtrare
  const [appliedFilters, setAppliedFilters] = useState({ ...FILTERS_EMPTY });

  const setDraft = (key, value) => setDraftFilters(prev => ({ ...prev, [key]: value }));

  // Formati disponibili in base ai tipi attivi nel draft (se nessun tipo → tutti)
  const availableFormats = useMemo(() => {
    if (draftFilters.tipi.length === 0) return ALL_TIPO_FORMATI;
    const s = new Set();
    draftFilters.tipi.forEach(t => (TIPO_FORMATI[t] || []).forEach(f => s.add(f)));
    return [...s].sort();
  }, [draftFilters.tipi]);

  const resetFilters = useCallback(() => {
    setDraftFilters({ ...FILTERS_EMPTY });
    setAppliedFilters({ ...FILTERS_EMPTY });
  }, []);

  const applyFilters = useCallback(() => {
    setAppliedFilters({ ...draftFilters });
    setFilterDrawerOpen(false);
  }, [draftFilters]);

  const openFilterDrawer = useCallback(() => {
    setDraftFilters({ ...appliedFilters });
    setFilterDrawerOpen(true);
  }, [appliedFilters]);

  // Suggerimenti raggruppati per tipo
  const suggestions = useMemo(() => getSuggestions(searchQuery), [searchQuery]);

  // Applica la ricerca zona: aggiorna filtro + naviga la mappa
  const applyZoneSearch = useCallback((query, target) => {
    const q = (query || searchQuery).trim();
    if (!q) { setAppliedZone(null); return; }
    setAppliedZone(q);
    setShowSugg(false);
    if (target) {
      setFlyToTarget({ ...target, _ts: Date.now() });
    } else {
      const isCity = matchesSearch('Palermo Provincia', q) || normalizeText(q) === 'pa';
      if (isCity) {
        setFlyToTarget({ lat: 38.1155, lng: 13.3615, zoom: 12, _ts: Date.now() });
      } else {
        const isZona = ZONE.some(z => normalizeText(z) === normalizeText(q));
        const matching = geocodedImpianti.filter(i =>
          isZona ? matchesSearch(i.zona, q) : matchesSearch(i.indirizzo, q)
        );
        if (matching.length > 0) {
          const lat = matching.reduce((s, i) => s + i.lat, 0) / matching.length;
          const lng = matching.reduce((s, i) => s + i.lng, 0) / matching.length;
          const zoom = matching.length >= 30 ? 12 : matching.length >= 10 ? 14 : 15;
          setFlyToTarget({ lat, lng, zoom, _ts: Date.now() });
        }
      }
    }
  }, [searchQuery]);

  const clearZoneSearch = useCallback(() => {
    setAppliedZone(null);
    setSearchQuery('');
    setShowSugg(false);
  }, []);

  const filteredImpianti = useMemo(() => {
    const f = appliedFilters;
    return geocodedImpianti.filter(imp => {
      if (f.tipi.length > 0 && !f.tipi.includes(imp.tipo)) return false;
      if (f.formati.length > 0 && !f.formati.includes(imp.formato)) return false;
      if (f.illuminazione.length > 0) {
        const k = imp.illuminato ? 'Illuminate' : 'Non illuminate';
        if (!f.illuminazione.includes(k)) return false;
      }
      if (f.minFacesEnabled && imp.faces < f.minFacesValue) return false;
      // ── Filtro zona search ──
      if (appliedZone) {
        const q = appliedZone;
        const isCity    = matchesSearch('Palermo Provincia', q) || normalizeText(q) === 'pa';
        const isZona    = ZONE.some(z => normalizeText(z) === normalizeText(q));
        if (!isCity) {
          if (isZona) {
            // Zona/quartiere: filtra per zona
            if (!matchesSearch(imp.zona, q)) return false;
          } else {
            // Via specifica: filtra SOLO per indirizzo
            if (!matchesSearch(imp.indirizzo, q)) return false;
          }
        }
      }
      return true;
    });
  }, [geocodedImpianti, appliedFilters, appliedZone]);

  const filteredIds = useMemo(() => new Set(filteredImpianti.map(i => i.id)), [filteredImpianti]);

  const activeFilterCount = useMemo(() => {
    const f = appliedFilters;
    return [
      f.statiAmm.length > 0, f.canale.length > 0, f.suolo.length > 0,
      f.mediaOwner.length > 0, f.tipi.length > 0, f.formati.length > 0,
      f.illuminazione.length > 0, f.minFacesEnabled,
    ].filter(Boolean).length;
  }, [appliedFilters]);

  const itemRefs = useRef({});

  const handleHighlight = useCallback((id) => {
    setHighlightedId(prev => prev === id ? null : id);
  }, []);

  const handleMarkerClick = useCallback((imp) => {
    setHighlightedId(prev => prev === imp.id ? null : imp.id);
    setCardImp(prev => prev?.id === imp.id ? null : imp);
  }, []);

  const handleToggleAdd = useCallback((id) => {
    if (id === null) {
      setSelectedIds(new Set());
      return;
    }
    setSelectedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);

  const handleToggleExpand = useCallback((id) => {
    setExpandedIds(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id);
      else next.add(id);
      return next;
    });
  }, []);



  return React.createElement('div', { className: 'app-shell' },
    React.createElement(Navbar),

    page === 'detail'
      ? React.createElement(ImpiantoDetailPage, { imp: detailImpianto, onBack: () => setPage('map'), onEdit: () => {
          if (savedFormData) {

          } else {
            const imp = detailImpianto;
            const [via, civico] = (() => { const parts = (imp.indirizzo || '').split(','); return [parts[0] || '', (parts[1] || '').trim()]; })();
            const normalizeFormato = f => f ? f.replace(/([0-9])(cm|m)$/, '$1 $2') : null;
            setPrefillData({
              canale:    imp.canale    || 'OOH',
              tipologia: imp.tipo      || null,
              formato:   normalizeFormato(imp.formato),

        } })
      : React.createElement('div', { className: 'ooh-workspace' },

      // ── SEARCH CARD (top) ──────────────────────────────
      React.createElement('div', { className: 'ooh-search-card' },
        React.createElement('div', { className: 'ooh-search-area' },

          // ── Riga header: titolo | searchbar centrata | CTA ──
          React.createElement('div', { style: { display: 'flex', alignItems: 'center' } },

          // Titolo — sinistra (flex:1 per bilanciare)
          React.createElement('div', { style: { flex: 1 } },
            React.createElement('span', { style: { fontSize: 22, fontWeight: 700, color: 'rgba(0,0,0,0.88)', letterSpacing: '-0.3px' } }, 'Parco Impianti'),
          ),

          // Search bar — centro (larghezza fissa)
          React.createElement('div', { className: 'ss-search-bar', style: { width: 700 } },

            // Compact group: input + filtri + cerca
            React.createElement('div', { style: { flex: 1, position: 'relative' } },
              React.createElement(Space.Compact, { style: { width: '100%' } },
                React.createElement(Input, {
                  placeholder: 'Cerca via, quartiere, città, provincia…',
                  prefix: React.createElement(SearchOutlined, { style: { color: 'rgba(0,0,0,0.3)', fontSize: 14 } }),
                  allowClear: true,
                  value: searchQuery,
                  onChange: e => {
                    setSearchQuery(e.target.value);

            ),

          ), // ss-search-bar

          // CTA — destra (flex:1 per bilanciare, allineato a destra)
          React.createElement('div', { style: { flex: 1, display: 'flex', justifyContent: 'flex-end' } },
            React.createElement(Space, null,
              React.createElement(Dropdown, {
                menu: {
                  items: [
                    { key: 'nuova-tipologia', label: 'Aggiungi tipologia' },
                    { key: 'nuovo-formato',   label: 'Aggiungi formato' },
                  ],
                },
                trigger: ['click'],
                placement: 'bottomRight',
              },
                React.createElement(Button, {
                  icon: React.createElement(PlusOutlined),
                }, 'Aggiungi'),
              ),
              React.createElement(Dropdown, {
                menu: {
                  items: [
                    { key: 'breve', label: 'Form breve' },
                    { key: 'completa', label: 'Form completo' },
                  ],
                  onClick: ({ key }) => {
                    if (key === 'breve') setModalOpen(true);
                    else setFullFormOpen(true);
                  },
                },
                placement: 'bottomRight',
              },
                React.createElement(Button, {
                  type: 'primary',
                  icon: React.createElement(PlusOutlined),
                }, 'Nuovo Impianto'),
              ),
            ),
          ),

          ), // riga header

          // ── Brief chips: zona attiva ────
          appliedZone &&
          React.createElement('div', { className: 'ss-brief-chips', style: { padding: '0 20px 12px' } },
            React.createElement('span', { className: 'ss-brief-label' }, 'Filtri attivi:'),

            React.createElement('div', { className: 'ss-zone-active-tag' },
              React.createElement(EnvironmentOutlined, { style: { fontSize: 11 } }),
              ' ', appliedZone,
              React.createElement('span', { className: 'clear-btn', onClick: clearZoneSearch }, '×')
            ),
          ),
        ),
      ),

      // ── MAP / LIST AREA ────────────────────────────────
      viewMode === 'map'
        ? React.createElement('div', { className: 'ooh-map-area' },

            React.createElement(GoogleMap, {
              impianti:         geocodedImpianti,
              highlightedId,
              selectedIds,
              filteredIds,
              onSelect:         handleHighlight,
              onMarkerClick:    handleMarkerClick,
              cardImp,
              onCardClose:      () => { setCardImp(null); setHighlightedId(null); },
              onDetail:         (imp) => { setDetailImpianto(imp); setSavedFormData(null); setPage('detail'); },
              flyToTarget,
            }),

            geocodingProgress && React.createElement('div', { className: 'geocoding-banner' },
              React.createElement('span', null,
                `Geocoding indirizzi ${geocodingProgress.done}/${geocodingProgress.total}`
              ),
              React.createElement('div', { className: 'geocoding-progress-bar' },
                React.createElement('div', {
                  className: 'geocoding-progress-fill',
                  style: { width: `${Math.round(geocodingProgress.done / geocodingProgress.total * 100)}%` }
                })
              )
            ),

            !cardImp && React.createElement(MapInfobox, {
              total:             filteredImpianti.length,
              filteredImpianti,
            }),

            // View toggle — floating top-right
            React.createElement('div', {
              style: { position: 'absolute', top: 16, right: 16, zIndex: 450 },
            },
              React.createElement(Segmented, {
                value: viewMode,
                onChange: setViewMode,
                style: { boxShadow: '0 2px 8px rgba(0,0,0,0.14)' },
                options: [
                  { value: 'map',  icon: React.createElement(EnvironmentOutlined), label: 'Mappa' },
                  { value: 'list', icon: React.createElement(BarsOutlined),        label: 'Lista' },
                ],
              })
            ),
          )
        : React.createElement(ListView, { impianti: filteredImpianti, viewMode, setViewMode, onDetail: (imp) => { setDetailImpianto(imp); setSavedFormData(null); setPage('detail'); } })
    ),

    React.createElement(Drawer, {
      title: 'Filtri avanzati',
      placement: 'right',
      width: 480,
      open: filterDrawerOpen,
      onClose: () => setFilterDrawerOpen(false),
      footer: React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between' } },
        React.createElement(Button, { danger: true, type: 'text', onClick: resetFilters }, 'Azzera tutto'),
        React.createElement(Button, { type: 'primary', onClick: applyFilters }, 'Applica')
      ),
    },
      React.createElement(FilterPanel, {
        filterStatiAmm: draftFilters.statiAmm,       onFilterStatiAmmChange:    v => setDraft('statiAmm', v),
        filterCanale: draftFilters.canale,            onFilterCanaleChange:      v => setDraft('canale', v),
        filterSuolo: draftFilters.suolo,              onFilterSuoloChange:       v => setDraft('suolo', v),
        filterMediaOwner: draftFilters.mediaOwner,    onFilterMediaOwnerChange:  v => setDraft('mediaOwner', v),
        filterTipi: draftFilters.tipi,                onFilterTipiChange:        v => setDraft('tipi', v),
        filterFormati: draftFilters.formati,          onFilterFormatiChange:     v => setDraft('formati', v),
        availableFormats,
        filterIlluminazione: draftFilters.illuminazione, onFilterIlluminazioneChange: v => setDraft('illuminazione', v),
        minFacesEnabled: draftFilters.minFacesEnabled, onMinFacesEnabledChange:  v => setDraft('minFacesEnabled', v),
        minFacesValue: draftFilters.minFacesValue,    onMinFacesValueChange:     v => setDraft('minFacesValue', v),
      })
    ),

    React.createElement(NewImpiantoModal, {
      open: modalOpen,
      onClose: () => setModalOpen(false),
      onCrea: (imp) => {
        setDetailImpianto(imp);
        setPage('detail');
      },
      onContinua: (data) => {
        setPrefillData(data);
        setModalOpen(false);
        setFullFormOpen(true);
      },
    }),
    React.createElement(NewImpiantoFullDrawer, {
      open: fullFormOpen,
      onClose: () => setFullFormOpen(false),
      initialValues: prefillData,
      onSave: (data) => { setSavedFormData(data); },
    }),
  );
}

// ─────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────
window.applyGravityTokens && window.applyGravityTokens();
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App)
  )
);
</script>
</body>
</html>
