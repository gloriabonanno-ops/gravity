<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — [Nome Prototipo]</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Ant Design 5.x -->
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>

  <!-- Ant Design Icons 5.x -->
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.js"></script>

  <!-- Font UI: SF Pro Text (sistema Apple) — non richiede import.
       Oswald e Inter sono font del brand, NON vanno usati nell'interfaccia. -->

  <!-- Gravity Design Tokens (estratti da Figma: Ant Design System for Gravity) -->
  <script src="../tokens.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--gravity-font-body);
      background: var(--gravity-bg);
      color: var(--gravity-text);
      font-size: var(--gravity-fs-sm);
      line-height: var(--gravity-lh-body);
    }

    /* Heading — usa i token Ant Design, NON sovrascrivere font-family con Oswald */
    h1, h2, h3, h4, h5, h6 {
      color: var(--gravity-text);
      margin: 0;
    }

    /* Utility: pagina centrata */
    .page-center {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--gravity-space-lg);
    }

    /* Utility: full layout con sidebar */
    .page-layout {
      display: flex;
      min-height: 100vh;
    }

    /* Utility: card generica */
    .gravity-card {
      background: var(--gravity-bg-container);
      border-radius: var(--gravity-radius-lg);
      box-shadow: var(--gravity-shadow);
      padding: var(--gravity-space-xxl);
    }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/javascript">
// Applica i CSS custom properties al :root
window.applyGravityTokens();

// ── Globals ─────────────────────────────────────────────────────────────────
const { useState, useEffect, useRef, useCallback, useMemo } = React;
const {
  ConfigProvider, App,
  Layout, Menu, Breadcrumb, Space, Divider,
  Typography,
  Button, Input, Select, Form, Checkbox, Radio,
  Switch, DatePicker, InputNumber, Upload, Slider, Rate,
  Table, Card, Tag, Badge, Avatar, Tabs,
  Tooltip, Popover, Collapse, Statistic, Segmented,
  List, Descriptions, Empty, Tree, Timeline,
  Modal, Drawer, Alert, Progress, Spin, Skeleton, Result,
  Pagination, Steps, Dropdown,
  message, notification,
} = antd;

const {
  UserOutlined, SettingOutlined, LogoutOutlined, DashboardOutlined,
  PlusOutlined, EditOutlined, DeleteOutlined, SaveOutlined,
  SearchOutlined, FilterOutlined, DownloadOutlined, UploadOutlined,
  CheckOutlined, CloseOutlined, ArrowRightOutlined, ArrowLeftOutlined,
  HomeOutlined, MenuOutlined, AppstoreOutlined, BarsOutlined,
  EyeOutlined, EyeInvisibleOutlined,
  InfoCircleOutlined, WarningOutlined, CheckCircleOutlined, CloseCircleOutlined,
  ExclamationCircleOutlined, QuestionCircleOutlined,
  CalendarOutlined, ClockCircleOutlined,
  MoreOutlined, EllipsisOutlined,
  LeftOutlined, RightOutlined, DownOutlined, UpOutlined,
} = icons;

const { Title, Text, Paragraph } = Typography;
const { Header, Sider, Content, Footer } = Layout;

// ── Logo Gravity ──────────────────────────────────────────────────────────────
function GravityLogo({ height = 40, type = 'mark' }) {
  const src = type === 'full'
    ? '../brand/Gravity_type.svg'
    : '../brand/Gravity_mark.svg';
  return React.createElement('img', {
    src,
    alt: 'Gravity',
    style: { height, width: 'auto', display: 'block' },
  });
}

// ── App ───────────────────────────────────────────────────────────────────────
function AppRoot() {
  const [messageApi, contextHolder] = message.useMessage();

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App, null,
      contextHolder,

      // TODO: sostituisci con il tuo contenuto
      React.createElement('div', { className: 'page-center' },
        React.createElement('div', { className: 'gravity-card', style: { width: 400 } },
          React.createElement(Space, { direction: 'vertical', size: 24, style: { width: '100%' } },

            React.createElement(GravityLogo, { height: 48 }),

            React.createElement(Title, {
              level: 3,
            }, 'Nome Prototipo'),

            React.createElement(Text, { type: 'secondary' },
              'Descrizione del prototipo'
            ),

            React.createElement(Button, { type: 'primary', size: 'large', block: true },
              'Azione principale'
            ),

          )
        )
      )

    )
  );
}

// ── Mount ─────────────────────────────────────────────────────────────────────
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AppRoot));
</script>
</body>
</html>
