<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Pianificazione · Select Systems</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9/dist/leaflet.js"></script>
  <script src="../tokens.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--gravity-font-body);
      background: var(--gravity-bg);
      color: var(--gravity-text);
      font-size: 14px;
      line-height: 1.5714;
    }

    /* Navbar */
    .g-navbar {
      height: 56px;
      background: #fff;
      border-bottom: 1px solid #F0F0F0;
      display: flex;
      align-items: center;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }
    .g-navbar-logo { margin-right: 32px; display: flex; align-items: center; }
    .g-navbar-menu { display: flex; align-items: stretch; height: 100%; flex: 1; }
    .g-nav-item {
      display: flex; align-items: center; gap: 6px;
      padding: 0 16px; font-size: 14px;
      color: rgba(0,0,0,0.55); cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      user-select: none; white-space: nowrap;
    }
    .g-nav-item:hover { color: rgba(0,0,0,0.88); }
    .g-nav-item.active { color: #3E00FB; border-bottom-color: #3E00FB; font-weight: 500; }
    .g-navbar-right { display: flex; align-items: center; gap: 8px; }

    /* Mappa */
    #leaflet-map { width: 100%; height: 100%; }
    .leaflet-container { font-family: var(--gravity-font-body) !important; }

    /* View toggle */
    .view-btn {
      width: 32px; height: 30px; border: none; cursor: pointer;
      background: #fff; color: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; border-right: 1px solid #D9D9D9;
      transition: background 0.15s, color 0.15s;
    }
    .view-btn:last-child { border-right: none; }
    .view-btn.active { background: #F0EEFF; color: #3E00FB; }
    .view-btn:hover:not(.active) { background: #FAFAFA; color: rgba(0,0,0,0.65); }

    /* System card */
    .system-card {
      border: 1.5px solid #F0F0F0; border-radius: 8px;
      padding: 12px 16px; background: #fff;
      cursor: pointer; display: flex; align-items: center; gap: 12px;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
    }
    .system-card:hover { border-color: #D9D9D9; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .system-card.selected { border-color: #3E00FB; background: #F5F3FF; }

    /* Table row hover */
    .sys-table-row { cursor: pointer; transition: background 0.1s; }
    .sys-table-row:hover td { background: #FAFAFA !important; }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #D9D9D9; border-radius: 3px; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/javascript">
window.applyGravityTokens();

const { useState, useEffect, useRef } = React;
const {
  ConfigProvider, App,
  Space, Divider, Typography,
  Button, Input, Select, Tag,
  Avatar, Switch, Drawer, Checkbox, message,
} = antd;

const {
  SearchOutlined, FilterOutlined,
  SaveOutlined, ArrowLeftOutlined,
  BellOutlined, UserOutlined,
  EnvironmentOutlined, AppstoreOutlined,
  BarsOutlined, TableOutlined, CheckOutlined,
} = icons;

const { Title, Text } = Typography;

// ── Dati mock ─────────────────────────────────────────────────────────────────

const SYSTEMS = [
  { id: 'PA001', type: 'Palina',          address: 'Via delle Scienze',        city: 'Palermo',   status: 'available', lat: 38.1155, lng: 13.3621 },
  { id: 'PA002', type: 'Poster',           address: 'Via Giulio Cesare 14',     city: 'Villabate', status: 'available', lat: 38.0925, lng: 13.4470 },
  { id: 'PA003', type: 'Palina Butterfly', address: 'Via Filippo Patti',        city: 'Misilmeri', status: 'reserved',  lat: 38.0315, lng: 13.4488 },
  { id: 'PA004', type: 'Rotor',            address: 'Piazza Verdi 6',           city: 'Palermo',   status: 'available', lat: 38.1183, lng: 13.3577 },
  { id: 'PA005', type: 'Palina',           address: 'Via Oreto 22',             city: 'Palermo',   status: 'available', lat: 38.1073, lng: 13.3751 },

  { id: 'PA007', type: 'Palina',           address: 'Viale Regione Siciliana',  city: 'Palermo',   status: 'available', lat: 38.0993, lng: 13.3903 },
  { id: 'PA008', type: 'Palina Butterfly', address: 'Via Libertà 112',          city: 'Palermo',   status: 'available', lat: 38.1281, lng: 13.3523 },
  { id: 'PA009', type: 'Rotor',            address: 'Via Roma 278',             city: 'Palermo',   status: 'reserved',  lat: 38.1198, lng: 13.3614 },
  { id: 'PA010', type: 'Palina',           address: 'Via Notarbartolo 9',       city: 'Palermo',   status: 'available', lat: 38.1304, lng: 13.3463 },
  { id: 'PA011', type: 'Poster',           address: 'Via Messina Marine 4',     city: 'Palermo',   status: 'available', lat: 38.0962, lng: 13.3692 },
  { id: 'PA012', type: 'Palina',           address: 'Via Strasburgo 233',       city: 'Palermo',   status: 'option',    lat: 38.1034, lng: 13.3383 },
];

const STATUS = {
  available: { color: '#52C41A', label: 'Available' },
  reserved:  { color: '#7B61FF', label: 'Reserved'  },
  option:    { color: '#FF4A1C', label: 'In Option'  },
};

const FILTER_OPTIONS = {
  systemType:  ['Palina', 'Poster', 'Palina Butterfly', 'Rotor'],
  salesModel:  ['Standard', 'Premium', 'Special'],
  status:      ['Available', 'Reserved', 'In Option'],
};

// ── Mappa Leaflet ─────────────────────────────────────────────────────────────

function MapView({ systems, selectedIds, onToggle }) {
  const containerRef = useRef(null);
  const mapRef       = useRef(null);
  const markersRef   = useRef({});

  useEffect(() => {
    if (!containerRef.current || mapRef.current) return;
    mapRef.current = L.map(containerRef.current, { center: [38.107, 13.372], zoom: 13 });
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19,
    }).addTo(mapRef.current);
    return () => { if (mapRef.current) { mapRef.current.remove(); mapRef.current = null; } };
  }, []);

  useEffect(() => {
    if (!mapRef.current) return;
    Object.values(markersRef.current).forEach(m => m.remove());
    markersRef.current = {};

    systems.forEach(sys => {
      const sel = selectedIds.includes(sys.id);
      const s   = STATUS[sys.status];
      const c   = sel ? '#3E00FB' : s.color;

      const icon = L.divIcon({
        html: `<div style="position:relative;width:30px;height:38px;">
          <svg viewBox="0 0 30 38" xmlns="http://www.w3.org/2000/svg"
               style="width:30px;height:38px;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.22))">
            <path d="M15 0C6.716 0 0 6.716 0 15C0 26.25 15 38 15 38C15 38 30 26.25 30 15C30 6.716 23.284 0 15 0Z" fill="${c}"/>
            <circle cx="15" cy="15" r="7" fill="white" opacity="0.92"/>
            <rect x="11" y="11" width="8" height="8" rx="1.5" fill="${c}"/>
          </svg>
          ${sel ? '<div style="position:absolute;top:-3px;right:-3px;width:11px;height:11px;background:#3E00FB;border-radius:50%;border:1.5px solid white;"></div>' : ''}
        </div>`,
        iconSize: [30, 38], iconAnchor: [15, 38], className: '',
      });

      const marker = L.marker([sys.lat, sys.lng], { icon })
        .bindPopup(L.popup({ offset: [0, -32], closeButton: false }).setContent(`
          <div style="font-family:-apple-system,sans-serif;min-width:160px;padding:2px 0;">
            <div style="font-weight:600;font-size:13px;margin-bottom:2px;">${sys.id} · ${sys.type}</div>
            <div style="color:#8c8c8c;font-size:12px;margin-bottom:6px;">${sys.address}, ${sys.city}</div>
            <div style="display:flex;align-items:center;gap:5px;font-size:12px;">
              <div style="width:8px;height:8px;border-radius:50%;background:${s.color};flex-shrink:0;"></div>
              <span style="color:${s.color};font-weight:500;">${s.label}</span>
            </div>
          </div>`))
        .on('click', () => onToggle(sys.id))
        .addTo(mapRef.current);

      markersRef.current[sys.id] = marker;
    });
  }, [systems, selectedIds]);

  return React.createElement('div', { ref: containerRef, id: 'leaflet-map' });
}

// ── Filter Drawer ─────────────────────────────────────────────────────────────

function FiltersDrawer({ open, onClose, onApply }) {
  const [draft, setDraft] = useState({
    systemType: [], salesModel: [], status: [],
  });

  const toggleOption = (group, value) => {
    setDraft(prev => ({
      ...prev,
      [group]: prev[group].includes(value)
        ? prev[group].filter(v => v !== value)
        : [...prev[group], value],
    }));
  };

  const reset = () => setDraft({ systemType: [], salesModel: [], status: [] });

  const apply = () => {
    const chips = [];
    draft.systemType.forEach(v => chips.push({ key: `type_${v}`, label: `System Type: ${v}` }));
    draft.salesModel.forEach(v => chips.push({ key: `sales_${v}`, label: `Sales Model: ${v}` }));
    draft.status.forEach(v    => chips.push({ key: `status_${v}`, label: `Status: ${v}` }));
    onApply(chips);
    onClose();
  };

  const totalSelected = draft.systemType.length + draft.salesModel.length + draft.status.length;

  const sectionStyle = { marginBottom: 28 };
  const labelStyle   = { fontSize: 11, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.06em', color: 'rgba(0,0,0,0.4)', marginBottom: 10, display: 'block' };
  const optionStyle  = { display: 'flex', alignItems: 'center', gap: 10, padding: '7px 10px', borderRadius: 6, cursor: 'pointer', transition: 'background 0.12s', userSelect: 'none' };

  const renderGroup = (key, label, options) =>
    React.createElement('div', { style: sectionStyle },
      React.createElement('span', { style: labelStyle }, label),
      React.createElement('div', { style: { display: 'flex', flexDirection: 'column', gap: 2 } },
        ...options.map(opt => {
          const checked = draft[key].includes(opt);
          return React.createElement('div', {
            key: opt,
            style: { ...optionStyle, background: checked ? '#F5F3FF' : 'transparent' },
            onClick: () => toggleOption(key, opt),
          },
            React.createElement('div', {
              style: {
                width: 16, height: 16, borderRadius: 3, flexShrink: 0,
                border: checked ? 'none' : '1.5px solid #D9D9D9',
                background: checked ? '#3E00FB' : '#fff',
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                transition: 'all 0.12s',
              }
            }, checked && React.createElement(CheckOutlined, { style: { color: '#fff', fontSize: 9 } })),
            React.createElement('span', { style: { fontSize: 13, color: checked ? '#3E00FB' : 'rgba(0,0,0,0.75)', fontWeight: checked ? 500 : 400 } }, opt)
          );
        })
      )
    );

  return React.createElement(Drawer, {
    title: React.createElement('div', { style: { display: 'flex', alignItems: 'center', justifyContent: 'space-between' } },
      React.createElement('span', null, 'Filters'),
      totalSelected > 0 && React.createElement('span', {
        style: { fontSize: 12, color: 'rgba(0,0,0,0.45)', fontWeight: 400 }
      }, `${totalSelected} selected`)
    ),
    placement: 'right',
    width: 320,
    open,
    onClose,
    footer: React.createElement(Space, { style: { width: '100%', justifyContent: 'space-between' } },
      React.createElement(Button, { onClick: reset, disabled: totalSelected === 0 }, 'Reset'),
      React.createElement(Button, { type: 'primary', onClick: apply }, 'Apply filters'),
    ),
  },
    renderGroup('systemType', 'System Type', FILTER_OPTIONS.systemType),
    React.createElement(Divider, { style: { margin: '0 0 20px' } }),
    renderGroup('salesModel', 'Sales Model', FILTER_OPTIONS.salesModel),
    React.createElement(Divider, { style: { margin: '0 0 20px' } }),
    renderGroup('status', 'Status', FILTER_OPTIONS.status),
  );
}

// ── System card (list/grid) ───────────────────────────────────────────────────

function SystemCard({ sys, selected, onToggle }) {
  const s = STATUS[sys.status];
  return React.createElement('div', {
    className: `system-card ${selected ? 'selected' : ''}`,
    onClick: () => onToggle(sys.id),
  },
    React.createElement('div', { style: { width: 9, height: 9, borderRadius: '50%', background: s.color, flexShrink: 0 } }),
    React.createElement('div', { style: { flex: 1, minWidth: 0 } },
      React.createElement('div', { style: { fontWeight: 600, fontSize: 13, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } },
        `${sys.id}  ·  ${sys.type}`),
      React.createElement('div', { style: { fontSize: 12, color: 'rgba(0,0,0,0.45)', marginTop: 1, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } },
        `${sys.address}, ${sys.city}`),
    ),
    selected
      ? React.createElement('div', { style: { width: 20, height: 20, borderRadius: '50%', background: '#3E00FB', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } },
          React.createElement(CheckOutlined, { style: { color: '#fff', fontSize: 10 } }))
      : React.createElement('div', { style: { width: 20, height: 20, borderRadius: '50%', border: '1.5px solid #D9D9D9', flexShrink: 0 } })
  );
}

// ── Navbar ────────────────────────────────────────────────────────────────────

function Navbar() {
  return React.createElement('nav', { className: 'g-navbar' },

      ['Overview', 'Inventory', 'Delivery'].map(item =>
        React.createElement('div', { key: item, className: `g-nav-item ${item === 'Delivery' ? 'active' : ''}` }, item)
      )

    React.createElement('div', { className: 'g-navbar-right' },
      React.createElement(Button, { type: 'text', size: 'small', icon: React.createElement(BellOutlined, { style: { fontSize: 16 } }) }),
      React.createElement(Avatar, { size: 32, icon: React.createElement(UserOutlined), style: { background: '#3E00FB', cursor: 'pointer' } })
    )
  );
}

// ── App principale ────────────────────────────────────────────────────────────

function SelectSystems() {
  const [messageApi, contextHolder] = message.useMessage();

  const [searchText,   setSearchText]   = useState('');
  const [searchScope,  setSearchScope]  = useState('address');
  const [filters,      setFilters]      = useState([]);          // vuoto finché l'utente non applica
  const [filtersOpen,  setFiltersOpen]  = useState(false);
  const [viewMode,     setViewMode]     = useState('map');
  const [showSelected, setShowSelected] = useState(false);
  const [selectedIds,  setSelectedIds]  = useState(['PA002', 'PA005', 'PA007']);

  const removeFilter = key => setFilters(prev => prev.filter(f => f.key !== key));
  const clearFilters = ()  => setFilters([]);

  const toggleSystem = id => {
    setSelectedIds(prev => prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]);
  };

  const displayed = showSelected
    ? SYSTEMS.filter(s => selectedIds.includes(s.id))
    : SYSTEMS;

  const viewButtons = [
    { key: 'map',   icon: React.createElement(EnvironmentOutlined) },
    { key: 'grid',  icon: React.createElement(AppstoreOutlined)    },
    { key: 'list',  icon: React.createElement(BarsOutlined)        },
    { key: 'table', icon: React.createElement(TableOutlined)       },
  ];

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App, null,
      contextHolder,

      React.createElement('div', { style: { height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden', background: '#F5F5F5' } },

        React.createElement(Navbar),

        // Scrollable page body
        React.createElement('div', { style: { flex: 1, overflow: 'auto', padding: '20px 24px 24px' } },

              boxShadow: '0 1px 4px rgba(0,0,0,0.04)',
            }
          },
            // Breadcrumb
            React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 6, marginBottom: 12, fontSize: 13, cursor: 'pointer' } },
              React.createElement(ArrowLeftOutlined, { style: { fontSize: 11, color: 'rgba(0,0,0,0.35)' } }),
              React.createElement('span', { style: { color: '#3E00FB', fontWeight: 500 } }, 'Planning'),
              React.createElement('span', { style: { color: 'rgba(0,0,0,0.2)', margin: '0 2px' } }, '|'),
              React.createElement('span', { style: { color: 'rgba(0,0,0,0.4)' } }, 'Gohan Sushi Planning Luglio'),
            ),
            // Title + actions
            React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 16 } },
              React.createElement('div', { style: { flex: 1 } },
                React.createElement('div', { style: { display: 'flex', alignItems: 'center', gap: 10, marginBottom: 4 } },
                  React.createElement(Title, { level: 3, style: { margin: 0, fontSize: 22 } }, 'Select Systems'),
                  React.createElement('span', { style: { color: 'rgba(0,0,0,0.5)', fontSize: 14 } }, 'Zanga Sushi Palermo'),
                  React.createElement('span', {
                    style: {
                      fontSize: 11, fontWeight: 600, padding: '2px 7px', borderRadius: 4,
                      background: '#E6F7FF', color: '#1677FF', border: '1px solid #91CAFF', letterSpacing: '0.03em',
                    }
                  }, 'OOH'),
                ),
                React.createElement(Text, { style: { fontSize: 13, color: 'rgba(0,0,0,0.4)' } },
                  'Exposure Period: ',
                  React.createElement('span', { style: { color: 'rgba(0,0,0,0.65)', fontWeight: 500 } }, '10/06/2025 – 25/06/2025'),
                ),
              ),
              React.createElement(Space, { size: 8, style: { flexShrink: 0, alignItems: 'center' } },
                React.createElement(Button, {
                  icon: React.createElement(BarsOutlined),
                  style: { borderRadius: 6, display: 'flex', alignItems: 'center', gap: 6 },
                },
                  'Planning List',
                  React.createElement('span', {
                    style: {
                      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                      width: 18, height: 18, borderRadius: 9,
                      background: '#3E00FB', color: '#fff', fontSize: 11, fontWeight: 700, marginLeft: 4,
                    }
                  }, selectedIds.length)
                ),
                React.createElement(Button, {
                  type: 'primary',
                  icon: React.createElement(SaveOutlined),
                  style: { borderRadius: 6 },
                  onClick: () => messageApi.success('Pianificazione salvata'),
                }, 'Save and exit'),
              ),
            ),
          ),

          // ── Card 2: ricerca impianti ──────────────────────
          React.createElement('div', {
            style: {
              background: '#fff',
              borderRadius: '8px 8px 0 0',
              border: '1px solid #F0F0F0',
              borderBottom: 'none',
              padding: '14px 20px 12px',
              boxShadow: '0 1px 4px rgba(0,0,0,0.04)',
            }
          },
            // Searchbar row

              React.createElement(Text, { strong: true, style: { fontSize: 14, whiteSpace: 'nowrap' } }, 'Search Systems'),
              React.createElement(Divider, { type: 'vertical', style: { height: 18, margin: '0 2px', borderColor: '#D9D9D9' } }),
              React.createElement(Select, {
                value: searchScope,
                onChange: setSearchScope,
                style: { width: 130 },

              React.createElement(Button, {
                icon: React.createElement(FilterOutlined),
                onClick: () => setFiltersOpen(true),
                style: {
                  borderRadius: 6,
                  borderColor: filters.length > 0 ? '#3E00FB' : undefined,
                  color:       filters.length > 0 ? '#3E00FB' : undefined,
                },
              },
                'Filters',
                filters.length > 0 && React.createElement('span', {
                  style: {
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    width: 16, height: 16, borderRadius: 8,
                    background: '#3E00FB', color: '#fff',
                    fontSize: 10, fontWeight: 700, marginLeft: 4,
                  }
                }, filters.length)
              ),
              React.createElement(Button, {
                type: 'primary',
                icon: React.createElement(SearchOutlined),
                style: { borderRadius: 6 },
                onClick: () => messageApi.success('Ricerca eseguita'),
              }, 'Search'),
            ),

            // Chip filtri attivi — visibili solo se ci sono filtri applicati
            filters.length > 0 && React.createElement('div', {

                React.createElement(Tag, {

                  onClose: () => removeFilter(f.key),

                }, f.label)
              ),
              React.createElement('span', {
                onClick: clearFilters,
                style: { fontSize: 12, color: '#3E00FB', cursor: 'pointer', marginLeft: 2, userSelect: 'none' },
              }, 'Clear all')
            ),
          ),

          // Toolbar
          React.createElement('div', {
            style: {
              background: '#fff',
              border: '1px solid #F0F0F0',
              borderTop: '1px solid #F5F5F5',
              borderBottom: 'none',
