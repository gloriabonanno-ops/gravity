<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Mappa Impianti OOH</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@5/dist/index.umd.js"></script>
  <script src="../tokens.js"></script>

  <!-- Google Maps + MarkerClusterer -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDeN8PAeuZkOtG8uyRzvXP2rOzP37HMBdI&libraries=places"></script>
  <script src="https://unpkg.com/@googlemaps/markerclusterer/dist/index.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      background: #F5F5F5;
      font-size: 14px;
      line-height: 1.5714;
    }

    /* ── App shell ── */
    .app-shell { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

    /* ── Navbar ── */
    .top-nav {
      height: 73px; background: #fff;
      border-bottom: 1px solid rgba(0,0,0,0.06);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; z-index: 200;
    }
    .top-nav-logo { display: flex; align-items: center; padding: 0 20px; height: 100%; flex-shrink: 0; }
    .top-nav-logo img { display: block; }
    .top-nav-menu-wrap { flex: 1; align-self: stretch; display: flex; align-items: stretch; }
    .top-nav-menu-wrap .ant-menu-horizontal { border-bottom: none !important; height: 73px; line-height: 73px; }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu { height: 73px; line-height: 73px; padding: 0 16px; top: 0; }
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-item::after,
    .top-nav-menu-wrap .ant-menu-horizontal > .ant-menu-submenu::after { bottom: 0 !important; border-bottom-width: 2px !important; }
    .top-nav-right { display: flex; align-items: center; gap: 24px; padding: 0 20px; flex-shrink: 0; }
    .top-nav-bell {
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center;
      color: rgba(0,0,0,0.65); padding: 4px; border-radius: 6px; transition: background 0.15s;
    }
    .top-nav-bell:hover { background: rgba(0,0,0,0.04); }

    /* ── Workspace (below navbar) ── */
    .ooh-workspace {
      flex: 1; min-height: 0;
      display: flex; flex-direction: column;
      gap: 6px; padding: 10px;
      background: #F5F5F5;
      overflow: hidden;
    }

    /* ── Search card (top) ── */
    .ooh-search-card {
      background: #fff;
      border-radius: 8px;
      border: 1px solid #F0F0F0;
      flex-shrink: 0;
      width: 100%;
      padding: 8px 10px;
      display: flex; flex-direction: column; gap: 6px;
    }

    /* ── Unified search bar ── */
    .ss-searchbar-wrap { position: relative; width: 100%; }
    .ss-unified-bar {
      display: flex; align-items: stretch;
      height: 52px;
      border: 1.5px solid #E0E0E0; border-radius: 10px;
      background: #fff; overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .ss-unified-bar:focus-within {
      border-color: #3E00FB;
      box-shadow: 0 0 0 3px rgba(62,0,251,0.08);
    }
    .ss-bar-input {
      flex: 1; min-width: 0;
      display: flex; align-items: center;
    }
    .ss-bar-sep {
      width: 1px; background: #EBEBEB; flex-shrink: 0;
      align-self: stretch; margin: 10px 0;
    }
    .ss-bar-trigger {
      display: flex; align-items: center; gap: 6px;
      padding: 0 14px;
      font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.65);
      cursor: pointer; white-space: nowrap; flex-shrink: 0;
      border: none; background: none;
      transition: background 0.15s, color 0.15s;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
    }
    .ss-bar-trigger:hover { background: rgba(0,0,0,0.025); color: rgba(0,0,0,0.88); }
    .ss-bar-trigger.active { color: #3E00FB; }
    .ss-bar-count {
      display: inline-flex; align-items: center; justify-content: center;
      min-width: 18px; height: 18px; border-radius: 9px;
      background: #3E00FB; color: #fff;
      font-size: 10px; font-weight: 700; padding: 0 5px; line-height: 1;
    }
    .ss-bar-cerca {
      display: flex; align-items: center; gap: 6px;
      padding: 0 18px;
      background: #3E00FB; color: #fff;
      font-size: 13px; font-weight: 600;
      cursor: pointer; border: none; flex-shrink: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      transition: background 0.15s; letter-spacing: 0.01em;
    }
    .ss-bar-cerca:hover { background: #3300d0; }

    /* ── Tag input ── */
    .ss-tag-input-area {
      display: flex; align-items: center; flex-wrap: nowrap; gap: 4px;
      padding: 0 14px; height: 100%; cursor: text;
      flex: 1; min-width: 0;
      overflow-x: auto; overflow-y: hidden; scrollbar-width: none;
    }
    .ss-tag-input-area::-webkit-scrollbar { display: none; }
    .ss-input-tag {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px 4px 12px; border-radius: 6px;
      background: #fff; border: 1px solid #D9D9D9;
      font-size: 13px; color: rgba(0,0,0,0.88); font-weight: 400;
      white-space: nowrap; flex-shrink: 0; line-height: 1.5;
    }
    .ss-input-tag-x {
      cursor: pointer; font-size: 14px; line-height: 1; color: rgba(0,0,0,0.35);
      display: flex; align-items: center; padding: 0 2px; border-radius: 3px;
    }
    .ss-input-tag-x:hover { color: rgba(0,0,0,0.75); background: rgba(0,0,0,0.06); }
    .ss-tag-real-input {
      border: none; outline: none; background: transparent;
      font-size: 14px; min-width: 160px; flex: 1;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
      color: rgba(0,0,0,0.88); height: 100%; padding: 0 2px;
    }
    .ss-tag-real-input::placeholder { color: rgba(0,0,0,0.3); }
    .ss-search-hint {
      font-size: 12px; color: rgba(0,0,0,0.45);
      padding: 0 2px; line-height: 1.4;
    }

    /* Brief chips (filtri attivi sotto la bar) */
    .ss-brief-chips { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ss-brief-label {
      font-size: 11px; color: rgba(0,0,0,0.35); font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.5px;
      white-space: nowrap; margin-right: 2px;
    }
    /* ── Suggestions dropdown ── */
    .ss-suggestions-wrap {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0;
      background: #fff; border: 1px solid #E8E8E8; border-radius: 8px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.12); z-index: 600;
      overflow: hidden;
    }
    .ss-sugg-group-title {
      font-size: 10px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .07em; color: rgba(0,0,0,0.3);
      padding: 10px 14px 3px; line-height: 1.2;
    }
    .ss-suggestion-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; cursor: pointer;
      font-size: 13px; color: rgba(0,0,0,0.88);
      transition: background 0.1s;
    }
    .ss-suggestion-item:hover { background: #F7F5FF; }
    /* ── Map area ── */
    .ooh-map-area {
      flex: 1; min-height: 0; position: relative; overflow: hidden;
      border-radius: 8px;
    }
    #ooh-map { width: 100%; height: 100%; }

    /* Google Maps overrides */
    .gm-style .gm-style-iw-c { border-radius: 8px !important; box-shadow: 0 4px 18px rgba(0,0,0,0.16) !important; padding: 0 !important; }
    .gm-style .gm-style-iw-d { overflow: hidden !important; padding: 0 !important; }
    .gm-style .gm-style-iw-chr { display: none !important; }
    .gm-style-iw-tc { display: none !important; }
    .gm-ui-hover-effect { display: none !important; }
    .gm-style .gmnoprint { opacity: 0.7; }
    .gm-style-cc { font-size: 9px !important; }

    /* ── Infobox (map overlay, bottom-left) ── */
    .ss-map-infobox {
      position: absolute; bottom: 40px; left: 16px;
      background: rgba(255,255,255,0.98);
      border-radius: 10px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.13), 0 1px 4px rgba(0,0,0,0.06);
      border: 1px solid rgba(0,0,0,0.06);
      z-index: 400; width: 244px; overflow: hidden;
    }
    .ss-infobox-header { padding: 14px 16px 12px; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .ss-infobox-count { font-size: 30px; font-weight: 700; color: rgba(0,0,0,0.88); line-height: 1; letter-spacing: -0.5px; }
    .ss-infobox-count-label { font-size: 12px; font-weight: 400; color: rgba(0,0,0,0.45); margin-top: 3px; }
    .ss-infobox-body { padding: 8px 16px 6px; }
    .ss-infobox-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; font-size: 12px; }
    .ss-infobox-label { color: rgba(0,0,0,0.35); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: 0.5px; flex-shrink: 0; }
    .ss-infobox-value { color: rgba(0,0,0,0.75); font-weight: 500; text-align: right; margin-left: 8px; }
    .ss-infobox-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 12px; border-top: 1px solid #F5F5F5;
      cursor: pointer; transition: background 0.15s; gap: 8px;
    }
    .ss-infobox-toggle:hover { background: #F9F7FF !important; }

    /* ── Right panel (planning-def-POI style) ── */
    .ss-panel {
      position: absolute; top: 0; right: 0; bottom: 0; width: 420px;
      background: #fff;
      box-shadow: -2px 0 20px rgba(0,0,0,0.13);
      display: flex; flex-direction: column;
      z-index: 500; transition: transform 0.25s ease;
    }
    .ss-panel-hidden { transform: translateX(420px); }
    .ss-panel-toggle {
      position: absolute; left: -32px; top: 50%; transform: translateY(-50%);
      background: #fff; border: 1px solid #E8E8E8; border-right: none;
      border-radius: 6px 0 0 6px; width: 32px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; box-shadow: -3px 0 8px rgba(0,0,0,0.08);
      color: rgba(0,0,0,0.4); z-index: 501; transition: color 0.15s;
    }
    .ss-panel-toggle:hover { color: #3E00FB; }
    .ss-panel-header {
      display: flex; align-items: center;
      padding: 10px 12px; border-bottom: 1px solid #F0F0F0;
      gap: 4px; flex-shrink: 0; background: #FAFAFA;
    }
    .ss-panel-tab {
      flex: 1; padding: 6px 8px; font-size: 13px; font-weight: 500;
      color: rgba(0,0,0,0.88); cursor: pointer; text-align: center;
      border-radius: 6px; transition: all 0.15s; user-select: none;
    }
    .ss-panel-tab.active { background: #F0EAFF; color: #3E00FB; }
    .ss-panel-toolbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 6px 14px; background: #F7F5FF;
      border-bottom: 1px solid #E4DCFF; flex-shrink: 0;
    }
    .ss-panel-toolbar-info { font-size: 12px; color: rgba(0,0,0,0.45); }
    .ss-panel-toolbar-action { font-size: 12px; color: #3E00FB; font-weight: 500; cursor: pointer; }
    .ss-panel-toolbar-action:hover { text-decoration: underline; }
    .ss-panel-body { flex: 1; overflow-y: auto; }
    .ss-panel-body::-webkit-scrollbar { width: 4px; }
    .ss-panel-body::-webkit-scrollbar-thumb { background: #E0E0E0; border-radius: 2px; }
    .ss-panel-empty { padding: 40px 20px; text-align: center; color: rgba(0,0,0,0.35); font-size: 13px; }

    /* Panel footer */
    .ss-panel-footer {
      padding: 12px 14px; border-top: 1px solid #F0F0F0; flex-shrink: 0; background: #FAFAFA;
    }
    .ss-panel-total-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .ss-panel-total-label { font-size: 12px; color: rgba(0,0,0,0.45); }
    .ss-panel-total-amount { font-size: 16px; font-weight: 700; color: rgba(0,0,0,0.88); }

    /* ── SysRow (planning-def-POI style) ── */
    .ss-sys-row { border-bottom: 1px solid #F0F0F0; }
    .ss-sys-row:last-child { border-bottom: none; }
    .ss-sys-head {
      display: flex; align-items: center; gap: 8px;
      padding: 9px 12px; transition: background 0.1s;
    }
    .ss-sys-head:hover { background: #FAFAFA; }
    .ss-sys-head.ss-sys-selected    { background: #F7F5FF; }
    .ss-sys-head.ss-sys-hovered     { background: #F3F3F3; }
    .ss-sys-head.ss-sys-highlighted { background: #EFEBFF; border-left: 3px solid #3E00FB; padding-left: 9px; }
    .ss-sys-info { flex: 1; min-width: 0; }
    .ss-sys-addr {
      font-size: 11px; color: rgba(0,0,0,0.45);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    }
    .ss-sys-label { font-size: 13px; font-weight: 500; color: rgba(0,0,0,0.88); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
    .ss-sys-label.ss-sys-premium { font-weight: 600; }
    .ss-sys-meta { display: flex; align-items: center; gap: 5px; margin-top: 3px; font-size: 11px; color: rgba(0,0,0,0.40); }
    .ss-sys-meta-icon { font-size: 11px; color: rgba(0,0,0,0.30); flex-shrink: 0; display: flex; align-items: center; }
    .ss-sys-meta-type { font-weight: 500; color: rgba(0,0,0,0.45); }
    .ss-sys-meta-sep { color: rgba(0,0,0,0.20); margin: 0 1px; }
    .ss-sys-meta-fmt { font-family: 'SF Mono','Fira Code',monospace; font-size: 10px; color: rgba(0,0,0,0.30); }
    /* Label chip + button */
    .ss-label-chip {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 1px 6px; border-radius: 10px; border: 1px solid;
      font-size: 10px; font-weight: 500; cursor: pointer;
      white-space: nowrap; flex-shrink: 0;
    }
    .ss-label-btn {
      color: rgba(0,0,0,0.20); font-size: 12px; cursor: pointer;
      padding: 2px 3px; border-radius: 4px; line-height: 1; flex-shrink: 0;
      display: inline-flex; align-items: center;
    }
    .ss-label-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    /* Label picker popover */
    .ss-label-picker { width: 210px; }
    .ss-label-picker-title { font-size: 11px; font-weight: 600; color: rgba(0,0,0,0.45); text-transform: uppercase; letter-spacing: 0.4px; padding: 0 0 8px; }
    .ss-label-picker-row { display: flex; align-items: center; gap: 8px; padding: 5px 0; cursor: pointer; border-radius: 4px; }
    .ss-label-picker-row:hover { background: #F5F5F5; padding-left: 4px; margin: 0 -4px; }
    /* Color palette for new label */
    .ss-color-palette { display: flex; gap: 5px; margin: 8px 0; }
    .ss-color-swatch { width: 18px; height: 18px; border-radius: 3px; cursor: pointer; transition: transform 0.1s; }
    .ss-color-swatch:hover { transform: scale(1.15); }
    .ss-face-badge { font-size: 11px; font-weight: 600; white-space: nowrap; flex-shrink: 0; }
    .ss-face-badge-all  { color: #52C41A; }
    .ss-face-badge-none { color: rgba(0,0,0,0.35); }
    .ss-expand-btn {
      color: rgba(0,0,0,0.25); font-size: 10px; cursor: pointer;
      padding: 4px 6px; border-radius: 4px; flex-shrink: 0;
      transition: color 0.15s, background 0.1s;
    }
    .ss-expand-btn:hover { color: #3E00FB; background: rgba(62,0,251,0.06); }
    .ss-faces-body { background: #FAFAFA; border-top: 1px solid #F0F0F0; padding: 3px 0 5px; }
    .ss-face-row {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 12px 5px 30px; cursor: pointer; transition: background 0.1s;
    }
    .ss-face-row:hover { background: rgba(0,0,0,0.02); }
    .ss-face-row.ss-face-selected { background: rgba(62,0,251,0.05); }
    .ss-face-type { font-size: 11px; font-weight: 500; color: rgba(0,0,0,0.65); min-width: 95px; flex-shrink: 0; }
    .ss-face-format { font-size: 10px; color: rgba(0,0,0,0.30); font-family: 'SF Mono','Fira Code',monospace; flex: 1; white-space: nowrap; }
    .ss-face-state { display: flex; align-items: center; gap: 4px; font-size: 11px; color: rgba(0,0,0,0.45); white-space: nowrap; flex-shrink: 0; }
    .ss-face-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

/* ── Filter drawer ── */
.ant-drawer-body { padding-top: 8px !important; }
.filter-section { padding: 14px 10px; border-bottom: 1px solid #F0F0F0; }
.filter-section:last-child { border-bottom: none; }
.filter-section-label { font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.65); margin-bottom: 8px; }
.filter-macro-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: rgba(0,0,0,0.3); margin: 8px 0 4px; }
.filter-macro-label:first-child { margin-top: 0; }
.filter-chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: 6px; border: 1px solid #D9D9D9;
  font-size: 13px; cursor: pointer; margin: 3px;
  background: #fff; color: rgba(0,0,0,0.65); transition: all 0.15s; user-select: none;
}
.filter-chip.selected { background: #F0EAFF; border-color: #3E00FB; color: #3E00FB; font-weight: 500; }
.filter-chip:hover:not(.selected) { border-color: #b0b0b0; color: rgba(0,0,0,0.88); }
.filter-chip.brief { background: #FFFBE6; border-color: #FFE58F; }
.filter-chip.brief:hover:not(.selected) { background: #FFF1B8; border-color: #FAAD14; }

/* ── Geocoding progress banner ── */
.geocoding-banner {
  position: absolute; top: 0; left: 50%; transform: translateX(-50%);
  background: rgba(62,0,251,0.92); color: #fff;
  padding: 6px 16px 6px 14px; border-radius: 0 0 10px 10px;
  font-size: 12px; font-weight: 500; z-index: 200;
  white-space: nowrap; display: flex; align-items: center; gap: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.18);
}
.geocoding-progress-bar {
  width: 100px; height: 3px; background: rgba(255,255,255,0.3);
  border-radius: 2px; overflow: hidden;
}
.geocoding-progress-fill {
  height: 100%; background: #fff; border-radius: 2px; transition: width 0.25s;
}

/* ── POI radius overlay (top-left della mappa) ── */
.poi-radius-map-overlay {
  position: absolute; top: 12px; left: 12px; z-index: 300;
}

/* ── POI radius slider ── */
.poi-radius-wrap {
  display: flex; align-items: center; gap: 10px;
  background: #fff; border: 1px solid #E8E8E8; border-radius: 8px;
  padding: 0 12px; height: 40px; flex-shrink: 0; min-width: 280px;
}
.poi-radius-input.ant-input-number { width: 58px; font-size: 13px; font-weight: 700; color: #3E00FB; border-color: transparent !important; box-shadow: none !important; background: transparent; }
.poi-radius-input.ant-input-number:hover { border-color: #D9D9D9 !important; }
.poi-radius-input.ant-input-number:focus-within { border-color: #3E00FB !important; box-shadow: 0 0 0 2px rgba(62,0,251,0.08) !important; }
.poi-radius-input .ant-input-number-input { padding: 0 6px; font-weight: 700; color: #3E00FB; text-align: right; }
.poi-radius-wrap .ant-slider { flex: 1; margin: 0; min-width: 80px; }
.poi-radius-wrap .ant-slider-track { background: #3E00FB !important; }
.poi-radius-wrap .ant-slider-handle::after { box-shadow: 0 0 0 2px #3E00FB !important; }
.poi-unit-toggle { display: flex; gap: 2px; flex-shrink: 0; }
.poi-unit-btn {
  height: 26px; padding: 0 7px; border-radius: 4px;
  border: 1px solid #E8E8E8; background: #FAFAFA;
  font-size: 11px; cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; justify-content: center;
  color: rgba(0,0,0,0.45); white-space: nowrap; user-select: none;
}
.poi-unit-btn.active { background: #F0EAFF; border-color: #3E00FB; color: #3E00FB; font-weight: 600; }
.poi-unit-btn:hover:not(.active) { border-color: #bbb; color: rgba(0,0,0,0.7); }

/* ── Suggestions dropdown ── */
.sugg-brief-cols {
  display: grid; grid-template-columns: 1fr 1fr;
}
.sugg-brief-col { min-width: 0; }
.sugg-brief-col--right {}
.sugg-brief-header {
  display: flex; align-items: center; gap: 6px;
  padding: 12px 14px 6px;
  font-size: 14px; font-weight: 600; color: rgba(0,0,0,0.65);
}

/* ── POI suggestions dropdown ── */
.poi-sugg-wrap {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;

  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.poi-loading-spinner {
  width: 11px; height: 11px; border: 2px solid #C5B4FF;

    return [{ key: 'brief', label: 'Suggeriti dal Brief', brief: true, items: BRIEF_ZONE_ITEMS }];
  }
  const q = normalizeText(query.trim());
  const buckets = { city: [], province: [], zona: [], street: [] };
  LOCATION_SUGG.forEach(item => {
    const searchIn = normalizeText(item.text + ' ' + item.detail);
    if (!searchIn.includes(q) && !q.split(' ').every(w => searchIn.includes(w))) return;
    const bucket = ['via','corso','viale','piazza','area'].includes(item.type) ? 'street' : item.type;
    if (buckets[bucket] && buckets[bucket].length < 4) buckets[bucket].push(item);
  });
  return [
    { key: 'city',     label: 'Città e Comuni',     items: buckets.city },
    { key: 'province', label: 'Province',            items: buckets.province },
    { key: 'zona',     label: 'Quartieri e Zone',    items: buckets.zona },
    { key: 'street',   label: 'Strade e Aree',       items: buckets.street },
  ].filter(g => g.items.length > 0);
}

function highlightMatch(text, query) {
  if (!query) return React.createElement('span', null, text);
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return React.createElement('span', null, text);
  return React.createElement('span', null,
    text.slice(0, idx),
    React.createElement('strong', { style: { color: '#3E00FB', fontWeight: 600 } }, text.slice(idx, idx + query.length)),
    text.slice(idx + query.length)
  );
}

function haversineMeters(lat1, lng1, lat2, lng2) {
  const R = 6371000;
  const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
  const Δφ = (lat2 - lat1) * Math.PI / 180;
  const Δλ = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(Δφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(Δλ/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

const PHOTON_BBOX_PA = '13.285,38.055,13.455,38.245';

async function photonSuggestPOI(query, limit = 7) {
  try {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lang=it&limit=${limit}&bbox=${PHOTON_BBOX_PA}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return [];
    const data = await res.json();
    const seen = new Set();
    return (data.features || []).map(feat => {
      const p = feat.properties;
      const [lng, lat] = feat.geometry.coordinates;
      if (!p.name || !lat || !lng) return null;
      const addrParts = [];
      if (p.street) addrParts.push(p.housenumber ? `${p.street} ${p.housenumber}` : p.street);
      if (p.city && p.city !== p.name) addrParts.push(p.city);
      const sub = addrParts.join(', ') || (p.osm_value || '').replace(/_/g, ' ');
      return { id: `ph-${lat.toFixed(5)}-${lng.toFixed(5)}`, label: p.name, sub, lat, lng, type: 'single', color: '#FF4A1C', icon: '📍' };
    }).filter(x => { if (!x || seen.has(x.label)) return false; seen.add(x.label); return true; });
  } catch { return []; }
}

async function googleAutocompletePOI(query, service, limit = 7) {
  if (!service) return [];
  return new Promise(resolve => {
    const palermoBounds = new google.maps.LatLngBounds(
      new google.maps.LatLng(38.055, 13.285),
      new google.maps.LatLng(38.245, 13.455)

    service.getPlacePredictions(
      { input: query, bounds: palermoBounds },
      (predictions, status) => {
        if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions) {

        resolve(predictions.slice(0, limit).map(p => ({
          id:      `gac-${p.place_id}`,

          placeId: p.place_id,

// Cerca POI reali con Google Places nearbySearch.
// Ritorna un array di punti compatibili con activePois.
function fetchRealPOI(service, cat, center, radius) {
  return new Promise(resolve => {
    const type = CATEGORY_TO_PLACES_TYPE[cat.key];
    if (!type || !service) { resolve([]); return; }

    const allResults = [];

    const handlePage = (results, status, pagination) => {
      if (status === google.maps.places.PlacesServiceStatus.OK && results) {
        results.forEach(p => {
          if (p.geometry?.location) {
            allResults.push({
              id:       `gp-${p.place_id}`,
              label:    p.name,
              lat:      p.geometry.location.lat(),
              lng:      p.geometry.location.lng(),
              type:     'category',
              category: cat.key,
              color:    cat.color,
              icon:     cat.icon,
            });
          }
        });
      }
      // Recupera pagine successive (max 60 risultati totali, Google impone 2s tra pagine)
      if (pagination?.hasNextPage && allResults.length < 60) {
        setTimeout(() => pagination.nextPage(), 2100);
      } else {
        resolve(allResults);
      }
    };

    service.nearbySearch({ location: center, radius: radius || 8000, type }, handlePage);
  });
}

// RICERCA — helpers normalizzazione e matching per parole
// ─────────────────────────────────────────────────────────
const STOP_WORDS = new Set(['via', 'corso', 'piazza', 'viale', 'largo', 'vicolo', 'lungomare', 'di', 'della', 'delle', 'degli', 'del', 'dei', 'de', 'in', 'a', 'e', 'il', 'la', 'lo', 'le', 'i', 'gli']);

function normalizeText(str) {
  return str
    .normalize('NFD').replace(/[̀-ͯ]/g, '') // rimuove accenti
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, ' ')                     // punteggiatura → spazio
    .replace(/\s+/g, ' ')
    .trim();
}

// Restituisce true se ogni parola non-stop di query è contenuta in una parola di text
function matchesSearch(text, query) {
  if (!query) return true;
  const textWords  = normalizeText(text).split(' ');
  const queryWords = normalizeText(query).split(' ').filter(w => w.length > 1 && !STOP_WORDS.has(w));
  if (queryWords.length === 0) return true;
  return queryWords.every(qw => textWords.some(tw => tw.includes(qw)));
}

  const key = `${tipo}-${color}`;
  if (_tipoIconCache[key]) return _tipoIconCache[key];
  const IconComp = TYPE_ICONS_FILTER[tipo];
  if (!IconComp) return '';
  const div = document.createElement('div');
  ReactDOM.flushSync(() => {
    ReactDOM.createRoot(div).render(
      React.createElement(IconComp, { style: { fontSize: 12, color, display: 'block' } })
    );
  });
  const svg = div.querySelector('svg');
  if (svg) {
    svg.setAttribute('width', '12');
    svg.setAttribute('height', '12');
    _tipoIconCache[key] = svg.outerHTML;
  } else {
    _tipoIconCache[key] = '';
  }
  return _tipoIconCache[key];
}

const makeClusterSvg = (count) => {
  const { bg, fg } = clusterColor(count);
  const s = count <= 5 ? 32 : count <= 20 ? 36 : 40;
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}">
    <circle cx="${s/2}" cy="${s/2}" r="${s/2-1}" fill="${bg}" stroke="rgba(255,255,255,0.85)" stroke-width="2"/>
    <text x="${s/2}" y="${s/2+4.5}" text-anchor="middle" fill="${fg}" font-size="12" font-weight="700" font-family="sans-serif">${count}</text>
  </svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), size: s };
};

function GoogleMap({ impianti, highlightedId, selectedIds, showOnlySelected, filteredIds, onSelect, flyToTarget, activePois, poiRadius, labelMap }) {
  const labelMapRef = useRef(labelMap);
  useEffect(() => { labelMapRef.current = labelMap; }, [labelMap]);
  const containerRef  = useRef(null);
  const mapRef        = useRef(null);
  const clustererRef  = useRef(null);
  const markersRef    = useRef({});   // id → { marker, imp, infoWindow }
  const openInfoRef   = useRef(null); // InfoWindow aperta
  const poiCirclesRef = useRef([]);   // google.maps.Circle per ogni POI
  const poiMarkersRef = useRef([]);   // google.maps.Marker per ogni POI

  // ── Init mappa + marker ───────────────────────────────
  useEffect(() => {
    if (mapRef.current || !containerRef.current) return;

    const map = new google.maps.Map(containerRef.current, {
      center: { lat: 38.1155, lng: 13.3615 },
      zoom: 13,
      styles: MAP_STYLES,
      disableDefaultUI: true,
      zoomControl: true,
      zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_TOP },
      gestureHandling: 'greedy',
    });

    const allMarkers = impianti.map(imp => {
      const marker = new google.maps.Marker({
        position: { lat: imp.lat, lng: imp.lng },
        icon: makeMarkerIcon(false, false),
      });

      const infoWindow = new google.maps.InfoWindow({
        disableAutoPan: true,
        pixelOffset: new google.maps.Size(0, -4),
      });

      marker.addListener('mouseover', () => {
        const lbl = (labelMapRef.current || {})[imp.id];
        const lblHtml = lbl
          ? `<span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;background:${lbl.color}22;color:${lbl.color};border:1px solid ${lbl.color}66;flex-shrink:0">${lbl.name}</span>`
          : '';
        const tipoColor = (TIPO_CONFIG[imp.tipo] || {}).color || '#8C8C8C';
        const iconSvg = tipoIconSvg(imp.tipo, tipoColor);
        infoWindow.setContent(`<div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;min-width:190px;max-width:240px;overflow:hidden;border-radius:8px">
          <div style="padding:10px 12px 11px">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap">
              <span style="font-size:13px;font-weight:600;color:rgba(0,0,0,0.88);line-height:1.3">${imp.nome || imp.code}</span>
              ${lblHtml}
            </div>
            <div style="font-size:11px;color:rgba(0,0,0,0.45);margin-bottom:6px;line-height:1.4">${imp.indirizzo}</div>
            <div style="display:flex;align-items:center;gap:5px">
              <span style="display:inline-flex;align-items:center;flex-shrink:0">${iconSvg}</span>
              <span style="font-size:11px;color:rgba(0,0,0,0.55)">${imp.tipo}</span>
              <span style="font-size:11px;color:rgba(0,0,0,0.28)">·</span>
              <span style="font-size:11px;color:rgba(0,0,0,0.45);font-family:'SF Mono','Fira Code',monospace">${imp.formato}</span>
            </div>
          </div>
        </div>`);
        if (openInfoRef.current) openInfoRef.current.close();
        infoWindow.open(map, marker);
        openInfoRef.current = infoWindow;
      });
      marker.addListener('mouseout', () => {
        infoWindow.close();
        openInfoRef.current = null;
      });
      marker.addListener('click', () => onSelect(imp.id));

      markersRef.current[imp.id] = { marker, imp, infoWindow };
      return marker;
    });

    // Clusterer con renderer custom
    const clusterer = new markerClusterer.MarkerClusterer({
      map,
      markers: allMarkers,
      renderer: {
        render: ({ count, position }) => {
          const { size: s } = makeClusterSvg(count);
          const { url } = makeClusterSvg(count);
          return new google.maps.Marker({
            position,
            icon: {
              url,
              scaledSize: new google.maps.Size(s, s),
              anchor:     new google.maps.Point(s / 2, s / 2),
            },
            zIndex: 10000 + count,
          });
        },
      },
    });

    mapRef.current   = map;
    clustererRef.current = clusterer;

    return () => { mapRef.current = null; clustererRef.current = null; };
  }, []);

  // ── Aggiorna posizioni marker quando cambiano le coordinate (geocoding) ──
  useEffect(() => {
    if (!mapRef.current || !clustererRef.current) return;
    let changed = false;
    impianti.forEach(imp => {
      const entry = markersRef.current[imp.id];
      if (!entry) return;
      const curr = entry.marker.getPosition();
      if (!curr ||
          Math.abs(curr.lat() - imp.lat) > 0.000005 ||
          Math.abs(curr.lng() - imp.lng) > 0.000005) {
        entry.marker.setPosition({ lat: imp.lat, lng: imp.lng });
        entry.imp = { ...entry.imp, lat: imp.lat, lng: imp.lng };
        changed = true;
      }
    });
    if (changed) clustererRef.current.render();
  }, [impianti]);

  // ── Aggiorna stile e visibilità marker ────────────────
  useEffect(() => {
    if (!clustererRef.current) return;

    const visibleMarkers = [];
    Object.entries(markersRef.current).forEach(([id, { marker }]) => {
      const isHighlighted = id === highlightedId;
      const isSelected    = selectedIds.has(id);
      const inFilter      = !filteredIds || filteredIds.has(id);
      const visible       = inFilter && !(showOnlySelected && !isSelected && !isHighlighted);

      marker.setIcon(makeMarkerIcon(isHighlighted, isSelected));
      marker.setZIndex(isHighlighted ? 9999 : isSelected ? 500 : 1);

      if (visible) visibleMarkers.push(marker);
    });

    clustererRef.current.clearMarkers(true);
    clustererRef.current.addMarkers(visibleMarkers);

    if (highlightedId && markersRef.current[highlightedId]) {
      const { imp } = markersRef.current[highlightedId];
      mapRef.current.panTo({ lat: imp.lat, lng: imp.lng });
      if (mapRef.current.getZoom() < 15) mapRef.current.setZoom(16);
    }
  }, [highlightedId, selectedIds, showOnlySelected, filteredIds]);

  // ── Fly to zona cercata ───────────────────────────────
  useEffect(() => {
    if (!flyToTarget || !mapRef.current) return;
    mapRef.current.panTo({ lat: flyToTarget.lat, lng: flyToTarget.lng });
    mapRef.current.setZoom(flyToTarget.zoom || 14);
  }, [flyToTarget]);

  // ── Cerchi e marker POI ───────────────────────────────
  useEffect(() => {
    if (!mapRef.current) return;

    // Rimuovi cerchi e marker precedenti
    poiCirclesRef.current.forEach(c => c.setMap(null));
    poiMarkersRef.current.forEach(m => m.setMap(null));
    poiCirclesRef.current = [];
    poiMarkersRef.current = [];

    if (!activePois || activePois.length === 0) return;

    activePois.forEach(poi => {
      const circle = new google.maps.Circle({
        map: mapRef.current,
        center: { lat: poi.lat, lng: poi.lng },
        radius: poiRadius || 500,
        fillColor: poi.color,
        fillOpacity: 0.05,
        strokeColor: poi.color,
        strokeOpacity: 0.25,
        strokeWeight: 1,
        zIndex: 50,
      });
      poiCirclesRef.current.push(circle);

      const poiCat = POI_CATEGORIES_FULL.find(c => c.key === poi.category);
      const marker = new google.maps.Marker({
        map: mapRef.current,
        position: { lat: poi.lat, lng: poi.lng },
        icon: makePoiMarkerIcon(poi.color, poiCat?.antIcon),
        zIndex: 200,
      });

      const poiInfo = new google.maps.InfoWindow({
        content: `<div style="font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text',sans-serif;min-width:160px;overflow:hidden;border-radius:8px">
          <div style="padding:8px 12px 10px">
            <div style="font-size:9px;font-weight:700;color:${poi.color};text-transform:uppercase;letter-spacing:0.07em;margin-bottom:5px">POI</div>
            <div style="display:flex;align-items:center;gap:7px">
              <span style="font-size:13px;font-weight:600;color:rgba(0,0,0,0.88);line-height:1.35">${poi.label}</span>
            </div>
          </div>
        </div>`,
        disableAutoPan: true,
        pixelOffset: new google.maps.Size(0, -14),
      });

      marker.addListener('mouseover', () => {
        if (openInfoRef.current) openInfoRef.current.close();
        poiInfo.open(mapRef.current, marker);
        openInfoRef.current = poiInfo;
      });
      marker.addListener('mouseout', () => { poiInfo.close(); });

      poiMarkersRef.current.push(marker);
    });
  }, [activePois, poiRadius]);

  return React.createElement('div', { ref: containerRef, id: 'ooh-map' });
}

    const keys = Object.keys(statiCount);

    if (statiCount['Riservato'])  return '#722ED1';
    if (statiCount['In Opzione']) return '#EB2F96';

function App() {
  const [view, setView] = useState('list'); // 'list' | 'map'
  const [customCollections, setCustomCollections] = useState(INITIAL_CUSTOM_COLLECTIONS);

  const handleDeleteCollection = useCallback((id) => {
    setCustomCollections(prev => prev.filter(c => c.id !== id));
  }, []);

  // ── Drawer nuova collezione ─────────────────────────────
  const [newCollDrawerOpen, setNewCollDrawerOpen] = useState(false);
  const [newCollName,  setNewCollName]  = useState('');
  const [newCollIcon,  setNewCollIcon]  = useState('StarOutlined');
  const [newCollColor, setNewCollColor] = useState(COLL_COLORS[0]);

  const handleCreateCollection = useCallback(() => {
    if (!newCollName.trim()) return;
    const d = new Date();
    const dd   = String(d.getDate()).padStart(2, '0');
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    const coll = {
      id: `col-cus-${Date.now()}`,
      name: newCollName.trim(),
      color: newCollColor,
      icon: newCollIcon,
      poisCount: 0,
      isDefault: false,
      createdBy: CURRENT_USER.name,
      updatedAt: `${dd}-${mm}-${yyyy}`,
    };
    setCustomCollections(prev => [coll, ...prev]);
    setNewCollDrawerOpen(false);
    setNewCollName('');
    setNewCollIcon('StarOutlined');
    setNewCollColor(COLL_COLORS[0]);
  }, [newCollName, newCollIcon, newCollColor]);

  const [highlightedId, setHighlightedId] = useState(null);
  const [selectedIds,   setSelectedIds]   = useState(new Set());
  const [expandedIds,   setExpandedIds]   = useState(new Set());
  const [panelOpen,          setPanelOpen]          = useState(true);
  const [panelTab,           setPanelTab]           = useState('results');
  const [showOnlySelected,   setShowOnlySelected]   = useState(false);

  // ── Ricerca unificata ──────────────────────────────────
  const [searchQuery,    setSearchQuery]    = useState('');
  const [appliedZones,   setAppliedZones]   = useState([]);    // [{text, target}]
  const [showSugg,       setShowSugg]       = useState(false);
  const [flyToTarget,    setFlyToTarget]    = useState(null);
  const inputRef = useRef(null);

  // ── POI ────────────────────────────────────────────────
  const [poiSuggList,  setPoiSuggList]  = useState([]);
  const [activePois,   setActivePois]   = useState([]);
  const [poiRadius,    setPoiRadius]    = useState(500);
  const [poiUnit,      setPoiUnit]      = useState('m');
  const [poiLoading,      setPoiLoading]      = useState(false);
  const [poiLoadingLabel, setPoiLoadingLabel] = useState(null); // { icon, label }

  const placesServiceRef       = useRef(null);   // google.maps.places.PlacesService
  const autocompleteServiceRef = useRef(null);   // google.maps.places.AutocompleteService
  const poiCacheRef            = useRef({});     // cache risultati per evitare chiamate duplicate

  // ── Label system ──────────────────────────────────────
  const [availableLabels, setAvailableLabels] = useState(INITIAL_LABELS);
  const [implantiLabels,  setImplantiLabels]  = useState(INITIAL_IMP_LABELS);

  const labelMap = useMemo(() => {
    const map = {};
    Object.entries(implantiLabels).forEach(([impId, lblIds]) => {
      const lblId = lblIds?.[0];
      if (!lblId) return;
      const lbl = availableLabels.find(l => l.id === lblId);
      if (lbl) map[impId] = lbl;
    });
    return map;
  }, [implantiLabels, availableLabels]);
  const [pickerOpenId,    setPickerOpenId]    = useState(null);
  const [showNewForm,     setShowNewForm]     = useState(false);
  const [newLabelName,    setNewLabelName]    = useState('');
  const [newLabelColor,   setNewLabelColor]   = useState(LABEL_COLORS[0]);

  const closePicker = useCallback(() => {
    setPickerOpenId(null); setShowNewForm(false); setNewLabelName('');
  }, []);

  const toggleImpLabel = useCallback((impId, labelId) => {
    setImplantiLabels(prev => {
      const cur = prev[impId]?.[0];
      return { ...prev, [impId]: cur === labelId ? [] : [labelId] };
    });
  }, []);

  const createLabel = useCallback(() => {
    if (!newLabelName.trim()) return;
    const lbl = { id: `lbl-${Date.now()}`, name: newLabelName.trim(), color: newLabelColor };
    setAvailableLabels(prev => [...prev, lbl]);
    setNewLabelName(''); setShowNewForm(false);
  }, [newLabelName, newLabelColor]);

  const renderLabelPicker = useCallback((impId) => {
    const current = implantiLabels[impId]?.[0] || null;
    return React.createElement('div', { className: 'ss-label-picker', onClick: e => e.stopPropagation() },
      React.createElement('div', { className: 'ss-label-picker-title' }, current ? 'Cambia etichetta' : 'Etichetta'),
      availableLabels.map(lbl => {

            React.createElement('div', { className: 'ss-color-palette' },
              ...LABEL_COLORS.map(c => React.createElement('span', {
                key: c, className: 'ss-color-swatch',
                style: { background: c, outline: newLabelColor === c ? `2px solid ${c}` : 'none', outlineOffset: 2 },
                onClick: () => setNewLabelColor(c),
              }))
            ),
            React.createElement('div', { style: { display: 'flex', gap: 6, justifyContent: 'flex-end' } },
              React.createElement(Button, { size: 'small', onClick: () => { setShowNewForm(false); setNewLabelName(''); } }, 'Annulla'),
              React.createElement(Button, { size: 'small', type: 'primary', onClick: createLabel, disabled: !newLabelName.trim() }, 'Crea'),
            )
          )
    );

    if (toGeocode.length === 0) {

    setGeocodingProgress({ done: 0, total: toGeocode.length });
    const geocoder = new google.maps.Geocoder();
    let done = 0;
    let cancelled = false;

    const next = (i) => {
      if (cancelled) return;
      if (i >= toGeocode.length) {
        applyCache(cache);
        try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}

          done++;

          if (done % 10 === 0) {
            applyCache(cache);
            try { localStorage.setItem(CACHE_KEY, JSON.stringify(cache)); } catch(e) {}
