async function photonSuggestPOI(query, limit = 7) {
  try {
    const url = `https://photon.komoot.io/api/?q=${encodeURIComponent(query)}&lang=it&limit=${limit}&bbox=${PHOTON_BBOX_PA}`;
    const res = await fetch(url, { signal: AbortSignal.timeout(4000) });
    if (!res.ok) return [];
    const data = await res.json();
    const seen = new Set();
    return (data.features || []).map(feat => {
      const p = feat.properties;
      const [lng, lat] = feat.geometry.coordinates;
      if (!lat || !lng) return null;
      const streetFull = p.street ? (p.housenumber ? `${p.street} ${p.housenumber}` : p.street) : null;
      const label = p.name || streetFull;
      if (!label) return null;
      const subParts = [];
      if (p.name && streetFull) subParts.push(streetFull);
      if (p.city && p.city !== label) subParts.push(p.city);
      const sub = subParts.join(', ') || (p.osm_value || '').replace(/_/g, ' ');
      return { id: `ph-${lat.toFixed(5)}-${lng.toFixed(5)}`, label, sub, lat, lng, type: 'single', color: '#FF4A1C', icon: '📍' };
    }).filter(x => { if (!x || seen.has(x.label)) return false; seen.add(x.label); return true; });
  } catch { return []; }
}

async function googleAutocompletePOI(query, service, limit = 7) {
  if (!service) return [];
  return new Promise(resolve => {
    const palermoBounds = new google.maps.LatLngBounds(
      new google.maps.LatLng(38.055, 13.285),
      new google.maps.LatLng(38.245, 13.455)
    );
    service.getPlacePredictions(
      { input: query, bounds: palermoBounds },
      (predictions, status) => {
        if (status !== google.maps.places.PlacesServiceStatus.OK || !predictions) {
          resolve([]); return;
        }
        resolve(predictions.slice(0, limit).map(p => ({
          id:      `gac-${p.place_id}`,
          label:   p.structured_formatting?.main_text || p.description,
          sub:     p.structured_formatting?.secondary_text || '',
          lat:     null,
          lng:     null,
          placeId: p.place_id,
          type:    'single',
          color:   '#FF4A1C',
          icon:    '📍',
        })));
      }
    );
  });
}

function makePoiMarkerIcon(color, antIconName) {
  const rawPath = POI_SVG_PATHS[antIconName] || POI_SVG_PATHS.EnvironmentOutlined;
  const iconPath = rawPath.replace(/="white"/g, `="${color}"`);
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="28" height="28"><circle cx="12" cy="12" r="11" fill="white" stroke="white" stroke-width="2"/><circle cx="12" cy="12" r="11" fill="${color}" fill-opacity="0.15"/><g transform="translate(3.6,3.6) scale(0.7)">${iconPath}</g></svg>`;
  return { url: 'data:image/svg+xml;charset=UTF-8,' + encodeURIComponent(svg), scaledSize: new google.maps.Size(22, 22), anchor: new google.maps.Point(11, 11) };
}

async function photonReverse(lat, lng) {
  try {
    const res = await fetch(
      `https://photon.komoot.io/reverse/?lat=${lat}&lon=${lng}&lang=it&limit=1`,
      { signal: AbortSignal.timeout(4000) }
    );
    if (!res.ok) return null;
    const data = await res.json();
    const feat = data.features?.[0];
    if (!feat) return null;
    const p = feat.properties;
    const street = p.street ? (p.housenumber ? `${p.street} ${p.housenumber}` : p.street) : null;
    const label = p.name && street ? `${p.name}, ${street}` : p.name || street || `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    const sub   = [street, p.city].filter(Boolean).join(', ');
    return { id: `rev-${lat.toFixed(5)}-${lng.toFixed(5)}`, label, sub, lat, lng };
  } catch { return null; }
}

// COLLECTION MAP PICKER
// ─────────────────────────────────────────────────────────
function CollectionMapPicker({ open, activePois, poiRadius, autocompleteService, placesService, collPois, onAddPin, onRemovePin, allCollections }) {
  const mapRef           = useRef(null);
  const mapInst          = useRef(null);
  const circlesRef       = useRef([]);
  const markersRef       = useRef([]);
  const pinMarkersRef    = useRef({});
  const pendingMarkerRef = useRef(null);
  const debounceRef      = useRef(null);
  const inputRef         = useRef(null);
  const onMapClickRef    = useRef(null);

  const [addrQuery,  setAddrQuery]  = useState('');
  const [addrSuggs,  setAddrSuggs]  = useState([]);
  const [collSuggs,  setCollSuggs]  = useState([]);
  const [showSugg,   setShowSugg]   = useState(false);
  const [searching,  setSearching]  = useState(false);
  const [pendingPin, setPendingPin] = useState(null);

  // ── Init mappa ─────────────────────────────────────────
  useEffect(() => {
    if (!mapRef.current || mapInst.current) return;
    try {
      mapInst.current = new google.maps.Map(mapRef.current, {
        center: { lat: 38.115, lng: 13.362 },
        zoom: 12,
        disableDefaultUI: true,
        zoomControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
        styles: [{ featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }],
      });
      // click sulla mappa → pin + reverse geocoding
      mapInst.current.addListener('click', (e) => onMapClickRef.current?.(e));
    } catch(err) { console.warn('CollectionMapPicker init:', err); }
  }, []);

  // aggiorna il riferimento al handler ad ogni render (accede all'ultimo stato)
  onMapClickRef.current = async (e) => {
    const lat = e.latLng.lat();
    const lng = e.latLng.lng();
    const result = await photonReverse(lat, lng);
    dropPin(result || { id: `click-${lat.toFixed(5)}-${lng.toFixed(5)}`, label: `${lat.toFixed(5)}, ${lng.toFixed(5)}`, sub: '', lat, lng });
  };

  // ── Marker POI attivi (dalla vista mappa principale) ───
  useEffect(() => {
    if (!mapInst.current) return;
    circlesRef.current.forEach(c => c.setMap(null));
    markersRef.current.forEach(m => m.setMap(null));
    circlesRef.current = [];
    markersRef.current = [];
    activePois.forEach(poi => {
      const color = poi.color || '#3E00FB';
      circlesRef.current.push(new google.maps.Circle({
        map: mapInst.current, center: { lat: poi.lat, lng: poi.lng }, radius: poiRadius,
        fillColor: color, fillOpacity: 0.12, strokeColor: color, strokeOpacity: 0.75, strokeWeight: 2,
      }));
      markersRef.current.push(new google.maps.Marker({
        map: mapInst.current, position: { lat: poi.lat, lng: poi.lng }, title: poi.label,
        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 7, fillColor: '#3E00FB', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
      }));
    });
    if (activePois.length > 0) {
      const bounds = new google.maps.LatLngBounds();
      activePois.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
      mapInst.current.fitBounds(bounds, 80);
    }
  }, [activePois, poiRadius]);

  // ── Sincronizza marker mappa con collPois ─────────────
  useEffect(() => {
    if (!mapInst.current) return;
    const currentIds = new Set((collPois || []).map(p => p.id));
    Object.keys(pinMarkersRef.current).forEach(id => {
      if (!currentIds.has(id)) { pinMarkersRef.current[id].setMap(null); delete pinMarkersRef.current[id]; }
    });
    (collPois || []).forEach(poi => {
      if (!pinMarkersRef.current[poi.id]) {
        pinMarkersRef.current[poi.id] = new google.maps.Marker({
          map: mapInst.current,
          position: { lat: poi.lat, lng: poi.lng },
          title: poi.label,
          icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: '#3E00FB', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
        });
      }
    });
    if ((collPois || []).length === 1) {
      mapInst.current.panTo({ lat: collPois[0].lat, lng: collPois[0].lng });
      mapInst.current.setZoom(15);
    } else if ((collPois || []).length > 1) {
      const bounds = new google.maps.LatLngBounds();
      collPois.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
      mapInst.current.fitBounds(bounds, 80);
    }
  }, [collPois]);

  // ── Mostra punto in attesa di conferma ────────────────
  const dropPin = (sugg) => {
    setAddrQuery('');
    setAddrSuggs([]);
    setShowSugg(false);
    if (pendingMarkerRef.current) { pendingMarkerRef.current.setMap(null); pendingMarkerRef.current = null; }
    setPendingPin(sugg);
    if (!mapInst.current) return;
    pendingMarkerRef.current = new google.maps.Marker({
      map: mapInst.current,
      position: { lat: sugg.lat, lng: sugg.lng },
      title: sugg.label,
      icon: { path: google.maps.SymbolPath.CIRCLE, scale: 9, fillColor: '#3E00FB', fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
    });
    mapInst.current.panTo({ lat: sugg.lat, lng: sugg.lng });
    mapInst.current.setZoom(15);
  };

  const confirmPin = () => {
    if (!pendingPin) return;
    if (pendingMarkerRef.current) { pendingMarkerRef.current.setMap(null); pendingMarkerRef.current = null; }
    onAddPin({ id: pendingPin.id, label: pendingPin.label, sub: pendingPin.sub || '', lat: pendingPin.lat, lng: pendingPin.lng });
    setPendingPin(null);
  };

  const dismissPin = () => {
    if (pendingMarkerRef.current) { pendingMarkerRef.current.setMap(null); pendingMarkerRef.current = null; }
    setPendingPin(null);
  };

  // ── Risolve placeId → coordinate (Google Places) ──────
  const resolveAndPin = (sugg) => {
    if (sugg.placeId && placesService) {
      placesService.getDetails(
        { placeId: sugg.placeId, fields: ['geometry', 'name'] },
        (place, status) => {
          if (status === google.maps.places.PlacesServiceStatus.OK && place?.geometry?.location) {
            dropPin({ id: sugg.id, label: place.name || sugg.label, sub: sugg.sub,
              lat: place.geometry.location.lat(), lng: place.geometry.location.lng() });
          }
        }
      );
    } else if (sugg.lat != null && sugg.lng != null) {
      dropPin(sugg);
    }
  };

  // Reset ad ogni apertura
  useEffect(() => {
    if (!open) return;
    setPendingPin(null);
    if (pendingMarkerRef.current) { pendingMarkerRef.current.setMap(null); pendingMarkerRef.current = null; }
    // Aspetta l'animazione del drawer prima di fare resize
    setTimeout(() => {
      if (mapInst.current) google.maps.event.trigger(mapInst.current, 'resize');
    }, 300);
  }, [open]);


  // ── Ricerca suggerimenti (Google Autocomplete → Photon fallback) ──
  const fetchSuggestions = async (val) => {
    let results = [];
    if (autocompleteService) {
      results = await googleAutocompletePOI(val, autocompleteService);
    }
    if (results.length === 0) {
      results = await photonSuggestPOI(val, 7);
    }
    return results;
  };

  const handleAddrChange = (val) => {
    setAddrQuery(val);
    setShowSugg(true);
    const q = val.toLowerCase().trim();
    setCollSuggs(q.length >= 1
      ? (allCollections || []).filter(c => c.name.toLowerCase().includes(q))
      : []);
    if (debounceRef.current) clearTimeout(debounceRef.current);
    if (val.length >= 2) {
      debounceRef.current = setTimeout(async () => {
        setAddrSuggs(await fetchSuggestions(val));
      }, 350);
    } else {
      setAddrSuggs([]);
    }
  };

  const handleSelectCollection = (coll) => {
    const pois = coll.pois || DEFAULT_COLL_POIS[coll.id] || [];
    const toAdd = pois.filter(p => !collPois.find(e => e.id === p.id));
    toAdd.forEach(p => onAddPin(p));
    setAddrQuery('');
    setCollSuggs([]);
    setAddrSuggs([]);
    setShowSugg(false);
    antd.message.success(
      toAdd.length > 0
        ? `${toAdd.length} POI importati da "${coll.name}"`
        : `Tutti i POI di "${coll.name}" sono già presenti`
    );
  };

  // ── Ricerca immediata al click "Cerca" o Enter ─────────
  const handleSearch = async () => {
    const q = addrQuery.trim();
    if (!q) return;
    if (debounceRef.current) clearTimeout(debounceRef.current);
    setSearching(true);
    const results = await fetchSuggestions(q);
    setSearching(false);
    if (results.length === 0) return;
    if (results.length === 1) {
      resolveAndPin(results[0]);
    } else {
      setAddrSuggs(results);
      setShowSugg(true);
    }
  };

  return React.createElement('div', { className: 'new-coll-map-side' },

    // ── Search bar ────────────────────────────────────────
    React.createElement('div', { className: 'new-coll-poi-search' },
      React.createElement('div', { className: 'new-coll-field' },
      React.createElement('span', { className: 'new-coll-label' }, 'Cerca luoghi'),
      React.createElement('div', { className: 'ss-searchbar-wrap' },

        React.createElement(Space.Compact, { style: { width: '100%' } },
          React.createElement(Input, {
            ref: inputRef,
            prefix: React.createElement(icons.SearchOutlined, { style: { color: 'rgba(0,0,0,0.3)' } }),
            placeholder: 'Via, civico, supermercato, ospedale…',
            value: addrQuery,
            onChange: e => handleAddrChange(e.target.value),
            onFocus: () => setShowSugg(true),
            onBlur: () => setTimeout(() => setShowSugg(false), 200),
            onPressEnter: handleSearch,
            size: 'large',
          }),
          React.createElement(Button, {
            size: 'large',
            loading: searching,
            disabled: searching,
            onMouseDown: e => { e.preventDefault(); handleSearch(); },
          }, searching ? 'Ricerca…' : 'Cerca'),
        ),

        // Dropdown suggerimenti
        showSugg && (collSuggs.length > 0 || addrSuggs.length > 0) && React.createElement('div', { className: 'ss-suggestions-wrap' },

          // ── Collezioni di default ──
          collSuggs.length > 0 && React.createElement(React.Fragment, null,
            React.createElement('div', { className: 'ss-sugg-group-title' }, 'Collezioni'),
            collSuggs.map(c => {
              const IconComp = COLL_ICON_MAP[c.icon] || icons.AppstoreOutlined;
              const collPoisData = c.pois || DEFAULT_COLL_POIS[c.id] || [];
              const alreadyAdded = collPoisData.every(p => collPois.find(e => e.id === p.id));
              return React.createElement('div', {
                key: c.id,
                className: 'ss-suggestion-item',
                onMouseDown: () => handleSelectCollection(c),
              },
                React.createElement('div', {
                  style: { width: 28, height: 28, borderRadius: 6, flexShrink: 0,
                    background: c.color + '18',
                    display: 'flex', alignItems: 'center', justifyContent: 'center' }
                },
                  React.createElement(IconComp, { style: { fontSize: 12, color: c.color } })
                ),
                React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                  React.createElement('div', { style: { fontSize: 13, color: 'rgba(0,0,0,0.85)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, c.name),
                  React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', marginTop: 1 } },
                    alreadyAdded ? 'Già aggiunta' : `${collPoisData.length} POI`
                  ),
                ),
              );
            }),
          ),

          // ── Luoghi ──
          addrSuggs.length > 0 && React.createElement(React.Fragment, null,
            React.createElement('div', { className: 'ss-sugg-group-title' }, 'Luoghi'),
            addrSuggs.map(s => React.createElement('div', {
              key: s.id,
              className: 'ss-suggestion-item',
              onMouseDown: () => resolveAndPin(s),
            },
              React.createElement('div', {
                style: { width: 28, height: 28, borderRadius: 6, background: 'rgba(62,0,251,0.08)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }
              },
                React.createElement(icons.EnvironmentOutlined, { style: { fontSize: 12, color: '#3E00FB' } })
              ),
              React.createElement('div', { style: { flex: 1, minWidth: 0 } },
                React.createElement('div', { style: { fontSize: 13, color: 'rgba(0,0,0,0.85)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, s.label),
                s.sub && React.createElement('div', { style: { fontSize: 11, color: 'rgba(0,0,0,0.38)', marginTop: 1 } }, s.sub),
              ),
            )),
          ),
        ),

      )
    )
  ),

    // ── Mappa + lista affiancate ──────────────────────────
    React.createElement('div', { className: 'new-coll-map-content' },

    React.createElement('div', { className: 'new-coll-map-area' },

      React.createElement('div', { ref: mapRef, className: 'new-coll-map-wrap' }),

      React.createElement('div', { className: `new-coll-detail-panel${pendingPin ? ' visible' : ''}` },
        pendingPin && React.createElement(React.Fragment, null,
          React.createElement('div', { style: { display: 'flex', alignItems: 'flex-start', gap: 12, marginBottom: 12 } },
            React.createElement('div', {
              style: { width: 32, height: 32, borderRadius: 8, background: 'rgba(62,0,251,0.08)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 },
            },
              React.createElement(icons.EnvironmentOutlined, { style: { fontSize: 14, color: '#3E00FB' } }),
            ),
            React.createElement('div', { style: { flex: 1, minWidth: 0 } },
              React.createElement('div', { style: { fontSize: 14, fontWeight: 600, color: 'rgba(0,0,0,0.88)', lineHeight: '20px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, pendingPin.label),
              pendingPin.sub && React.createElement('div', { style: { fontSize: 12, color: 'rgba(0,0,0,0.45)', marginTop: 2 } }, pendingPin.sub),
            ),
            React.createElement('button', {
              style: { border: 'none', background: 'none', cursor: 'pointer', color: 'rgba(0,0,0,0.35)', padding: '2px 4px', lineHeight: 1, flexShrink: 0 },
              onClick: dismissPin,
            },
              React.createElement(icons.CloseOutlined, { style: { fontSize: 13 } }),
            ),
          ),
          React.createElement('div', { style: { display: 'flex', gap: 8 } },
            React.createElement(antd.Button, { onClick: dismissPin }, 'Ignora'),
            React.createElement(antd.Button, {
              type: 'primary',
              icon: React.createElement(icons.PlusOutlined),
              onClick: confirmPin,
            }, 'Aggiungi alla collezione'),
          ),
        ),
      ),
    ),

    React.createElement('div', { className: 'new-coll-list-view' },
      React.createElement('div', { className: 'new-coll-list-header' },
        React.createElement('span', { className: 'new-coll-poi-counter' },
          React.createElement('strong', null, collPois.length),
          collPois.length === 1 ? ' POI selezionato' : ' POI selezionati',
        ),
      ),
      React.createElement('div', { className: 'new-coll-list-scroll' },
      collPois.length === 0
        ? React.createElement(antd.Empty, {
            image: antd.Empty.PRESENTED_IMAGE_SIMPLE,
            description: 'Nessun POI aggiunto.',
            style: { margin: 'auto' },
          })
        : collPois.map(poi => React.createElement('div', { key: poi.id, className: 'new-coll-list-item' },
            React.createElement('div', {
              style: { width: 32, height: 32, borderRadius: 8, background: 'rgba(62,0,251,0.08)',
                display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 },
            },
              React.createElement(icons.EnvironmentOutlined, { style: { fontSize: 14, color: '#3E00FB' } }),
            ),
            React.createElement('div', { className: 'new-coll-list-item-info' },
              React.createElement('div', { className: 'new-coll-list-item-label' }, poi.label),
              poi.sub && React.createElement('div', { className: 'new-coll-list-item-sub' }, poi.sub),
            ),
            React.createElement(antd.Button, {
              type: 'text', size: 'small', danger: true,
              icon: React.createElement(icons.DeleteOutlined),
              onClick: () => onRemovePin(poi.id),
            }),
          )),
      ), // new-coll-list-scroll
    ),
    ), // new-coll-map-content
  );
}

// ─────────────────────────────────────────────────────────
// COLLECTION VIEW MAP — mappa read-only per il drawer visualizza
// ─────────────────────────────────────────────────────────
function CollectionViewMap({ pois, color, open }) {
  const mapRef     = useRef(null);
  const mapInst    = useRef(null);
  const markersRef = useRef([]);

  useEffect(() => {
    if (!mapRef.current || mapInst.current) return;
    try {
      mapInst.current = new google.maps.Map(mapRef.current, {
        center: { lat: 38.115, lng: 13.362 },
        zoom: 12,
        disableDefaultUI: true,
        zoomControl: true,
        zoomControlOptions: { position: google.maps.ControlPosition.RIGHT_BOTTOM },
        styles: [{ featureType: 'poi', elementType: 'labels', stylers: [{ visibility: 'off' }] }],
      });
    } catch(err) { console.warn('CollectionViewMap init:', err); }
  }, []);

  useEffect(() => {
    if (!open) return;
    setTimeout(() => {
      if (mapInst.current) google.maps.event.trigger(mapInst.current, 'resize');
    }, 300);
  }, [open]);

  useEffect(() => {
    if (!mapInst.current) return;
    markersRef.current.forEach(m => m.setMap(null));
    markersRef.current = [];
    const pinColor = color || '#3E00FB';
    (pois || []).forEach(poi => {
      markersRef.current.push(new google.maps.Marker({
        map: mapInst.current,
        position: { lat: poi.lat, lng: poi.lng },
        title: poi.label,
        icon: { path: google.maps.SymbolPath.CIRCLE, scale: 8, fillColor: pinColor, fillOpacity: 1, strokeColor: '#fff', strokeWeight: 2 },
      }));
    });
    if ((pois || []).length > 0) {
      const bounds = new google.maps.LatLngBounds();
      pois.forEach(p => bounds.extend({ lat: p.lat, lng: p.lng }));
      mapInst.current.fitBounds(bounds, 60);
    }
  }, [pois, color]);

  return React.createElement('div', { ref: mapRef, style: { width: '100%', height: '100%' } });
}

// ─────────────────────────────────────────────────────────
// APP
// ─────────────────────────────────────────────────────────
function App() {
  const [collections, setCollections] = useState(INITIAL_COLLECTIONS);

  const handleDeleteCollection = useCallback((id) => {
    setCollections(prev => prev.filter(c => c.id !== id));
  }, []);

  const [highlightedCollId, setHighlightedCollId] = useState(null);

  const handleDuplicateCollection = useCallback((record) => {
    const d = new Date();
    const dd   = String(d.getDate()).padStart(2, '0');
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    const copy = {
      id:          `col-cus-${Date.now()}`,
      name:        `${record.name} (copia)`,
      color:       record.color,
      icon:        record.icon,
      pois:        [...(record.pois || [])],
      poisCount:   record.poisCount || (record.pois || []).length,
      createdBy:   CURRENT_USER.name,
      createdAt:   `${dd}-${mm}-${yyyy}`,
      updatedAt:   `${dd}-${mm}-${yyyy}`,
      description: record.description || '',
      area:        record.area || '',
    };
    setCollections(prev => [copy, ...prev]);
    setHighlightedCollId(copy.id);
    setTimeout(() => setHighlightedCollId(null), 2200);
  }, []);

  // ── Schermata creazione/modifica ────────────────────────
  const [appView, setAppView] = useState('list'); // 'list' | 'edit'
  const [newCollName,  setNewCollName]  = useState('');
  const [newCollIcon,  setNewCollIcon]  = useState('StarOutlined');
  const [newCollColor, setNewCollColor] = useState(COLL_COLORS[0]);
  const [collPois,     setCollPois]     = useState([]);
  const [editingColl,  setEditingColl]  = useState(null);

  const handleAddCollPin    = useCallback((poi) => setCollPois(prev => prev.some(p => p.id === poi.id) ? prev : [...prev, poi]), []);
  const handleRemoveCollPin = useCallback((id)  => setCollPois(prev => prev.filter(p => p.id !== id)), []);


  const closeNewCollDrawer = useCallback(() => {
    setAppView('list');
    setEditingColl(null);
    setActivePois([]);
    setCollPois([]);
  }, []);

  const handleCreateCollection = useCallback(() => {
    if (!newCollName.trim()) return;
    const d = new Date();
    const dd   = String(d.getDate()).padStart(2, '0');
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    if (editingColl) {
      setCollections(prev => prev.map(c =>
        c.id === editingColl.id
          ? { ...c, name: newCollName.trim(), icon: newCollIcon, color: newCollColor, pois: collPois, poisCount: collPois.length, updatedAt: `${dd}-${mm}-${yyyy}` }
          : c
      ));
    } else {
      const coll = {
        id: `col-cus-${Date.now()}`,
        name: newCollName.trim(),
        color: newCollColor,
        icon: newCollIcon,
        pois: collPois,
        poisCount: collPois.length,
        createdBy: CURRENT_USER.name,
        createdAt: `${dd}-${mm}-${yyyy}`,
        updatedAt: `${dd}-${mm}-${yyyy}`,
        description: '',
        area: '',
      };
      setCollections(prev => [coll, ...prev]);
    }
    closeNewCollDrawer();
    setNewCollName('');
    setNewCollIcon('StarOutlined');
    setNewCollColor(COLL_COLORS[0]);
  }, [newCollName, newCollIcon, newCollColor, collPois, editingColl, closeNewCollDrawer]);

  // ── Modifica collezione (riusa drawer creazione) ────────
  const [editReadOnly, setEditReadOnly] = useState(false);

  const handleOpenEdit = useCallback((record) => {
    setEditingColl(record);
    setNewCollName(record.name);
    setNewCollIcon(record.icon || 'StarOutlined');
    setNewCollColor(record.color || COLL_COLORS[0]);
    setCollPois(record.pois || []);
    setEditReadOnly(record.createdBy !== CURRENT_USER.name);
    setAppView('edit');
  }, []);

  const hasChanges = editingColl ? (
    newCollName.trim() !== editingColl.name ||
    newCollIcon !== (editingColl.icon || 'StarOutlined') ||
    newCollColor !== (editingColl.color || COLL_COLORS[0]) ||
    collPois.length !== (editingColl.pois || []).length ||
    !collPois.every((p, i) => p.id === (editingColl.pois || [])[i]?.id)
  ) : true;

  // ── POI ────────────────────────────────────────────────
  const [activePois,   setActivePois]   = useState([]);
  const [poiRadius,    setPoiRadius]    = useState(500);
  const placesServiceRef       = useRef(null);   // google.maps.places.PlacesService
  const autocompleteServiceRef = useRef(null);   // google.maps.places.AutocompleteService

  // ── Inizializza PlacesService (richiede libraries=places) ──
  useEffect(() => {
    try {
      const el = document.createElement('div');
      placesServiceRef.current = new google.maps.places.PlacesService(el);
      autocompleteServiceRef.current = new google.maps.places.AutocompleteService();
    } catch(e) {
      console.warn('Places API non disponibile:', e);
    }
  }, []);

  return React.createElement('div', { className: 'app-shell' },
    React.createElement(Navbar),

    // ── Vista lista / vista modifica ─────────────────────
    appView === 'list'
      ? React.createElement(CollectionsListView, {
          onNewCollection:       () => { setNewCollName(''); setNewCollIcon('StarOutlined'); setNewCollColor(COLL_COLORS[0]); setCollPois([]); setEditReadOnly(false); setAppView('edit'); },
          onViewCollection:      handleOpenEdit,
          onEditCollection:      handleOpenEdit,
          onDuplicateCollection: handleDuplicateCollection,
          onDeleteCollection:    handleDeleteCollection,
          collections,
          highlightedCollId,
        })
      : React.createElement('div', { className: 'coll-shell' },

          // ── Header ───────────────────────────────────────
          React.createElement('div', { className: 'coll-list-header' },
            React.createElement('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-start', gap: 4 } },
              React.createElement(antd.Button, {
                type: 'link',
                icon: React.createElement(ArrowLeftOutlined),
                onClick: closeNewCollDrawer,
                style: { padding: 0, height: 'auto', fontSize: 13 },
              }, 'Lista Collezioni POI'),
              React.createElement('span', { className: 'coll-list-header-title' },
                'Collezione POI',
                React.createElement('span', { style: { color: 'rgba(0,0,0,0.25)', fontWeight: 300, margin: '0 10px' } }, '|'),
                React.createElement('span', { style: { fontWeight: 400, fontSize: 20 } },
                  editingColl ? editingColl.name : 'Nuova Collezione POI',
                ),
              ),
            ),
            !editReadOnly && React.createElement(antd.Button, {
              type: 'primary',
              icon: React.createElement(editingColl ? SaveOutlined : PlusOutlined),
              disabled: editingColl ? (!hasChanges || !newCollName.trim()) : !newCollName.trim(),
              onClick: handleCreateCollection,
            }, editingColl ? 'Salva' : 'Crea'),
          ),

          // ── Body: sidebar form + mappa ────────────────────
          React.createElement('div', { className: 'coll-edit-body' },

            React.createElement('div', { className: 'coll-edit-sidebar' },
              React.createElement('div', { className: 'new-coll-field' },
                React.createElement('span', { className: 'new-coll-label' }, 'Nome'),
                React.createElement(antd.Input, {
                  placeholder: 'Es. Scuole zona Noce',
                  value: newCollName,
                  onChange: e => !editReadOnly && setNewCollName(e.target.value),
                  onPressEnter: !editReadOnly ? handleCreateCollection : undefined,
                  size: 'large',
                  autoFocus: true,
                  disabled: editReadOnly,
                }),
              ),
              React.createElement('div', { className: 'new-coll-field' },
                React.createElement('span', { className: 'new-coll-label' }, 'Icona'),
                React.createElement('div', { className: 'new-coll-icon-grid' },
                  Object.entries(COLL_ICON_MAP).map(([key, IconComp]) =>
                    React.createElement('div', {
                      key,
                      className: `new-coll-icon-btn${newCollIcon === key ? ' selected' : ''}`,
                      onClick: () => setNewCollIcon(key),
                      title: key.replace('Outlined', ''),
                    },
                      React.createElement(IconComp, { style: { fontSize: 16 } })
                    )
                  )
                ),
              ),
              React.createElement('div', { className: 'new-coll-field' },
                React.createElement('span', { className: 'new-coll-label' }, 'Colore'),
                React.createElement('div', { className: 'new-coll-color-row' },
                  COLL_COLORS.map(c =>
                    React.createElement('div', {
                      key: c,
                      className: `new-coll-color-swatch${newCollColor === c ? ' selected' : ''}`,
                      style: { background: c },
                      onClick: () => setNewCollColor(c),
                    })
                  )
                ),
              ),

            ),

            React.createElement('div', { className: 'coll-edit-main' },
              React.createElement(CollectionMapPicker, {
                open: appView === 'edit',
                activePois,
                poiRadius,
                autocompleteService: autocompleteServiceRef.current,
                placesService: placesServiceRef.current,
                collPois,
                onAddPin: handleAddCollPin,
                onRemovePin: handleRemoveCollPin,
                allCollections: collections,
                readOnly: editReadOnly,
              }),
            ),

          ),
        ),

  );
}

// ─────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────
window.applyGravityTokens && window.applyGravityTokens();
ReactDOM.createRoot(document.getElementById('root')).render(
  React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(App)
  )
);
</script>
</body>
</html>
