<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gravity — Single Sign-on</title>

  <!-- React 18 -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Ant Design 5.x -->
  <link rel="stylesheet" href="https://unpkg.com/antd@5/dist/reset.css" />
  <script src="https://unpkg.com/dayjs@1/dayjs.min.js"></script>
  <script src="https://unpkg.com/antd@5/dist/antd.min.js"></script>

  <!-- Ant Design Icons 5.x -->

  <!-- Gravity Design Tokens -->
  <script src="../tokens.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--gravity-font-body);
      background: var(--gravity-bg);
      color: var(--gravity-text);
      font-size: 14px;
      line-height: 1.5714;
    }

    /* ═══════════════════════════════════════════════════════
       SCHERMATA 1 — LOGIN
    ═══════════════════════════════════════════════════════ */

    .login-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 100% 90% at 50% 100%, rgba(62,0,251,0.5) 0%, transparent 65%),
        var(--gravity-bg);
    }

    .login-card {
      background: var(--gravity-bg-container);
      border-radius: var(--gravity-radius-lg);
      box-shadow: var(--gravity-shadow-md);
      padding: 48px;
      width: 440px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .login-head {
      width: 100%;
      text-align: center;
    }

    .login-title {
      font-size: 28px;
      font-weight: 600;
      color: var(--gravity-text);
      margin: 0 0 8px;
      line-height: 1.2;
    }

    .login-sub {
      font-size: 14px;
      color: var(--gravity-text-secondary);
      margin: 0;
    }

    .login-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .login-form .ant-btn-lg { height: 44px; font-size: 15px; margin-top: 4px; }

    .login-footer {
      font-size: 12px;
      color: var(--gravity-text-tertiary);
      text-align: center;
    }

    /* ═══════════════════════════════════════════════════════
       SCHERMATA 2 — SELEZIONE TENANT
    ═══════════════════════════════════════════════════════ */

    .tenant-bg {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(ellipse 100% 90% at 50% 100%, rgba(62,0,251,0.5) 0%, transparent 65%),
        var(--gravity-bg);
    }

    .tenant-card {
      background: var(--gravity-bg-container);
      border-radius: var(--gravity-radius-lg);
      box-shadow: var(--gravity-shadow-md);
      padding: 48px;
      width: 580px;
      max-width: calc(100vw - 32px);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 32px;
    }

    .tenant-head { width: 100%; text-align: center; }

    /* ── Layout A — griglia 2 colonne verticale ── */
    .tenant-grid-a {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tenant-item-a {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 24px 20px;
      border: 1px solid var(--gravity-border);
      border-radius: var(--gravity-radius);
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--gravity-bg-container);
      position: relative;
    }

    .tenant-item-a:hover { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.08); }
    .tenant-item-a.selected { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.12); background: rgba(62,0,251,0.03); }

    .avatar-a {
      width: 72px; height: 72px;
      border-radius: 50%;
      overflow: hidden;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    .avatar-a img { width: 100%; height: 100%; object-fit: cover; }

    .check-a {
      position: absolute;
      top: 12px; right: 12px;
      color: var(--gravity-primary);
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tenant-item-a.selected .check-a { opacity: 1; }

    /* ── Layout B — lista orizzontale compatta ── */
    .tenant-list-b {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .tenant-item-b {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px;
      border: 1px solid var(--gravity-border);
      border-radius: var(--gravity-radius);
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--gravity-bg-container);
    }

    .tenant-item-b:hover { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.08); }
    .tenant-item-b.selected { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.12); background: rgba(62,0,251,0.03); }

    .avatar-b {
      width: 56px; height: 56px;
      border-radius: 50%;
      overflow: hidden;
      background: #f0f0f0;
      flex-shrink: 0;
    }

    .avatar-b img { width: 100%; height: 100%; object-fit: cover; }

    .check-b {
      color: var(--gravity-primary);
      font-size: 18px;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tenant-item-b.selected .check-b { opacity: 1; }

    /* ── Layout C — card con header colorato ── */
    .tenant-grid-c {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tenant-item-c {
      border: 1px solid var(--gravity-border);
      border-radius: var(--gravity-radius);
      cursor: pointer;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: var(--gravity-bg-container);
      position: relative;
    }

    .tenant-item-c:hover { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.08); }
    .tenant-item-c.selected { border-color: var(--gravity-primary); box-shadow: 0 0 0 2px rgba(62,0,251,0.12); }

    .tenant-c-header {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 20px 20px;
    }

    .avatar-c {
      width: 64px; height: 64px;
      border-radius: 50%;
      overflow: hidden;
      background: rgba(255,255,255,0.25);
      border: 2px solid rgba(255,255,255,0.5);
    }

    .avatar-c img { width: 100%; height: 100%; object-fit: cover; }

    .tenant-c-body {
      padding: 16px 16px 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .check-c {
      position: absolute;
      top: 12px; right: 12px;
      color: #fff;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .tenant-item-c.selected .check-c { opacity: 1; }

    /* nomi tenant condivisi */
    .tenant-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--gravity-text);
      margin: 0;
      line-height: 1.3;
    }

    .tenant-meta { font-size: 12px; color: var(--gravity-text-secondary); }

    /* ═══════════════════════════════════════════════════════
       SCHERMATA 3 — APP SHELL / DASHBOARD
    ═══════════════════════════════════════════════════════ */

    .shell {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      background: var(--gravity-bg-container);
      border-bottom: 1px solid var(--gravity-split);
      display: flex;
      align-items: stretch;
      padding-right: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: stretch;
      flex: 1;
      min-width: 0;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
      text-decoration: none;
      padding: 0 20px;
    }

    .topbar .ant-menu-horizontal { border-bottom: none !important; flex: 1; }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .tenant-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border: 1px solid var(--gravity-border);
      border-radius: 6px;
      cursor: pointer;
      transition: border-color 0.2s;
      font-size: 13px;
      color: var(--gravity-text-secondary);
    }

    .tenant-badge:hover { border-color: var(--gravity-primary); color: var(--gravity-primary); }

    .tenant-badge-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .main {
      flex: 1;
      padding: 24px;
      background: var(--gravity-bg);
      overflow-y: auto;
    }

    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }

    .kpi-value-num {
      font-size: 32px;
      font-weight: 600;
      line-height: 28px;
      color: var(--gravity-text);
      margin: 8px 0;
    }

    .greeting { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 24px; }
    .greeting-left { display: flex; flex-direction: column; gap: 8px; }
    .greeting-meta { display: flex; align-items: center; gap: 12px; }
    .greeting-right { flex-shrink: 0; }

    .activities-layout { display: grid; gap: 16px; margin-bottom: 24px; }
    .activities-layout.with-team { grid-template-columns: 1fr 1fr; }

    .task-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gravity-split); }
    .task-row:last-child { border-bottom: none; padding-bottom: 0; }
    .task-text { font-size: 13px; display: block; }
    .task-done .task-text { text-decoration: line-through; color: var(--gravity-text-tertiary); }

    .team-row { display: flex; align-items: flex-start; gap: 10px; padding: 8px 0; border-bottom: 1px solid var(--gravity-split); }
    .team-row:last-child { border-bottom: none; padding-bottom: 0; }

    .recent-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--gravity-split); gap: 12px; }
    .recent-row:last-child { border-bottom: none; padding-bottom: 0; }
    .recent-name { font-size: 13px; font-weight: 500; color: var(--gravity-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .recent-meta { font-size: 12px; color: var(--gravity-text-tertiary); flex-shrink: 0; }

    .mini-calendar { user-select: none; }
    .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; text-align: center; }
    .cal-cell { padding: 4px 2px; font-size: 11px; border-radius: 4px; color: var(--gravity-text); line-height: 1.5; }
    .cal-cell.dow { color: var(--gravity-text-tertiary); font-size: 10px; font-weight: 500; }
    .cal-cell.today { background: var(--gravity-primary); color: #fff; font-weight: 700; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/javascript">
window.applyGravityTokens();

const { useState, useEffect } = React;
const {
  ConfigProvider, Button, Input, Select, Checkbox, Badge, Tag, Menu,
  Card, Divider, Typography, Space, Avatar, Tabs, Progress, Tooltip, Dropdown, Segmented,
  Alert,
  message: antMessage,
} = antd;
const {
  EyeOutlined, EyeInvisibleOutlined, UserOutlined, LockOutlined,
  BellOutlined, RightOutlined, LeftOutlined, CheckOutlined,
  AppstoreOutlined, InboxOutlined, ShoppingOutlined, SendOutlined, SettingOutlined,
  GlobalOutlined, EnvironmentOutlined, SwapOutlined, InfoCircleOutlined, ArrowUpOutlined,
  DownOutlined, CloseCircleOutlined, CloseCircleFilled, ExclamationCircleOutlined,
} = icons;

// ─────────────────────────────────────────────────────────────────────────────
// MOCK DATA
// ─────────────────────────────────────────────────────────────────────────────

const TODAY = new Intl.DateTimeFormat('it-IT', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
}).format(new Date());

// Tenant disponibili per l'utente — include ruolo e colore identificativo
const TENANTS = [

  {

  'Commerciale':       [ { label:'Trattative aperte',    value:'14',    delta:'+3 questa settimana',  dir:'up'   }, { label:'Valore pipeline',      value:'€ 210k', delta:'+8% vs mese scorso',   dir:'up'   }, { label:'Preventivi in attesa', value:'7',    delta:'3 da confermare',      dir:null   }, { label:'Contratti in scadenza', value:'2',   delta:'Entro 7 giorni',       dir:'down' } ],
  'Inventory Manager': [ { label:'Spazi totali',         value:'95',    delta:'+4 questo mese',       dir:'up'   }, { label:'Tasso occupazione',    value:'73%',   delta:'+2% vs last period',   dir:'up'   }, { label:'Permessi in scadenza', value:'2',    delta:'Entro 30 giorni',      dir:'down' }, { label:'Da approvare',          value:'5',   delta:'3 in attesa da >3gg',  dir:null   } ],
};

const MY_TASKS = {

  'Commerciale':       [ { id:1, text:'Inviare preventivo ADV Gucci',          done:false, due:'Oggi'    }, { id:2, text:'Chiamata follow-up Prada',             done:false, due:'Domani'  }, { id:3, text:'Aggiornare bozza contratto D&G',        done:false, due:'3 apr'  } ],
  'Inventory Manager': [ { id:1, text:'Approvare 5 nuovi spazi in attesa',     done:false, due:'Oggi'    }, { id:2, text:'Rinnovare permesso Pensilina PA01',     done:false, due:'7 apr'  } ],
};

  { initials:'LF', user:'Luca Ferrari',   action:'ha aggiunto lo spazio',   target:'LED Roma Termini C03', time:'28 min fa' },

];

const LIVE_CAMPAIGNS = [
  { name:'ADV Gucci Estate 2025',    channel:'OOH',  client:'Gucci',   start:'15 mar', end:'15 apr', spaces:12, progress:65 },
  { name:'ADV Prada Web Banner',     channel:'Web',  client:'Prada',   start:'01 apr', end:'30 apr', spaces:5,  progress:5  },
  { name:'LED Milano Fashion Week',  channel:'DOOH', client:'Versace', start:'20 mar', end:'10 apr', spaces:8,  progress:80 },
];

// ─────────────────────────────────────────────────────────────────────────────
// LOGO
// ─────────────────────────────────────────────────────────────────────────────

function Logo({ markH = 26, typeH = 13, gap = 10, variant = 'full' }) {
  const [showFallback, setShowFallback] = useState(false);

  if (variant === 'type') {
    return React.createElement('img', {
      src: '../../brand/Gravity_type.svg',
      style: { height: typeH, width: 'auto', display: 'block' },
      alt: 'Gravity',
    });
  }

  return React.createElement('div', { style: { display:'flex', alignItems:'center', gap } },
    !showFallback
      ? React.createElement('img', {
          src: '../../brand/Gravity_mark.svg',
          style: { height: markH, width: 'auto' },
          alt: 'Gravity',
          onError: () => setShowFallback(true),
        })
      : React.createElement('span', {
          style: { fontFamily: 'var(--gravity-font-brand)', fontSize: markH * 0.75, fontWeight: 600, color: 'var(--gravity-primary)' }
        }, 'G'),
    variant === 'full' && React.createElement('img', {
      src: '../../brand/Gravity_type.svg',
      style: { height: typeH, width: 'auto' },
      alt: '',
      onError: e => { e.target.style.display = 'none'; }
    })
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCHERMATA 1 — LOGIN
// ─────────────────────────────────────────────────────────────────────────────

// Credenziali mock valide
const VALID_EMAIL    = 'gloria@gravity.com';
const VALID_PASSWORD = 'Gravity2024!';
const NO_TENANT_EMAIL = 'noaccess@test.com'; // simula utente senza tenant

function LoginScreen({ onLogin }) {
  const [email, setEmail]         = useState('gloria@gravity.com');
  const [password, setPassword]   = useState('Gravity2024!');
  const [loading, setLoading]     = useState(false);
  const [pwVisible, setPwVisible] = useState(false);
  const [error, setError]         = useState(null);

  const canSubmit = email.trim().length > 3 && password.length >= 1;

  function handleSubmit() {
    if (!canSubmit) return;
    setError(null);
    setLoading(true);
    setTimeout(() => {
      setLoading(false);
      // Eccezione #3 — utente senza tenant
      if (email.trim() === NO_TENANT_EMAIL) {
        onLogin({ email, noTenant: true });
        return;
      }
      // Eccezione #1 — credenziali errate
      if (email.trim() !== VALID_EMAIL || password !== VALID_PASSWORD) {
        setError('Email o password non corretti. Riprova.');
        return;
      }
      onLogin({ email });
    }, 900);
  }

  function handleChange(field, value) {
    if (error) setError(null);
    if (field === 'email') setEmail(value);
    else setPassword(value);
  }

  function handleKey(e) { if (e.key === 'Enter') handleSubmit(); }

  return React.createElement('div', { className: 'login-bg' },
    React.createElement('div', { className: 'login-card' },

      React.createElement(Logo, { typeH: 40, variant: 'type' }),

      React.createElement('div', { className: 'login-head' },
        React.createElement('h1', { className: 'login-title' }, 'Accedi per continuare'),
        React.createElement('p', { className: 'login-sub' },
          'Inserisci le tue credenziali aziendali.'
        )
      ),

      React.createElement('div', { className: 'login-form' },

        error && React.createElement(Alert, {
          type: 'error',
          message: error,
          showIcon: true,
          closable: true,
          onClose: () => setError(null),
          style: { marginBottom: 4 },
        }),

        React.createElement(Input, {
          size: 'large',
          placeholder: 'Email aziendale',
          type: 'email',
          value: email,
          autoFocus: true,
          status: error ? 'error' : '',
          suffix: error ? React.createElement(CloseCircleFilled, { style: { color: '#ff4d4f' } }) : undefined,
          onChange: e => handleChange('email', e.target.value),
          onKeyDown: handleKey,
        }),

        React.createElement(Input, {
          size: 'large',
          placeholder: 'Password',
          type: pwVisible ? 'text' : 'password',
          value: password,
          status: error ? 'error' : '',
          onChange: e => handleChange('password', e.target.value),
          onKeyDown: handleKey,
          suffix: React.createElement(Button, {
            type: 'text', size: 'small', tabIndex: -1,
            icon: React.createElement(pwVisible ? EyeInvisibleOutlined : EyeOutlined),
            onClick: () => setPwVisible(v => !v),
            style: { color: 'var(--gravity-text-tertiary)' }
          }),
        }),

        React.createElement(Button, {
          type: 'primary', size: 'large', block: true,
          loading, disabled: !canSubmit,
          onClick: handleSubmit,
          icon: React.createElement(RightOutlined),
          style: { marginTop: 4 }
        }, 'Accedi')

      ),

      React.createElement('p', { className: 'login-footer' },
        'Problemi di accesso?', React.createElement('br'),
        'Contatta l\'amministratore della tua organizzazione.'
      )

    )
  );
}

// ─────────────────────────────────────────────────────────────────────────────
// SCHERMATA 1b — NESSUN TENANT ASSOCIATO
// ─────────────────────────────────────────────────────────────────────────────

function NoTenantScreen({ email, onBack }) {
  return React.createElement('div', { className: 'login-bg' },
    React.createElement('div', { className: 'login-card', style: { gap: 24, textAlign: 'center' } },

      React.createElement('div', {
        style: {
          width: 56, height: 56,
          borderRadius: '50%',
          background: 'rgba(255,74,28,0.08)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          margin: '0 auto',
        }
      },
        React.createElement(ExclamationCircleOutlined, { style: { fontSize: 26, color: '#FF4A1C' } })
      ),

      React.createElement('div', null,
        React.createElement('h1', { className: 'login-title', style: { fontSize: 22, marginBottom: 8 } },
          'Nessuna organizzazione trovata'
        ),
        React.createElement('p', { className: 'login-sub' },
          'L\'account ',
          React.createElement('strong', null, email),
          ' non è associato ad alcuna organizzazione su Gravity. Contatta il tuo amministratore per ricevere accesso.'
        )
      ),

      React.createElement(Button, {
        type: 'primary', size: 'large', block: true,
        onClick: onBack,
      }, 'Torna al login'),

function MiniCalendar() {
  const today = new Date();
  const [current, setCurrent] = useState(new Date(today.getFullYear(), today.getMonth(), 1));
  const year  = current.getFullYear();
  const month = current.getMonth();
  const monthLabel = new Intl.DateTimeFormat('it-IT', { month: 'long', year: 'numeric' }).format(current);
  const offset     = (new Date(year, month, 1).getDay() + 6) % 7;
  const totalDays  = new Date(year, month + 1, 0).getDate();
  const cells = [];
  for (let i = 0; i < offset; i++) cells.push(null);
  for (let d = 1; d <= totalDays; d++) cells.push(d);
  const isToday = d => d !== null && year === today.getFullYear() && month === today.getMonth() && d === today.getDate();

  return React.createElement(Card, { size: 'small', styles: { body: { padding: '12px 16px' } }, style: { width: 228 } },
    React.createElement('div', { className: 'mini-calendar' },
      React.createElement('div', { className: 'cal-header' },
        React.createElement(Button, { type:'text', size:'small', icon: React.createElement(LeftOutlined), onClick: () => setCurrent(new Date(year, month - 1, 1)), style: { color: 'var(--gravity-text-tertiary)', padding: '0 4px' } }),
        React.createElement(Typography.Text, { strong: true, style: { fontSize: 12, textTransform: 'capitalize' } }, monthLabel),
        React.createElement(Button, { type:'text', size:'small', icon: React.createElement(RightOutlined), onClick: () => setCurrent(new Date(year, month + 1, 1)), style: { color: 'var(--gravity-text-tertiary)', padding: '0 4px' } }),
      ),
      React.createElement('div', { className: 'cal-grid' },
        ['L','M','M','G','V','S','D'].map((d, i) => React.createElement('div', { key: 'dow-'+i, className: 'cal-cell dow' }, d)),
        cells.map((d, i) => React.createElement('div', { key: 'c-'+i, className: 'cal-cell' + (isToday(d) ? ' today' : '') }, d !== null ? d : ''))
      )
    )
  );
}

// Stato schermate: 'login' → 'tenant-select' → 'welcome'

function App() {
  const [screen, setScreen]           = useState('login');
  const [loggedEmail, setLoggedEmail] = useState(null);
  const [activeTenant, setActiveTenant] = useState(null);
  const [msgApi, ctxHolder] = antMessage.useMessage();

  const loggedUser = { name: 'Gloria', surname: 'Bonanno', initials: 'GB' };

  function handleLogin({ email, noTenant }) {
    setLoggedEmail(email);
    setScreen(noTenant ? 'no-tenant' : 'tenant-select');
  }

  function handleTenantSelect(tenantId) {
    const tenant = TENANTS.find(t => t.id === tenantId);
    setActiveTenant(tenant);
    setScreen('welcome');
    msgApi.success({ content: 'Benvenuta in ' + tenant.name + '.', duration: 2 });
  }

  function handleLogout() {
    setLoggedEmail(null);
    setActiveTenant(null);
    setScreen('login');
  }

  function handleSwitchTenant() {
    setActiveTenant(null);
    setScreen('tenant-select');
  }

  return React.createElement(ConfigProvider, { theme: window.GRAVITY_THEME },
    React.createElement(React.Fragment, null,
      ctxHolder,
      screen === 'login'
        ? React.createElement(LoginScreen, { onLogin: handleLogin })
        : screen === 'no-tenant'
          ? React.createElement(NoTenantScreen, { email: loggedEmail, onBack: handleLogout })
          : screen === 'tenant-select'
            ? React.createElement(TenantSelectScreen, { email: loggedEmail, onSelect: handleTenantSelect })
            : React.createElement(WelcomeScreen, {
              tenant: activeTenant,
              onLogout: handleLogout,
              onSwitchTenant: handleSwitchTenant,
            })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
