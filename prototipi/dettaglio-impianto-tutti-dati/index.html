function OrientBadge({ val }) {
  const cls = { FRONT:'badge-front', BACK:'badge-back', LEFT:'badge-left', RIGHT:'badge-right' };
  return <span className={`orient-badge ${cls[val] || 'badge-front'}`}>{val}</span>;
}
function TipoBadge({ val }) {
  const cls = { Standard:'badge-standard', Seasonal:'badge-seasonal', 'Long Term':'badge-longterm', Premium:'badge-premium' };
  return <span className={`orient-badge ${cls[val] || 'badge-standard'}`}>{val}</span>;
}

function SectionTitle({ children }) {
  return <div style={{fontWeight:600, fontSize:14, color:'rgba(0,0,0,0.88)', marginBottom:0}}>{children}</div>;
}

function FieldLabel({ children }) {
  return <div className="form-label">{children}</div>;
}

function Field({ label, children, full }) {
  return (
    <div className={`form-field${full ? ' col-span-2' : ''}`}>
      <FieldLabel>{label}</FieldLabel>
      {children}
    </div>
  );
}

function SectionGrid({ children, cols3 }) {
  return <div className={cols3 ? 'grid-3' : 'form-section-grid'}>{children}</div>;
}

// ─── DATI AMMINISTRATIVI ──────────────────────────────────────────────────────
function DatiAmministrativiContent({ utenze, setUtenze, cimase, setCimase, concessioni, setConcessioni, autorizzazioni, setAutorizzazioni }) {
  const addUtenza = () => setUtenze([...utenze, { id: Math.max(...utenze.map(u=>u.id),0)+1, value:'', scadenza:'N/D' }]);
  const removeUtenza = id => { if (utenze.length > 1) setUtenze(utenze.filter(u=>u.id!==id)); };
  const updateUtenza = (id, val) => setUtenze(utenze.map(u => u.id===id ? {...u, value:val} : u));

  const addCimasa = () => setCimase([...cimase, { id: Math.max(...cimase.map(c=>c.id),0)+1, value:'', scadenza:'N/D' }]);
  const removeCimasa = id => { if (cimase.length > 1) setCimase(cimase.filter(c=>c.id!==id)); };
  const updateCimasa = (id, val) => setCimase(cimase.map(c => c.id===id ? {...c, value:val} : c));

  const [concModalOpen, setConcModalOpen] = useState(false);
  const [autModalOpen, setAutModalOpen] = useState(false);
  const emptyConc = { stato:'', dataStipula:'', dataScadenza:'', numeroGara:'', protocolloComune:'', noteComune:'', protocolloGenio:'' };
  const emptyAut = { stato:'', dataInizio:'', dataFine:'', note:'' };
  const [newConc, setNewConc] = useState(emptyConc);
  const [newAut, setNewAut] = useState(emptyAut);

  const addConc = () => {
    if (!newConc.stato || !newConc.dataStipula || !newConc.dataScadenza) return;
    setConcessioni([...concessioni, { id: Math.max(...concessioni.map(c=>c.id),0)+1, ...newConc }]);
    setNewConc(emptyConc); setConcModalOpen(false);
  };
  const removeConc = id => setConcessioni(concessioni.filter(c=>c.id!==id));

  const addAut = () => {
    if (!newAut.stato || !newAut.dataInizio || !newAut.dataFine) return;
    setAutorizzazioni([...autorizzazioni, { id: Math.max(...autorizzazioni.map(a=>a.id),0)+1, ...newAut }]);
    setNewAut(emptyAut); setAutModalOpen(false);
  };
  const removeAut = id => setAutorizzazioni(autorizzazioni.filter(a=>a.id!==id));

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20,padding:24,width:'100%'}}>

      {/* Suolo */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <SectionTitle>Suolo</SectionTitle>
        <SectionGrid>
          <Field label="Tipo di suolo">
            <Select defaultValue="privato" style={{width:'100%'}}>
              <Select.Option value="pubblico">Pubblico</Select.Option>
              <Select.Option value="privato">Privato</Select.Option>
              <Select.Option value="demaniale">Demaniale</Select.Option>
            </Select>
          </Field>
          <Field label="Categoria suolo">
            <Select defaultValue="urbano" style={{width:'100%'}}>
              <Select.Option value="urbano">Urbano</Select.Option>
              <Select.Option value="extraurbano">Extraurbano</Select.Option>
              <Select.Option value="misto">Misto</Select.Option>
            </Select>
          </Field>
        </SectionGrid>
      </div>

      <Divider style={{margin:'4px 0'}} />

      {/* Classificazione */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <SectionTitle>Classificazione</SectionTitle>
        <SectionGrid>
          <Field label="Codice Area">
            <Input defaultValue="PA-CTR-001" />
          </Field>
          <Field label="Classe Comunale">
            <Input defaultValue="A2 - Zona Semicentrale" />
          </Field>

          {/* Utenze */}
          <div className="col-span-2" style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <FieldLabel>Utenze</FieldLabel>
              <Button size="small" icon={<PlusOutlined />} onClick={addUtenza}>Aggiungi Utenza</Button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {utenze.map((u,i) => (
                <div key={u.id} className="utenza-box">
                  <div className="utenza-box-header">
                    <span className="utenza-box-label">Utenza {i+1}</span>
                    {utenze.length > 1 && (
                      <Button type="text" size="small" danger icon={<CloseOutlined />} onClick={() => removeUtenza(u.id)} style={{width:24,height:24,padding:0}} />
                    )}
                  </div>
                  <Input value={u.value} onChange={e => updateUtenza(u.id, e.target.value)} placeholder="Inserisci codice utenza" style={{background:'#fff'}} />
                </div>
              ))}
            </div>
          </div>

          {/* Cimase */}
          <div className="col-span-2" style={{display:'flex',flexDirection:'column',gap:12}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <FieldLabel>Cimase</FieldLabel>
              <Button size="small" icon={<PlusOutlined />} onClick={addCimasa}>Aggiungi Cimasa</Button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
              {cimase.map((c,i) => (
                <div key={c.id} className="cimasa-box">
                  <div className="utenza-box-header">
                    <span className="utenza-box-label">Cimasa {i+1}</span>
                    {cimase.length > 1 && (
                      <Button type="text" size="small" danger icon={<CloseOutlined />} onClick={() => removeCimasa(c.id)} style={{width:24,height:24,padding:0}} />
                    )}
                  </div>
                  <Input value={c.value} onChange={e => updateCimasa(c.id, e.target.value)} placeholder="Inserisci codice cimasa" style={{background:'#fff'}} />
                </div>
              ))}
            </div>
          </div>
        </SectionGrid>
      </div>

      <Divider style={{margin:'4px 0'}} />

      {/* Verifiche */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <SectionTitle>Verifiche</SectionTitle>
        <SectionGrid>
          <Field label="Data Ultima Verifica">
            <Input type="date" defaultValue="2024-09-15" />
          </Field>
          <Field label="Responsabile ultima verifica">
            <Input defaultValue="Ing. Marco Ferrante" />
          </Field>
        </SectionGrid>
      </div>

      <Divider style={{margin:'4px 0'}} />

      {/* Progetto */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <SectionTitle>Progetto</SectionTitle>
        <SectionGrid>
          <Field label="Progettista"><Input defaultValue="Studio Tecnico Associato Rossi & Partners" /></Field>
          <Field label="Tecniche utilizzate"><Input defaultValue="Fondazioni profonde, struttura in c.a." /></Field>
          <Field label="Acciaio armature"><Input defaultValue="B450C FeB44k - Ø12-16mm" /></Field>
          <Field label="Acciaio carpenteria"><Input defaultValue="S355JR - IPE 200" /></Field>

// ─── DATI TECNICI ─────────────────────────────────────────────────────────────
function DatiTecniciContent({ facce, setFacce }) {
  const [facciaModalOpen, setFacciaModalOpen] = useState(false);
  const emptyFaccia = { nome:'', orientamento:'', tipo:'', slots:'', larghezza:'', altezza:'', orientamentoDegrees:'', conoVisibilita:'', illuminazione:'', prezzo:'' };
  const [newFaccia, setNewFaccia] = useState(emptyFaccia);

  const addFaccia = () => {
    setFacce([...facce, { id: Math.max(...facce.map(f=>f.id),0)+1, ...newFaccia }]);
    setNewFaccia(emptyFaccia); setFacciaModalOpen(false);
  };
  const removeFaccia = id => { if (facce.length > 1) setFacce(facce.filter(f=>f.id!==id)); };

  return (
    <div style={{display:'flex',flexDirection:'column',gap:20,padding:24,width:'100%'}}>
      {/* Dimensioni */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <SectionTitle>Dimensioni</SectionTitle>
        <div className="grid-3">
          <Field label="Larghezza totale (m)"><Input defaultValue="6,50" /></Field>
          <Field label="Altezza totale (m)"><Input defaultValue="12,00" /></Field>
          <Field label="Profondità (m)"><Input defaultValue="0,80" /></Field>
          <Field label="Superficie espositiva (m²)"><Input defaultValue="78,00" /></Field>
          <Field label="Altezza minima da terra (m)"><Input defaultValue="2,50" /></Field>
        </div>
      </div>

      <Divider style={{margin:'4px 0'}} />

      {/* Facce */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
          <div style={{display:'flex',alignItems:'baseline',gap:8}}>
            <SectionTitle>Facce</SectionTitle>
            <span style={{fontSize:14,color:'rgba(0,0,0,0.45)'}}>| {facce.length} {facce.length===1?'faccia':'facce'}</span>
          </div>
          <Button type="text" icon={<PlusOutlined />} style={{color:'#3e00fb'}} onClick={() => setFacciaModalOpen(true)}>
            Aggiungi Faccia
          </Button>
        </div>

        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
          {facce.map(f => (
            <div key={f.id} className="face-card">
              {facce.length > 1 && (
                <Button type="text" size="small" icon={<CloseOutlined />} onClick={() => removeFaccia(f.id)}
                  className="face-remove-btn"
                  style={{position:'absolute',top:8,right:8,opacity:0,transition:'opacity 0.2s',background:'#fff',zIndex:10,width:24,height:24,padding:0}} />
              )}
              <div style={{display:'flex',alignItems:'stretch'}}>
                {/* Image placeholder */}
                <div style={{width:200,background:'#e8e8e8',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'16px',borderRight:'1px solid #f0f0f0',flexShrink:0}}>
                  <svg width="80" height="80" viewBox="0 0 100 100" fill="none" style={{marginBottom:8}}>
                    <circle cx="50" cy="30" r="15" fill="#9ca3af"/>
                    <ellipse cx="50" cy="70" rx="20" ry="25" fill="#9ca3af"/>
                    <circle cx="43" cy="27" r="2" fill="#6b7280"/>
                    <circle cx="57" cy="27" r="2" fill="#6b7280"/>
                    <path d="M 45 32 Q 50 35 55 32" stroke="#6b7280" strokeWidth="1.5" fill="none"/>
                  </svg>
                  <p style={{fontSize:12,color:'rgba(0,0,0,0.45)',textAlign:'center',margin:0}}>No creatives</p>
                  <p style={{fontSize:12,color:'rgba(0,0,0,0.45)',textAlign:'center',margin:0}}>data found!</p>
                </div>
                {/* Info */}
                <div style={{flex:1,padding:16}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:16,flexWrap:'wrap'}}>
                    <span style={{fontWeight:500,fontSize:14,color:'rgba(0,0,0,0.88)'}}>{f.nome}</span>
                    {f.orientamento && <OrientBadge val={f.orientamento} />}
                    {f.tipo && <TipoBadge val={f.tipo} />}
                  </div>
                  <div style={{display:'flex',flexDirection:'column',gap:8}}>
                    {f.slots && <div style={{fontSize:12,color:'rgba(0,0,0,0.88)'}}><strong>Slots:</strong> {f.slots}</div>}
                    {(f.larghezza||f.altezza) && <div style={{fontSize:12,color:'rgba(0,0,0,0.88)'}}><strong>Formato:</strong> w {f.larghezza}m x h {f.altezza}m</div>}
                    {f.orientamentoDegrees && <div style={{fontSize:12,color:'rgba(0,0,0,0.88)'}}><strong>Orientamento:</strong> {f.orientamentoDegrees}°</div>}
                    {f.conoVisibilita && <div style={{fontSize:12,color:'rgba(0,0,0,0.88)'}}><strong>Cono di visibilità:</strong> r {f.conoVisibilita}m</div>}

                    {f.prezzo && <div style={{fontSize:12,color:'rgba(0,0,0,0.88)'}}><strong>Prezzo:</strong> € {f.prezzo}/mese</div>}

          ))}

      </div>

        footer={[
          <Button key="cancel" onClick={() => setFacciaModalOpen(false)}>Annulla</Button>,

        <div style={{display:'flex',flexDirection:'column',gap:20,padding:'16px 0'}}>
          <div>
            <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>Informazioni Generali</div>

              <Field label="Orientamento *">
                <Select value={newFaccia.orientamento||undefined} onChange={v => setNewFaccia({...newFaccia, orientamento:v})} style={{width:'100%'}} placeholder="Seleziona...">
                  <Select.Option value="FRONT">FRONT</Select.Option>
                  <Select.Option value="BACK">BACK</Select.Option>
                  <Select.Option value="LEFT">LEFT</Select.Option>
                  <Select.Option value="RIGHT">RIGHT</Select.Option>
                </Select>
              </Field>
              <Field label="Tipo *">
                <Select value={newFaccia.tipo||undefined} onChange={v => setNewFaccia({...newFaccia, tipo:v})} style={{width:'100%'}} placeholder="Seleziona...">
                  <Select.Option value="Standard">Standard</Select.Option>
                  <Select.Option value="Seasonal">Seasonal</Select.Option>
                  <Select.Option value="Long Term">Long Term</Select.Option>
                  <Select.Option value="Premium">Premium</Select.Option>
                </Select>
              </Field>

          </div>
          <Divider style={{margin:'4px 0'}} />
          <div>
            <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>Dimensioni e Caratteristiche</div>
            <SectionGrid>
              <Field label="Larghezza (m) *"><Input placeholder="es. 6,5" value={newFaccia.larghezza} onChange={e => setNewFaccia({...newFaccia, larghezza:e.target.value})} /></Field>
              <Field label="Altezza (m) *"><Input placeholder="es. 12" value={newFaccia.altezza} onChange={e => setNewFaccia({...newFaccia, altezza:e.target.value})} /></Field>
              <Field label="Orientamento (gradi) *"><Input placeholder="es. 195" value={newFaccia.orientamentoDegrees} onChange={e => setNewFaccia({...newFaccia, orientamentoDegrees:e.target.value})} /></Field>
              <Field label="Cono di visibilità (m) *"><Input placeholder="es. 100" value={newFaccia.conoVisibilita} onChange={e => setNewFaccia({...newFaccia, conoVisibilita:e.target.value})} /></Field>
            </SectionGrid>
          </div>
          <Divider style={{margin:'4px 0'}} />
          <div>
            <div style={{fontWeight:600,fontSize:13,marginBottom:12}}>Illuminazione e Tariffazione</div>
            <SectionGrid>
              <Field label="Illuminazione *"><Input placeholder="es. 2 faretti LED" value={newFaccia.illuminazione} onChange={e => setNewFaccia({...newFaccia, illuminazione:e.target.value})} /></Field>
              <Field label="Prezzo (€/mese) *"><Input placeholder="es. 1200,00" value={newFaccia.prezzo} onChange={e => setNewFaccia({...newFaccia, prezzo:e.target.value})} /></Field>
            </SectionGrid>
          </div>
        </div>
      </Modal>
    </div>
  );
}
